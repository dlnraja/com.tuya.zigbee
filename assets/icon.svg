<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#00E6A0"/>
  <!-- Zigbee symbol - hexagonal network node -->
  <g fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Center node -->
    <circle cx="50" cy="50" r="8" fill="#FFFFFF" stroke="none"/>
    <!-- Top node -->
    <circle cx="50" cy="20" r="5" fill="#FFFFFF" stroke="none"/>
    <!-- Bottom node -->
    <circle cx="50" cy="80" r="5" fill="#FFFFFF" stroke="none"/>
    <!-- Left nodes -->
    <circle cx="22" cy="35" r="5" fill="#FFFFFF" stroke="none"/>
    <circle cx="22" cy="65" r="5" fill="#FFFFFF" stroke="none"/>
    <!-- Right nodes -->
    <circle cx="78" cy="35" r="5" fill="#FFFFFF" stroke="none"/>
    <circle cx="78" cy="65" r="5" fill="#FFFFFF" stroke="none"/>
    <!-- Connection lines from center -->
    <line x1="50" y1="42" x2="50" y2="25"/>
    <line x1="50" y1="58" x2="50" y2="75"/>
    <line x1="43" y1="46" x2="27" y2="38"/>
    <line x1="43" y1="54" x2="27" y2="62"/>
    <line x1="57" y1="46" x2="73" y2="38"/>
    <line x1="57" y1="54" x2="73" y2="62"/>
  </g>
</svg>
