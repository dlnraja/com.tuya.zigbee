name: "Merge Last Forum Posts"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no edits)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: forum-merge
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Merge last 3 posts into 1 humanized post
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node .github/scripts/merge-last-posts.js
