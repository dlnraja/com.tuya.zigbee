<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="960" viewBox="0 0 960 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Purifier body -->
  <rect x="280" y="150" width="400" height="660" rx="60" stroke="black" stroke-width="40" fill="none"/>
  <!-- Air intake grilles -->
  <line x1="320" y1="300" x2="640" y2="300" stroke="black" stroke-width="20"/>
  <line x1="320" y1="380" x2="640" y2="380" stroke="black" stroke-width="20"/>
  <line x1="320" y1="460" x2="640" y2="460" stroke="black" stroke-width="20"/>
  <line x1="320" y1="540" x2="640" y2="540" stroke="black" stroke-width="20"/>
  <!-- Top air outlet -->
  <rect x="320" y="180" width="320" height="60" rx="15" fill="black"/>
  <!-- Control panel -->
  <circle cx="480" cy="680" r="40" stroke="black" stroke-width="20" fill="none"/>
  <circle cx="480" cy="680" r="10" fill="black"/>
  <!-- Air flow arrows -->
  <path d="M480 80 L480 130" stroke="black" stroke-width="20" stroke-linecap="round"/>
  <path d="M440 110 L480 150 L520 110" stroke="black" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Side air flow -->
  <path d="M200 400 C220 380 240 380 260 400" stroke="black" stroke-width="15" fill="none" stroke-linecap="round"/>
  <path d="M700 400 C720 380 740 380 760 400" stroke="black" stroke-width="15" fill="none" stroke-linecap="round"/>
</svg>
