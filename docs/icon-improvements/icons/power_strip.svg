<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="960" viewBox="0 0 960 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Strip body -->
  <rect x="100" y="350" width="760" height="260" rx="40" stroke="black" stroke-width="35" fill="none"/>
  <!-- Outlet 1 -->
  <rect x="200" y="410" width="50" height="80" rx="10" fill="black"/>
  <rect x="200" y="510" width="50" height="40" rx="10" fill="black"/>
  <!-- Outlet 2 -->
  <rect x="350" y="410" width="50" height="80" rx="10" fill="black"/>
  <rect x="350" y="510" width="50" height="40" rx="10" fill="black"/>
  <!-- Outlet 3 -->
  <rect x="500" y="410" width="50" height="80" rx="10" fill="black"/>
  <rect x="500" y="510" width="50" height="40" rx="10" fill="black"/>
  <!-- Outlet 4 -->
  <rect x="650" y="410" width="50" height="80" rx="10" fill="black"/>
  <rect x="650" y="510" width="50" height="40" rx="10" fill="black"/>
