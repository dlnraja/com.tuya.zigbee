<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="960" viewBox="0 0 960 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Detector body (disc shape) -->
  <ellipse cx="480" cy="500" rx="300" ry="200" stroke="black" stroke-width="40" fill="none"/>
  <!-- Top edge -->
  <ellipse cx="480" cy="350" rx="300" ry="100" stroke="black" stroke-width="30" fill="none"/>
  <!-- Smoke test button -->
  <circle cx="480" cy="450" r="60" stroke="black" stroke-width="30" fill="none"/>
  <!-- LED indicator -->
  <circle cx="480" cy="450" r="20" fill="black"/>
  <!-- Alarm indicator lines -->
  <line x1="480" y1="200" x2="480" y2="280" stroke="black" stroke-width="25" stroke-linecap="round"/>
  <line x1="380" y1="220" x2="410" y2="290" stroke="black" stroke-width="20" stroke-linecap="round"/>
  <line x1="580" y1="220" x2="550" y2="290" stroke="black" stroke-width="20" stroke-linecap="round"/>
  <!-- Smoke particles -->
  <circle cx="350" cy="150" r="15" fill="black"/>
  <circle cx="480" cy="120" r="12" fill="black"/>
  <circle cx="610" cy="150" r="15" fill="black"/>
</svg>
