name: 🤖 Auto-Fix + Publish Pipeline

on:
  push:
    branches: [master, stable-v5]
  schedule:
    - cron: '5 */6 * * *'  # Every 6 hours
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: write
  pull-requests: write

# v9.0.256 (P62.3): Move HOMEY_PUBLISH env vars to workflow level so they
# apply to ALL steps in ALL jobs (not just the publish step). The step-level
# env block doesn't propagate to the npm subshell on all GHA runner images,
# so the prepare-publish step was still seeing limit 26.00 MB.
env:
  HOMEY_PUBLISH_MAX_UNCOMPRESSED_MB: "30"
  HOMEY_PUBLISH_SOURCE_MAX_MB: "30"
  HOMEY_ZIGBEE_MAX_TOTAL_COMBOS: "30000"
  HOMEY_ZIGBEE_MAX_DRIVER_COMBOS: "1000"

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 100
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install deps
        run: npm ci --prefer-offline --no-audit || npm install --no-audit

      - name: 🗣️ Google Assistant / Alexa voice-safety gate
        run: npm run check:voice

      - name: 🤖 Run auto-fix-all
        run: node scripts/validation/auto-fix-all.js || true

      # v9.0.262 (P63.3): Re-inject manual driver fixes (HOBEIAN P61 etc.)
      # AFTER the auto-fix-all has run, BEFORE the build/publish. The
      # auto-publish bot regenerates driver.compose.json from canonical
      # templates and may drop manual fingerprints. This step re-applies
      # the fixes so the compiled manifest (app.json) and the source
      # stay in sync.
      - name: "🔁 Re-inject manual driver fixes (P63.3)"
        run: node tools/ci/re-inject-manual-fixes.js

      - name: 📊 Dashboard monitor
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: timeout 30 node scripts/automation/dashboard-monitor.js --latest || true

      - name: 📋 Check processing_failed builds
        id: processing_check
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: node .github/scripts/processing-failure-republish-check.js

      - name: 🔁 Bump version for Homey recovery publish
        if: env.publish_recovery_requires_bump == 'true' || github.event_name == 'workflow_dispatch'
        env:
          BUMP_LEVEL: patch
          HOMEY_CHANGELOG: ${{ env.publish_recovery_changelog || 'Stability improvements and Homey test publication retry.' }}
        run: |
          echo "Recovery publish reason: ${publish_recovery_reason:-manual workflow dispatch}"
          node .github/scripts/bump-homey-version.js

      - name: 🔐 Redact dashboard diagnostics before committing
        if: always()
        run: node .github/scripts/privacy-redactor.js .github/state/dashboard-monitor-report.json || true

      - name: 💾 Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          restore_volatile_artifacts() {
            for path in .github/state diagnostics screenshots screenshots-debug promote-screenshots push-promote-screenshots .homeybuild; do
              git restore -- "$path" 2>/dev/null || true
            done
          }
          stage_auto_fix_paths() {
            for path in drivers lib app.json .homeycompose .homeychangelog.json CHANGELOG.md README.md docs .cursorrules AI_INSTRUCTIONS.md package.json package-lock.json; do
              [ -e "$path" ] && git add "$path"
            done
          }
          restore_volatile_artifacts
          stage_auto_fix_paths
          if ! git diff --staged --quiet; then
            git commit -m "🤖 auto-fix-all: automated fixes [skip ci]"
            BRANCH="${GITHUB_REF_NAME:-master}"
            restore_volatile_artifacts
            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo "::group::Remaining tracked changes before rebase"
              git status --short
              echo "::endgroup::"
              echo "::error::Uncommitted tracked changes remain before rebase"
              exit 1
            fi
            git fetch origin "$BRANCH"
            if ! git merge-base --is-ancestor "origin/$BRANCH" HEAD; then
              git rebase "origin/$BRANCH"
            else
              echo "origin/$BRANCH is already an ancestor of HEAD; skipping rebase"
            fi
            git push origin HEAD:"refs/heads/$BRANCH"
            git fetch origin "$BRANCH"
            git merge-base --is-ancestor HEAD "origin/$BRANCH" || {
              echo "::error::Auto-fix commit HEAD is not reachable from origin/$BRANCH after push"
              exit 1
            }
          else
            echo "No auto-fix changes to commit"
          fi

      - name: 🚀 Publish if needed
        if: env.trigger_publish == 'true' || github.event_name == 'workflow_dispatch'
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          # v9.0.253 (P62): Bumped from 26 to 30 MB. The P62 fixes added
          # lib/utils/SafeTimerAccessor.js + P59-P61 test files + P61
          # mfs_db updates, pushing the publish directory to 26.07 MB.
          HOMEY_PUBLISH_MAX_UNCOMPRESSED_MB: "30"
          HOMEY_PUBLISH_SOURCE_MAX_MB: "30"
          HOMEY_ZIGBEE_MAX_TOTAL_COMBOS: "30000"
          HOMEY_ZIGBEE_MAX_DRIVER_COMBOS: "1000"
        run: |
          # v9.0.255 (P62.2): Also export in the shell because npm subshells
          # don't always inherit step env blocks on all GHA runner images.
          export HOMEY_PUBLISH_MAX_UNCOMPRESSED_MB HOMEY_PUBLISH_SOURCE_MAX_MB
          export HOMEY_ZIGBEE_MAX_TOTAL_COMBOS HOMEY_ZIGBEE_MAX_DRIVER_COMBOS
          echo "Limits: HOMEY_PUBLISH_MAX_UNCOMPRESSED_MB=$HOMEY_PUBLISH_MAX_UNCOMPRESSED_MB MB"
          npx homey app build
          node scripts/maintenance/fix-large-images.js
          node scripts/maintenance/optimize-build-images.cjs
          node scripts/maintenance/optimize-build-svgs.cjs
          node scripts/maintenance/sanitize-manifest.cjs app.json .homeybuild/app.json
          npm run prepare-publish
          PUBLISH_DIR="$(node -p "require('path').join(require('os').tmpdir(), 'homey-publish-temp')")"
          if [ ! -d "$PUBLISH_DIR" ]; then
            echo "::error::Prepared publish directory is missing: $PUBLISH_DIR"
            exit 1
          fi
          cd "$PUBLISH_DIR"
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci --omit=dev --ignore-scripts --no-audit --no-fund
          else
            npm install --omit=dev --ignore-scripts --no-audit --no-fund
          fi
          run_homey_cli_publish() {
            if [ -x "$GITHUB_WORKSPACE/node_modules/.bin/homey" ]; then
              HOMEY_HEADLESS=1 HOMEY_PAT="$HOMEY_PAT" "$GITHUB_WORKSPACE/node_modules/.bin/homey" app publish --path "$PUBLISH_DIR"
            else
              HOMEY_HEADLESS=1 HOMEY_PAT="$HOMEY_PAT" npx homey app publish --path "$PUBLISH_DIR"
            fi
          }
          set +e
          publish_output=$(run_homey_cli_publish 2>&1)
          publish_status=$?
          if [ "$publish_status" -ne 0 ] && printf '%s\n' "$publish_output" | grep -Eiq 'Timeout after [0-9]+ms|fetch failed|ETIMEDOUT|ECONNRESET|ECONNABORTED'; then
            echo "::warning::Homey CLI publish hit a transient API timeout; retrying via direct Athom Apps API with extended timeouts."
            fallback_output=$(HOMEY_PAT="$HOMEY_PAT" HOMEY_API_TIMEOUT_MS="${HOMEY_API_TIMEOUT_MS:-60000}" HOMEY_BUILD_POLL_TIMEOUT_MS="${HOMEY_BUILD_POLL_TIMEOUT_MS:-240000}" node "$GITHUB_WORKSPACE/scripts/direct-api-publish.js" --path "$PUBLISH_DIR" 2>&1)
            fallback_status=$?
            publish_output="$(printf '%s\n%s' "$publish_output" "$fallback_output")"
            publish_status=$fallback_status
          fi
          set -e
          printf '%s\n' "$publish_output"
          if [ "$publish_status" -ne 0 ]; then
            if printf '%s\n' "$publish_output" | grep -Eiq 'already been published|currently in review'; then
              echo "::warning::Homey reports this version is already published or in review; continuing so test promotion can proceed."
            else
              exit "$publish_status"
            fi
          fi

      - name: 📊 Post-publish dashboard check
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: |
          sleep 60
          timeout 20 node scripts/automation/dashboard-monitor.js --latest || true

      - name: 🔔 Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 420,
              body: `⚠️ Auto-Fix pipeline failed. Check [run #${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });
