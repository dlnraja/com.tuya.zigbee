name: Gmail Diagnostics Auto-Analysis
on:
  schedule:
    - cron: '30 6 * * *'   # Morning sweep (before daily-everything 08:00)
    - cron: '30 18 * * *'  # Evening sweep (catch afternoon emails)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: gmail-diagnostics
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  fetch-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Pre-check token health
        id: token_check
        run: |
          HF=".github/state/gmail-token-health.json"
          if [ -f "$HF" ]; then
            FAILS=$(node -p "try{JSON.parse(require('fs').readFileSync('$HF','utf8')).consecutiveFails||0}catch{0}")
            if [ "$FAILS" -ge 3 ]; then
              echo "::warning::Gmail OAuth token has $FAILS consecutive failures"
              if [ -z "${{ secrets.GMAIL_APP_PASSWORD }}" ] && [ -z "${{ secrets.HOMEY_PASSWORD }}" ]; then
                echo "::warning::No IMAP fallback configured — skipping fetch (set GMAIL_APP_PASSWORD or HOMEY_PASSWORD)"
                echo "skip=true" >> $GITHUB_OUTPUT
              else
                echo "::notice::IMAP fallback available (GMAIL_APP_PASSWORD or HOMEY_PASSWORD) — continuing"
              fi
            fi
          fi
      - name: Fetch Gmail diagnostics + Gemini analysis
        if: steps.token_check.outputs.skip != 'true'
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node .github/scripts/fetch-gmail-diagnostics.js
      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/diagnostics-state.json .github/state/diagnostics-report.json .github/state/gmail-token-health.json 2>/dev/null || true
          COUNT=$(node -p "try{JSON.parse(require('fs').readFileSync('.github/state/diagnostics-report.json')).emails?.length||0}catch(e){0}")
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          git diff --staged --quiet || git commit -m "Diagnostics update $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase origin master || true
          git push || true
      - name: Auto-rotate refresh token if renewed (requires GH_PAT)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TF=".github/state/_new_refresh_token.txt"
          if [ -f "$TF" ]; then
            if [ -z "$GH_TOKEN" ]; then
              echo "::error::GH_PAT not set - cannot rotate token"
            else
              gh secret set GMAIL_REFRESH_TOKEN < "$TF"
              rm -f "$TF"
              echo "::notice::Gmail token auto-rotated"
            fi
          fi
      - name: Homey Device Diagnostics
        if: always()
        continue-on-error: true
        env:
          HOMEY_PAT_API: ${{ secrets.HOMEY_PAT_API }}
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: node .github/scripts/homey-device-diagnostics.js

      - name: Collect & aggregate diagnostics
        if: always()
        continue-on-error: true
        env:
          HOMEY_PAT_API: ${{ secrets.HOMEY_PAT_API }}
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/collect-diagnostics.js

      - name: Commit all diagnostics
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/ .github/state/diagnostics-*.json .github/state/homey-device-report.json 2>/dev/null || true
          COUNT=$(node -p "try{JSON.parse(require('fs').readFileSync('.github/state/diagnostics-report.json')).count||0}catch(e){0}")
          git diff --staged --quiet || git commit -m "Diagnostics update $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase origin master || true
          git push || true

      - name: "Diagnostic Auto-Resolver (cross-ref → issues/PRs)"
        if: always()
        continue-on-error: true
        timeout-minutes: 10
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/diagnostic-auto-resolver.js

      - name: Commit resolver state
        if: always()
        run: |
          git add .github/state/resolver-*.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Resolved issues update [skip ci]"
          git pull --rebase origin master || true
          git push || true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-report
          path: |
            .github/state/diagnostics-report.json
            diagnostics/summary.json
          retention-days: 30