name: Gmail Diagnostics Auto-Analysis
on:
  schedule:
    - cron: '30 10 * * *'  # 1x daily backup, main coverage by daily-everything 08:00 run
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: gmail-diagnostics
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  fetch-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Fetch Gmail diagnostics + Gemini analysis
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node .github/scripts/fetch-gmail-diagnostics.js
      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/diagnostics-state.json .github/state/diagnostics-report.json
          COUNT=$(node -p "try{JSON.parse(require('fs').readFileSync('.github/state/diagnostics-report.json')).emails?.length||0}catch(e){0}")
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          git diff --staged --quiet || git commit -m "Gmail diagnostics v${VER} $(date -u +%Y-%m-%d): ${COUNT} emails analyzed [skip ci]"
          git pull --rebase origin master || true
          git push || true
      - name: Auto-rotate refresh token if renewed (requires GH_PAT)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TF=".github/state/_new_refresh_token.txt"
          if [ -f "$TF" ]; then
            if [ -z "$GH_TOKEN" ]; then
              echo "::error::GH_PAT not set - cannot rotate token"
            else
              gh secret set GMAIL_REFRESH_TOKEN < "$TF"
              rm -f "$TF"
              echo "::notice::Gmail token auto-rotated"
            fi
          fi
      - name: Homey Device Diagnostics
        if: always()
        continue-on-error: true
        env:
          HOMEY_PAT_API: ${{ secrets.HOMEY_PAT_API }}
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: node .github/scripts/homey-device-diagnostics.js

      - name: Create issues for critical diagnostics
        if: always()
        run: |
          if [ -f .github/state/diagnostics-report.json ]; then
            COUNT=$(jq '.count' .github/state/diagnostics-report.json)
            if [ "$COUNT" -gt "0" ]; then
              echo "::notice::$COUNT new diagnostic reports processed"
            fi
          fi
      - name: Upload diagnostics report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-report
          path: .github/state/diagnostics-report.json
          retention-days: 30