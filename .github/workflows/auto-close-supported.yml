# Universal Tuya Zigbee - Batch Analyze & Respond
# Responses and labels remain available on dlnraja. State transitions are manual.
# JohanBendz is a strict read-only evidence source.

name: "Batch Analyze & Respond"

# <!-- badges:start -->
# [![Batch Close & Respond All](https://github.com/dlnraja/com.tuya.zigbee/actions/workflows/auto-close-supported.yml/badge.svg)](https://github.com/dlnraja/com.tuya.zigbee/actions/workflows/auto-close-supported.yml)
# <!-- badges:end -->


on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no comments/closes)"
        type: boolean
        default: false
      max_items:
        description: "Max items per repo (0=all)"
        type: number
        default: 100
      include_closed:
        description: "Also scan recently closed items"
        type: boolean
        default: false
      force_reprocess:
        description: "Re-evaluate already processed items (for new close rules)"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: batch-close-respond
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: "22"

jobs:
  process-all:
    name: "Process All Issues & PRs"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --prefer-offline --no-audit || npm install

      - name: App stats
        id: stats
        run: |
          V=$(node -p "require('./app.json').version")
          D=$(ls -d drivers/*/ 2>/dev/null | wc -l)
          F=$(grep -rohE '"_T[A-Za-z0-9_]+"' drivers/*/driver.compose.json 2>/dev/null | sort -uf | wc -l || true)
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "drivers=$D" >> $GITHUB_OUTPUT
          echo "fps=$F" >> $GITHUB_OUTPUT
          echo "App v$V — $D drivers — $F fingerprints"

      - name: "Process dlnraja issues & PRs"
        id: own_repo
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || '' }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY || '' }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY || '' }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
          HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          STALE_DAYS: "30"
          MAX_ITEMS: ${{ inputs.max_items || '100' }}
          INCLUDE_CLOSED: ${{ inputs.include_closed || 'false' }}
          FORCE_REPROCESS: ${{ inputs.force_reprocess || 'false' }}
          REPOS: "dlnraja/com.tuya.zigbee"
        run: node .github/scripts/github-issue-manager.js

      - name: "Process JohanBendz issues & PRs"
        id: upstream_repo
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || '' }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY || '' }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY || '' }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
          HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          STALE_DAYS: "14"
          MAX_ITEMS: ${{ inputs.max_items || '200' }}
          INCLUDE_CLOSED: ${{ inputs.include_closed || 'false' }}
          FORCE_REPROCESS: ${{ inputs.force_reprocess || 'false' }}
          REPOS: "JohanBendz/com.tuya.zigbee"
          READ_ONLY_SHADOW: "true"
          DRY_RUN: "true"
        run: node .github/scripts/github-issue-manager.js

      - name: Commit state
        continue-on-error: true
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/ docs/
          if ! git diff --cached --quiet; then
            git commit -m "auto: batch close/respond state update [skip ci]"
            bash scripts/ci/verified-git-push.sh master
          else
            echo "No state changes to push"
          fi

      - name: Upload reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: batch-close-reports
          path: |
            .github/state/issue-manager-report.json
            .github/state/issue-manager-state.json
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Batch Close & Respond All" >> $GITHUB_STEP_SUMMARY
          echo "App v${{ steps.stats.outputs.version }} — ${{ steps.stats.outputs.drivers }} drivers — ${{ steps.stats.outputs.fps }} FPs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Repo | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| dlnraja | ${{ steps.own_repo.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JohanBendz | ${{ steps.upstream_repo.outcome }} |" >> $GITHUB_STEP_SUMMARY
          if [ -f .github/state/issue-manager-report.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const r=require('./.github/state/issue-manager-report.json');
              console.log('### Results');
              console.log('- Issues processed: '+(r.issuesProcessed||0));
              console.log('- PRs processed: '+(r.prsProcessed||0));
              console.log('- Responded: '+(r.responded||0));
              console.log('- Closed: '+(r.closed||0));
              console.log('- New FPs: '+(r.newFingerprints?.length||0));
              if(r.evolutionSummary)console.log('\n### Evolution\n'+r.evolutionSummary);
            " >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          fi
