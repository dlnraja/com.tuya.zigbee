# Weekly Fingerprint Sync - v5.9.0
# Fetches latest fingerprints from Z2M/ZHA, compares with local drivers,
# auto-adds safe Tuya _T* patterns, and creates PR for review.
# Runs every Monday at 06:00 UTC.
# Forum sources: 140352 (dlnraja), 26439 (JohanBendz), 146735 (Tuya Smart Life), 89271 (Device Archive)

name: "Weekly Fingerprint Sync"

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no changes committed)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: weekly-fingerprint-sync
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  sync:
    name: "Fetch & Sync Fingerprints"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Step 1: Fetch fingerprints from Z2M sources
      - name: Fetch Z2M fingerprints
        run: node scripts/automation/fetch-z2m-fingerprints.js

      # Step 2: Auto-add safe Tuya patterns
      - name: Auto-add safe fingerprints
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: node scripts/automation/auto-add-fingerprints.js

      - name: Auto-add (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: node scripts/automation/auto-add-fingerprints.js --dry-run

      # Step 3: Validate all JSON
      - name: Validate JSON
        run: |
          echo "Validating driver.compose.json files..."
          FAIL=0
          for f in drivers/*/driver.compose.json; do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"; then
              echo "FAIL: $f"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then echo "JSON validation failed!"; exit 1; fi
          echo "All JSON valid."

      # Step 4: Check for changes
      - name: Check changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No fingerprint changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            ADDED=$(git diff --numstat -- 'drivers/*/driver.compose.json' | awk '{s+=$1}END{print s+0}')
            echo "lines_added=$ADDED" >> $GITHUB_OUTPUT
            echo "Detected $ADDED lines of fingerprint changes."
          fi

      # Step 5: Create PR with changes
      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Weekly FP sync $(date +%Y-%m-%d): auto-added safe Tuya patterns from Z2M/ZHA"
          title: "Weekly Fingerprint Sync (${{ steps.changes.outputs.lines_added }} new lines)"
          body: |
            ## Automated Weekly Fingerprint Sync

            This PR was auto-generated by the weekly fingerprint sync workflow.

            ### What changed
            - Fetched latest fingerprints from Z2M (tuya, sonoff, danfoss, schneider, legrand, bosch, ikea, xiaomi)
            - Auto-added safe Tuya _T* manufacturer patterns to appropriate drivers
            - All JSON validated

            ### Reports
            See data/community-sync/sync-report.md for full details.
            See data/community-sync/missing-fingerprints.json for non-Tuya items needing manual review.

            ### Review checklist
            - [ ] Check new fingerprints are in the correct drivers
            - [ ] Verify no duplicate entries
            - [ ] Validate app with npx homey app validate
          branch: auto/weekly-fingerprint-sync
          labels: fingerprints,automated
          delete-branch: true

      # Step 6: Upload artifacts
      - name: Upload sync reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fingerprint-sync-report
          path: data/community-sync/
          retention-days: 30
