name: "Tuya Deep Diagnostics Recovery"

on:
  workflow_dispatch:
    inputs:
      report_id:
        description: "Optional Homey diagnostic/report ID to correlate"
        required: false
      good_build:
        description: "Optional known-good Athom build id for dashboard comparison"
        required: false
      bad_build:
        description: "Optional failing Athom build id for dashboard comparison"
        required: false
      download_archives:
        description: "Download build archives during dashboard comparison"
        type: boolean
        default: false

env:
  NODE_VERSION: "22"
  NODE_OPTIONS: "--dns-result-order=ipv4first"

permissions:
  contents: read
  issues: read

concurrency:
  group: tuya-deep-diag-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit || npm install

      - name: Crash regression guard - Homey timer context
        run: npm run check:timer-context

      - name: Fetch Gmail crash diagnostics
        continue-on-error: true
        timeout-minutes: 8
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: "true"
        run: node .github/scripts/fetch-gmail-diagnostics.js

      - name: Homey dashboard and device diagnostics
        continue-on-error: true
        timeout-minutes: 8
        env:
          HOMEY_PAT_API: ${{ secrets.HOMEY_PAT_API }}
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/automation/dashboard-monitor.js --latest --json || true
          node .github/scripts/homey-device-diagnostics.js || true
          node .github/scripts/collect-diagnostics.js || true

      - name: Athom Developer Dashboard full diag
        continue-on-error: true
        timeout-minutes: 10
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          TARGET_APP_ID: com.dlnraja.tuya.zigbee
        run: |
          npm install puppeteer --no-save
          ARGS=()
          if [ -n "${{ github.event.inputs.good_build }}" ]; then ARGS+=("${{ github.event.inputs.good_build }}"); fi
          if [ -n "${{ github.event.inputs.bad_build }}" ]; then ARGS+=("${{ github.event.inputs.bad_build }}"); fi
          if [ "${{ github.event.inputs.download_archives }}" = "true" ]; then ARGS+=("--download"); fi
          node .github/scripts/athom-puppeteer-full-diag.js "${ARGS[@]}"

      - name: Privacy gate
        if: always()
        run: node .github/scripts/privacy-redactor.js diagnostics .github/state/diagnostics-report.json .github/state/diagnostics-crossref.yml .github/state/homey-device-report.json .github/state/dashboard-monitor-report.json screenshots/full-diag-report.json

      - name: Upload sanitized diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tuya-deep-diag-${{ github.run_id }}
          path: |
            diagnostics/summary.json
            .github/state/diagnostics-report.json
            .github/state/homey-device-report.json
            .github/state/dashboard-monitor-report.json
            screenshots/full-diag-report.json
          if-no-files-found: warn
          retention-days: 14
