# Universal Tuya Zigbee - Code Quality Checks
# v5.8.88 - Updated 2026-02-10
# Checks for common bugs and code patterns

name: 🔍 Code Quality Check

on:
  schedule:
    - cron: '0 3 * * 3'  # Weekly Wednesday 03:00 UTC — periodic quality check
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
    paths:
      - '**.js'
      - 'drivers/**/*.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: "22"

jobs:
  quality:
    name: 🔧 Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: 📦 Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔍 Check Common Bugs
        run: |
          echo "## 🔍 Code Quality" >> $GITHUB_STEP_SUMMARY

          # Settings keys bug
          if grep -rq "zb_modelId\|zb_manufacturerName" lib/ drivers/ --include="*.js" 2>/dev/null; then
            echo "❌ Wrong settings keys (use zb_model_id)" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Settings keys OK" >> $GITHUB_STEP_SUMMARY
          fi

          # Flow card bug
          if grep -rq "titleFormatted.*\[\[device\]\]" drivers/ --include="*.json" 2>/dev/null; then
            echo "❌ titleFormatted [[device]] bug" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Flow cards OK" >> $GITHUB_STEP_SUMMARY
          fi

          # Import bug
          if grep -rq "require.*TuyaZigbeeDriver" drivers/ --include="*.js" 2>/dev/null; then
            echo "❌ Wrong TuyaZigbeeDriver import" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Imports OK" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🔍 Check getConditionCard vs getDeviceConditionCard
        run: |
          # Check for wrong flow card method usage
          WRONG_METHOD=$(grep -rn "getConditionCard" drivers/ --include="*.js" 2>/dev/null | grep -v "getDeviceConditionCard" | wc -l || true)
          if [ "$WRONG_METHOD" -gt 0 ]; then
            echo "⚠️ Found $WRONG_METHOD uses of getConditionCard (check if should be getDeviceConditionCard)" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Flow card methods OK" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🔍 Deep Bug Checks
        run: |
          echo "### Deep Checks" >> $GITHUB_STEP_SUMMARY
          BAD=$(grep -rl "require.*lib/TuyaZigbeeDevice'" drivers/ --include="*.js" 2>/dev/null | wc -l || true)
          [ "$BAD" -gt 0 ] && echo "❌ Wrong TuyaZigbeeDevice path ($BAD files)" >> $GITHUB_STEP_SUMMARY || echo "✅ Import paths OK" >> $GITHUB_STEP_SUMMARY
          DUP=$(grep -rohE '"_T[^"]+"' drivers/*/driver.compose.json 2>/dev/null | sort | uniq -d | wc -l || true)
          [ "$DUP" -gt 0 ] && echo "⚠️ $DUP duplicate fingerprints across drivers" >> $GITHUB_STEP_SUMMARY || echo "✅ No duplicate FPs" >> $GITHUB_STEP_SUMMARY

      - name: 🌡️ Sensor Checks
        run: |
          echo "### Sensor Checks" >> $GITHUB_STEP_SUMMARY
          for d in soil_sensor air_quality temp_hum_sensor; do
            [ -f "drivers/$d/device.js" ] && grep -q "_handleDP" "drivers/$d/device.js" 2>/dev/null \
              && echo "✅ $d DP OK" >> $GITHUB_STEP_SUMMARY \
              || echo "⚠️ $d no DP" >> $GITHUB_STEP_SUMMARY
          done

      - name: 🔍 JSON Validation
        run: |
          echo "### JSON Validation" >> $GITHUB_STEP_SUMMARY
          FAIL=0
          for f in drivers/*/driver.compose.json; do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>/dev/null; then
              echo "❌ Invalid JSON: $f" >> $GITHUB_STEP_SUMMARY
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "✅ All driver JSON valid" >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Dead Code Detection
        run: |
          echo "### Dead Code" >> $GITHUB_STEP_SUMMARY
          DEAD=0
          for f in lib/*.js; do
            NAME=$(basename "$f" .js)
            if grep -q '@deprecated' "$f" 2>/dev/null; then
              REFS=$(grep -rl "$NAME" lib/ drivers/ --include='*.js' 2>/dev/null | grep -v "$f" | wc -l || true)
              if [ "$REFS" -eq 0 ]; then
                echo "⚠️ Deprecated + unused: $f" >> $GITHUB_STEP_SUMMARY
                DEAD=$((DEAD+1))
              fi
            fi
          done
          [ $DEAD -eq 0 ] && echo "✅ No dead code found" >> $GITHUB_STEP_SUMMARY || echo "$DEAD deprecated file(s) can be removed" >> $GITHUB_STEP_SUMMARY

      - name: 📊 Stats
        run: |
          DRIVERS=$(ls -d drivers/*/ 2>/dev/null | wc -l)
          MFRS=$(grep -rohE '"_T[A-Za-z0-9_]+"' drivers/*/driver.compose.json 2>/dev/null | sort -uf | wc -l || true)
          FLOWCARDS=$(grep -c '"id":' drivers/*/driver.flow.compose.json 2>/dev/null | awk -F: '{sum+=$2} END {print sum}' || true)
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Drivers | $DRIVERS |" >> $GITHUB_STEP_SUMMARY
          echo "| Manufacturer IDs | $MFRS |" >> $GITHUB_STEP_SUMMARY
          echo "| Flow Cards | $FLOWCARDS |" >> $GITHUB_STEP_SUMMARY
