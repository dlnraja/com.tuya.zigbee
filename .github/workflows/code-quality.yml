# TITAN Protocol v5 — Code Quality Check
# Updated with TITAN v5 integrity checks
name: 🔍 Code Quality Check

on:
  schedule:
    - cron: '0 3 * * 3'  # Weekly Wednesday 03:00 UTC
  pull_request:
    branches: [master, main, stable-v5]
  push:
    branches: [master, main, stable-v5]
    paths: ['**.js', 'drivers/**/*.json']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  quality:
    name: 🔧 Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci || npm install

      - name: 🔍 TITAN v2 Pattern Checks
        run: |
          set +e  # Don't exit on test failures — we want to run ALL checks
          echo "## 🔍 TITAN v2 Code Quality" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          FAIL=0

          # 1. Raw setCapabilityValue
          raw_set=$(grep -r "this\.setCapabilityValue(" drivers/ --include="device.js" -l 2>/dev/null | wc -l)
          if [ "$raw_set" -eq 0 ]; then echo "✅ Raw setCapabilityValue: 0" >> $GITHUB_STEP_SUMMARY; else echo "❌ Raw setCapabilityValue: $raw_set" >> $GITHUB_STEP_SUMMARY; FAIL=1; fi

          # 2. console.log in drivers
          console=$(grep -r "console\.\(log\|error\|warn\)(" drivers/ --include="device.js" -l 2>/dev/null | wc -l)
          if [ "$console" -eq 0 ]; then echo "✅ console.log in drivers: 0" >> $GITHUB_STEP_SUMMARY; else echo "❌ console.log in drivers: $console" >> $GITHUB_STEP_SUMMARY; FAIL=1; fi

          # 3. Empty manufacturerName
          empty_mfr=$(grep -r '"manufacturerName":\s*\[\s*\]' drivers/ --include="*.json" -l 2>/dev/null | wc -l)
          if [ "$empty_mfr" -eq 0 ]; then echo "✅ Empty manufacturerName: 0" >> $GITHUB_STEP_SUMMARY; else echo "❌ Empty manufacturerName: $empty_mfr" >> $GITHUB_STEP_SUMMARY; FAIL=1; fi

          # 4. Wildcard fingerprints
          wildcards=$(grep -r "_TZE200_\*\|_TZ3000_\*\|_TZE204_\*" drivers/ --include="*.json" -l 2>/dev/null | wc -l)
          if [ "$wildcards" -eq 0 ]; then echo "✅ Wildcard fingerprints: 0" >> $GITHUB_STEP_SUMMARY; else echo "❌ Wildcard fingerprints: $wildcards" >> $GITHUB_STEP_SUMMARY; FAIL=1; fi

          # 5. titleFormatted [[device]]
          title_fmt=$(grep -r 'titleFormatted.*\[\[device\]\]' drivers/ --include="*.json" -l 2>/dev/null | wc -l)
          if [ "$title_fmt" -eq 0 ]; then echo "✅ titleFormatted [[device]]: 0" >> $GITHUB_STEP_SUMMARY; else echo "❌ titleFormatted [[device]]: $title_fmt" >> $GITHUB_STEP_SUMMARY; FAIL=1; fi

          # 6. Wrong import paths
          wrong_import=$(grep -r "require('../../lib/TuyaZigbeeDevice')" drivers/ --include="device.js" -l 2>/dev/null | wc -l)
          if [ "$wrong_import" -eq 0 ]; then echo "✅ Wrong import paths: 0" >> $GITHUB_STEP_SUMMARY; else echo "❌ Wrong import paths: $wrong_import" >> $GITHUB_STEP_SUMMARY; FAIL=1; fi

          # 7. Linear battery formulas
          linear_bat=$(grep -r "(voltage - 2\.\|voltage - 3\." drivers/ --include="device.js" -l 2>/dev/null | wc -l)
          if [ "$linear_bat" -eq 0 ]; then echo "✅ Linear battery formulas: 0" >> $GITHUB_STEP_SUMMARY; else echo "❌ Linear battery formulas: $linear_bat" >> $GITHUB_STEP_SUMMARY; FAIL=1; fi

          # 8. UTF-16 JSON loading
          utf16=$(grep -r "JSON\.parse(fs\.readFileSync.*'utf8'" lib/ --include="*.js" -l 2>/dev/null | wc -l)
          if [ "$utf16" -eq 0 ]; then echo "✅ UTF-16 JSON loading: 0" >> $GITHUB_STEP_SUMMARY; else echo "❌ UTF-16 JSON loading: $utf16" >> $GITHUB_STEP_SUMMARY; FAIL=1; fi

          exit $FAIL

      - name: 🔍 JSON Validation
        run: |
          echo "### JSON Validation" >> $GITHUB_STEP_SUMMARY
          FAIL=0
          for f in drivers/*/driver.compose.json; do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f'))" 2>/dev/null; then
              echo "❌ Invalid JSON: $f" >> $GITHUB_STEP_SUMMARY
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "✅ All driver JSON valid" >> $GITHUB_STEP_SUMMARY

      - name: 🔍 TITAN v5 Integrity Checks
        run: |
          echo "## 🔍 TITAN v5 Integrity Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 9. Bare setTimeout/setInterval in device files
          bare_timeout=$(grep -rn "setTimeout\|setInterval" drivers/ --include="device.js" 2>/dev/null | grep -v "this\.homey\." | grep -v "clearTimeout\|clearInterval" | grep -v "// " | wc -l)
          [ "$bare_timeout" -eq 0 ] && echo "✅ Bare setTimeout/setInterval in drivers: 0" >> $GITHUB_STEP_SUMMARY || echo "❌ Bare setTimeout/setInterval in drivers: $bare_timeout" >> $GITHUB_STEP_SUMMARY

          # 10. Bare setTimeout/setInterval in lib files
          bare_timeout_lib=$(grep -rn "setTimeout\|setInterval" lib/ --include="*.js" 2>/dev/null | grep -v "this\.homey\." | grep -v "this\.device\.homey\." | grep -v "homey\.setTimeout\|homey\.setInterval" | grep -v "clearTimeout\|clearInterval" | grep -v "// " | wc -l)
          [ "$bare_timeout_lib" -eq 0 ] && echo "✅ Bare setTimeout/setInterval in lib: 0" >> $GITHUB_STEP_SUMMARY || echo "❌ Bare setTimeout/setInterval in lib: $bare_timeout_lib" >> $GITHUB_STEP_SUMMARY

          # 11. Missing _destroyed guard in async callbacks (informational only)
          missing_guard=$(grep -rn "async.*.(" drivers/ --include="device.js" 2>/dev/null | grep -v "_destroyed" | grep -v "// " | wc -l || echo 0)
          echo "ℹ️  Async callbacks without _destroyed guard (review needed): $missing_guard" >> $GITHUB_STEP_SUMMARY

          # 12. Flow card duplicate IDs across drivers
          if [ -f scripts/ci/check-flow-ids.js ]; then
            node scripts/ci/check-flow-ids.js 2>/dev/null && echo "✅ Flow card IDs: globally unique" >> $GITHUB_STEP_SUMMARY || echo "❌ Flow card ID conflicts detected" >> $GITHUB_STEP_SUMMARY
          fi

          # 13. TS0601 catchall detection
          if [ -f scripts/validation/check-ts0601-catchall.js ]; then
            node scripts/validation/check-ts0601-catchall.js --json 2>/dev/null | tee /tmp/ts0601.json > /dev/null
            ts0601_violations=$(jq -r '.totalViolations // 0' /tmp/ts0601.json 2>/dev/null || echo "?")
            [ "$ts0601_violations" = "0" ] && echo "✅ TS0601 catchall violations: 0" >> $GITHUB_STEP_SUMMARY || echo "❌ TS0601 catchall violations: $ts0601_violations" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  TS0601 catchall script not found" >> $GITHUB_STEP_SUMMARY
          fi

          # 14. Fingerprint collision detection
          if [ -f scripts/validation/check-driver-collisions.js ]; then
            node scripts/validation/check-driver-collisions.js 2>/dev/null && echo "✅ Fingerprint collisions: 0" >> $GITHUB_STEP_SUMMARY || echo "❌ Fingerprint collisions detected" >> $GITHUB_STEP_SUMMARY
          fi

          # 15. Energy divisor validation
          if [ -f scripts/validation/check-energy-divisor.js ]; then
            node scripts/validation/check-energy-divisor.js --json 2>/dev/null | tee /tmp/energy-divisor.json > /dev/null
            energy_violations=$(jq -r '.totalViolations // 0' /tmp/energy-divisor.json 2>/dev/null || echo "?")
            [ "$energy_violations" = "0" ] && echo "✅ Energy divisor violations: 0" >> $GITHUB_STEP_SUMMARY || echo "❌ Energy divisor violations: $energy_violations" >> $GITHUB_STEP_SUMMARY
          fi

          # 16. Flow card ID validation
          if [ -f scripts/ci/check-flow-ids.js ]; then
            node scripts/ci/check-flow-ids.js --json 2>/dev/null | tee /tmp/flowids.json > /dev/null
            flow_dupes=$(jq -r '.duplicates // 0' /tmp/flowids.json 2>/dev/null || echo "?")
            [ "$flow_dupes" = "0" ] && echo "✅ Flow card ID duplicates: 0" >> $GITHUB_STEP_SUMMARY || echo "❌ Flow card ID duplicates: $flow_dupes" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🔍 TITAN Pre-Commit Gate
        run: node scripts/ci/titan-pre-commit.js --json

      - name: 🔍 Validate (npx)
        run: npx homey app validate --level publish

      - name: 📊 Stats
        run: |
          DRIVERS=$(ls -d drivers/*/ 2>/dev/null | wc -l)
          MFRS=$(grep -rohE '"_T[A-Za-z0-9_]+"' drivers/*/driver.compose.json 2>/dev/null | sort -uf | wc -l || true)
          FLOWCARDS=$(grep -c '"id":' drivers/*/driver.flow.compose.json 2>/dev/null | awk -F: '{sum+=$2} END {print sum}' || true)
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Drivers | $DRIVERS |" >> $GITHUB_STEP_SUMMARY
          echo "| Manufacturer IDs | $MFRS |" >> $GITHUB_STEP_SUMMARY
          echo "| Flow Cards | $FLOWCARDS |" >> $GITHUB_STEP_SUMMARY
