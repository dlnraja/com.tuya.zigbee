# Code Quality Check (PR + push)
#
# Re-enabled after P10 with:
#   - upstream-guard (no writes to Johan)
#   - concurrency control
#   - path filter
#   - 15 min timeout
#   - DRY_RUN by default for sensitive ops
#
# Triggers:
#   - PR to master/main/stable-v5
#   - Push to those branches on .js, .json, .yml files
#   - Weekly schedule (Wednesdays 03:00 UTC)
#   - Manual dispatch

name: code-quality

on:
  pull_request:
    branches: [master, main, stable-v5]
  push:
    branches: [master, main, stable-v5]
    paths:
      - '**/*.js'
      - 'drivers/**/*.json'
      - '.github/workflows/**'
      - 'package*.json'
  schedule:
    - cron: '0 3 * * 3'  # Weekly Wednesday
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: read

concurrency:
  group: code-quality
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

defaults:
  run:
    shell: bash

jobs:
  upstream-guard:
    name: Upstream Guard
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 5
      - name: Verify no upstream writes
        run: |
          if grep -r "JohanBendz/com.tuya.zigbee" .github/workflows/ 2>/dev/null | grep -v upstream-guard.yml | grep -q "push\|create\|POST"; then
            echo "::error::Workflow has potential upstream write — review required"
            exit 1
          fi
          echo "✓ No upstream writes detected"

  code-quality:
    name: Quality Checks
    needs: upstream-guard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install deps
        run: npm ci --prefer-offline --no-audit
        if: hashFiles('package-lock.json') != ''
        # Fallback for repos without lock file

      - name: Install deps (no lock)
        run: npm install --prefer-offline --no-audit --no-save
        if: hashFiles('package-lock.json') == ''

      - name: Lint JS
        id: lint
        run: |
          if [ -f .eslintrc* ] || [ -f eslint.config.* ]; then
            npx eslint --max-warnings=0 . 2>&1 | tail -50 || true
          else
            echo "(no eslint config, skipping)"
          fi
        continue-on-error: true

      - name: Voice safety check
        id: voice
        run: npm run check:voice 2>&1 | tail -50
        continue-on-error: true

      - name: JSON schema validation
        id: json
        run: |
          ERRORS=0
          for f in drivers/*/driver.compose.json; do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>/dev/null; then
              echo "  ❌ INVALID JSON: $f"
              ERRORS=$((ERRORS+1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS invalid driver.compose.json files"
            exit 1
          fi
          echo "✓ All driver.compose.json files valid"

      - name: Driver health check
        id: health
        run: |
          if [ -f tools/ci/driver-health-check.js ]; then
            node tools/ci/driver-health-check.js 2>&1 | tail -30 || true
          fi
        continue-on-error: true

      - name: Build summary
        if: always()
        run: |
          {
            echo "## 🔍 Code Quality — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo "- Lint: ${{ steps.lint.outcome == 'success' && '✅' || '⚠️' }}"
            echo "- JSON: ${{ steps.json.outcome == 'success' && '✅' || '❌' }}"
            echo "- Health: ${{ steps.health.outcome == 'success' && '✅' || '⚠️' }}"
            echo ""
            echo "**Run**: ${{ github.run_id }}"
            echo "**Trigger**: ${{ github.event_name }} ${{ github.event.pull_request.head.ref || github.ref_name }}"
          } >> $GITHUB_STEP_SUMMARY
