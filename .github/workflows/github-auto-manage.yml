name: "GitHub Auto-Manage Issues & PRs"

on:
  schedule:
    - cron: '30 9 * * *'  # 1x daily backup, main coverage by daily-everything
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run"
        type: boolean
        default: false
      stale_days:
        description: "Stale days"
        type: number
        default: 30

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: github-manage
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  manage:
    name: "Triage, Respond & Close"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # === AI providers — circular chain (ai-helper.js) ===
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || '' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY || '' }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY || '' }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install

      - name: App stats
        id: stats
        run: |
          V=$(node -p "require('./app.json').version")
          D=$(ls -d drivers/*/ 2>/dev/null | wc -l)
          F=$(grep -rohE '"_T[A-Za-z0-9_]+"' drivers/*/driver.compose.json 2>/dev/null | sort -uf | wc -l || true)
          echo "version=$V drivers=$D fps=$F" 
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Manage Issues & PRs
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          STALE_DAYS: ${{ inputs.stale_days || '30' }}
          MAX_ITEMS: "100"
          INCLUDE_CLOSED: "false"
          REPOS: "dlnraja/com.tuya.zigbee,JohanBendz/com.tuya.zigbee"
          GEMINI_MAX_TIER: "1"
          RATE_LIMIT_SLEEP: "5000"
        run: node .github/scripts/github-issue-manager.js

      - name: Commit state & docs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/ docs/
          git diff --cached --quiet || git commit -m "chore: GitHub auto-manage state update [skip ci]"
          git pull --rebase origin master || true
          git push || true

      - name: Upload report
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v4
        if: always()
        with:
          name: issue-manager-report
          path: .github/state/issue-manager-report.json
          retention-days: 30

      # ===== DRAFT → TEST (Puppeteer + API fallback) =====
      - name: Install Puppeteer
        if: always()
        continue-on-error: true
        run: npm install puppeteer --no-save
      - name: "Tier 1: Promote via Browser (Puppeteer)"
        if: always()
        id: promote_puppeteer
        continue-on-error: true
        timeout-minutes: 5
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
        run: node .github/scripts/auto-promote-puppeteer.js
      - name: "Tier 2: Promote via API (fallback)"
        if: always() && steps.promote_puppeteer.outcome != 'success'
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: |
          if [ -z "$HOMEY_PAT" ]; then exit 0; fi
          node .github/scripts/auto-publish-draft.js || true

      # FORUM POSTING REMOVED v7.4.15 - No automatic forum posting (bot flagged by moderators Feb 2026)

      - name: Summary
        if: always()
        run: |
          echo "## GitHub Auto-Manage" >> $GITHUB_STEP_SUMMARY
          echo "App v${{ steps.stats.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          if [ -f .github/state/issue-manager-report.json ]; then
            node -e "const r=require('./.github/state/issue-manager-report.json');console.log('- Responded:',r.responded);console.log('- Closed:',r.closed);console.log('- New FPs:',r.newFingerprints?.length||0);console.log('- Bug investigations:',r.bugInvestigations||0);if(r.evolutionSummary)console.log('\n### Evolution\n'+r.evolutionSummary)" >> $GITHUB_STEP_SUMMARY
          fi

