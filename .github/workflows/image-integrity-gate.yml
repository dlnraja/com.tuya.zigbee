name: Image Integrity Gate

# ════════════════════════════════════════════════════════════════════════════
# Image Integrity Gate — v8.1.36+
#
# HOMEY APP STORE SPECS (from `homey app validate --level publish`):
#   assets/images/small.png  → 250×175 (landscape)
#   assets/images/large.png  → 500×350 (landscape)
#   assets/images/xlarge.png → 1000×700 (landscape)
#   drivers/*/assets/images/small.png → 75×75 REQUIRED
#
# ARCHIVE BUDGET (2026-05-30):
#   large.png + xlarge.png excluded via .homeyignore → archive < 15MB
# ════════════════════════════════════════════════════════════════════════════

on:
  push:
    paths:
      - 'drivers/**/assets/images/small.png'
      - 'assets/images/small.png'
      - 'drivers/**/assets/images/large.png'
      - 'assets/images/large.png'
  pull_request:
    paths:
      - 'drivers/**/assets/images/small.png'
      - 'assets/images/small.png'
  workflow_dispatch:
    inputs:
      fail_on_warn:
        description: 'Treat large/xlarge warnings as errors'
        required: false
        default: 'false'

defaults:
  run:
    shell: bash

jobs:
  image-dimensions:
    name: Check PNG Dimensions
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate image dimensions
        run: |
          node - <<'EOF'
          const fs   = require('fs');
          const path = require('path');

          // ── Read PNG dimensions from IHDR chunk (no external deps) ──────
          function pngDims(fp) {
            try {
              const buf = fs.readFileSync(fp);
              if (buf.length < 24 || buf[0] !== 0x89 || buf[1] !== 0x50) return null;
              return { w: buf.readUInt32BE(16), h: buf.readUInt32BE(20) };
            } catch (_) { return null; }
          }

          const ROOT = process.cwd();
          const errors   = [];
          const warnings = [];
          let checked = 0;

          // ── App-level images — specs from `homey app validate --level publish` ──
          const APP_IMAGES = [
            { rel: 'assets/images/small.png',  expW: 250, expH: 175, blocking: false }, // warn only — CLI is authoritative
            { rel: 'assets/images/large.png',  expW: 500, expH: 350, blocking: false }, // warn only — excluded from archive
            { rel: 'assets/images/xlarge.png', expW: 1000, expH: 700, blocking: false }, // warn only — excluded from archive
          ];
          for (const { rel, expW, expH, blocking } of APP_IMAGES) {
            const fp = path.join(ROOT, rel);
            if (!fs.existsSync(fp)) {
              if (blocking) errors.push(`MISSING (required): ${rel}`);
              else warnings.push(`MISSING (optional — excluded from archive): ${rel}`);
              continue;
            }
            const d = pngDims(fp);
            checked++;
            if (!d) {
              if (blocking) errors.push(`NOT_PNG: ${rel}`);
              else warnings.push(`NOT_PNG: ${rel}`);
              continue;
            }
            if (d.w !== expW || d.h !== expH) {
              const msg = `WRONG_DIM: ${rel} = ${d.w}×${d.h} (expected ${expW}×${expH})`;
              if (blocking) errors.push(msg); else warnings.push(msg);
            } else {
              console.log(`  ✅ ${rel} (${d.w}×${d.h})`);
            }
          }

          // ── Driver images ────────────────────────────────────────────────
          // ARCHIVE STRATEGY: only small.png (75×75) is REQUIRED in the archive.
          // large.png + xlarge.png are excluded from .homeyignore → non-blocking.
          const driversDir = path.join(ROOT, 'drivers');
          if (!fs.existsSync(driversDir)) {
            errors.push('MISSING: drivers/ directory');
          } else {
            const driverIds = fs.readdirSync(driversDir)
              .filter(d => fs.statSync(path.join(driversDir, d)).isDirectory());

            const DRIVER_RULES = [
              { file: 'small.png',  expW: 75,  expH: 75,  blocking: true  }, // REQUIRED in archive
              { file: 'large.png',  expW: 500, expH: 500, blocking: false }, // WARNING — excluded from archive
              { file: 'xlarge.png', expW: 500, expH: 500, blocking: false }, // WARNING — excluded from archive
            ];

            let ok = 0, fail = 0, warn = 0;
            for (const dId of driverIds) {
              const imgDir = path.join(driversDir, dId, 'assets', 'images');
              let driverOk = true;
              for (const { file, expW, expH, blocking } of DRIVER_RULES) {
                const fp = path.join(imgDir, file);
                if (!fs.existsSync(fp)) {
                  if (blocking) { errors.push(`MISSING: drivers/${dId}/assets/images/${file}`); driverOk = false; }
                  // non-blocking: silently skip (excluded from archive anyway)
                  continue;
                }
                const d = pngDims(fp);
                checked++;
                if (!d) {
                  if (blocking) { errors.push(`NOT_PNG: drivers/${dId}/assets/images/${file}`); driverOk = false; }
                  else warnings.push(`NOT_PNG: drivers/${dId}/assets/images/${file}`);
                  continue;
                }
                if (d.w !== expW || d.h !== expH) {
                  const msg = `WRONG_DIM: drivers/${dId}/assets/images/${file} = ${d.w}×${d.h} (expected ${expW}×${expH})`;
                  if (blocking) { errors.push(msg); driverOk = false; }
                  else { warnings.push(msg); warn++; }
                }
              }
              if (driverOk) ok++; else fail++;
            }
            console.log(`\n📊 Drivers checked: ${ok} OK, ${fail} FAIL, ${warn} warnings (out of ${driverIds.length} total)`);
          }

          // ── Report ───────────────────────────────────────────────────────
          console.log(`\n📸 Images checked: ${checked}`);
          console.log('ℹ️  Note: large.png + xlarge.png are excluded from Athom archive via .homeyignore');
          if (warnings.length) {
            console.warn('\n⚠️  WARNINGS (' + warnings.length + ') — non-blocking (files excluded from archive):');
            warnings.slice(0, 10).forEach(w => console.warn('  ' + w));
            if (warnings.length > 10) console.warn(`  ... and ${warnings.length - 10} more`);
          }
          if (errors.length) {
            console.error('\n❌ ERRORS (' + errors.length + ') — blocking:');
            errors.forEach(e => console.error('  ' + e));
            process.exit(1);
          } else {
            console.log('\n✅ All required image dimensions are correct');
          }
          EOF

      - name: Upload dimension report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: image-dimension-report-${{ github.run_number }}
          path: |
            drivers/**/assets/images/small.png
            assets/images/
          retention-days: 7
