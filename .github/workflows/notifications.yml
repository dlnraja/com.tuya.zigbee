name: Secure Notifications (Enhanced)

on:
  issues:
    types: [opened, closed]
  pull_request:
    types: [opened, closed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify-maintainers:
    runs-on: ubuntu-latest
    if: "contains(github.event.repository.name, 'tuya.zigbee')"
    steps:
      - name: Fetch and Dump Diagnostics securely
        run: |
          npm ci || npm install
          node .github/scripts/homey-device-diagnostics.js || true
          
      - name: Send Secure Email Notification
        run: |
          echo "Event triggered in the repository: ${{ github.event_name }}"
          echo "Details: ${{ github.event.issue.html_url || github.event.pull_request.html_url }}"
