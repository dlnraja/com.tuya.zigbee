name: Secure Notifications (Enhanced)

on:
  issues:
    types: [opened, closed]
  pull_request:
    types: [opened, closed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash

jobs:
  notify-maintainers:
    runs-on: ubuntu-latest
    if: "contains(github.event.repository.name, 'tuya.zigbee')"
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Fetch and Dump Diagnostics securely
        continue-on-error: true
        run: |
          npm ci --prefer-offline --no-audit || npm install
          node .github/scripts/homey-device-diagnostics.js || true
          
      - name: Send Secure Email Notification
        run: |
          echo "Event triggered in the repository: ${{ github.event_name }}"
          echo "Details: ${{ github.event.issue.html_url || github.event.pull_request.html_url }}"

