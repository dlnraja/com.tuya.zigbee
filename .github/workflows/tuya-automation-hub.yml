name: Tuya Automation Hub

on:
  schedule:
    - cron: '0 */6 * * *'
    - cron: '0 3 * * 1,4'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which scanners to run'
        type: choice
        default: 'all'
        options:
          - all
          - forum-only
          - github-only
          - enrichment-only
          - forum-update-only
          - nightly-process
      dry_run:
        description: 'Dry run (no posts)'
        type: boolean
        default: true
      topics:
        description: 'Forum topic IDs'
        type: string
        default: '140352'

permissions:
  contents: write
  issues: write

concurrency:
  group: tuya-automation
  cancel-in-progress: true

jobs:
  forum-responder:
    name: Forum Responder
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 */6 * * *' ||
      github.event_name == 'workflow_dispatch' && (inputs.mode == 'all' || inputs.mode == 'forum-only')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run Forum Responder
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          APIFREELLM_KEY: ${{ secrets.APIFREELLM_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run && 'true' || 'false' }}
          FORUM_TOPICS: ${{ inputs.topics || '140352,26439' }}
        run: node .github/scripts/forum-responder.js
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/
          FILES=$(git diff --cached --name-only | wc -l)
          git diff --cached --quiet || git commit -m "🤖 Forum responder: scanned topics 140352+26439, ${FILES} file(s) updated [skip ci]"
          git push || true

  github-scanner:
    name: GitHub Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 3 * * 1,4' ||
      github.event_name == 'workflow_dispatch' && (inputs.mode == 'all' || inputs.mode == 'github-only')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run GitHub Scanner
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          APIFREELLM_KEY: ${{ secrets.APIFREELLM_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'true' }}
        run: node .github/scripts/github-scanner.js
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/
          FILES=$(git diff --cached --name-only | wc -l)
          git diff --cached --quiet || git commit -m "🔍 GitHub scanner: triaged issues/PRs from dlnraja+JohanBendz, ${FILES} file(s) updated [skip ci]"
          git push || true

  enrichment-scanner:
    name: Enrichment Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 3 * * 1,4' ||
      github.event_name == 'workflow_dispatch' && (inputs.mode == 'all' || inputs.mode == 'enrichment-only')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run Enrichment Scanner
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          APIFREELLM_KEY: ${{ secrets.APIFREELLM_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node .github/scripts/enrichment-scanner.js
      - name: Scan Public APIs (davemachado/public-api)
        continue-on-error: true
        run: node .github/scripts/scan-public-apis.js
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/
          FILES=$(git diff --cached --name-only | wc -l)
          git diff --cached --quiet || git commit -m "🧠 Enrichment scanner: cross-referenced Z2M/ZHA/forum sources, ${FILES} file(s) updated [skip ci]"
          git push || true

  forum-update:
    name: Forum Status Update
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [github-scanner, enrichment-scanner]
    if: |
      always() && (
        github.event_name == 'schedule' && github.event.schedule == '0 3 * * 1,4' ||
        github.event_name == 'workflow_dispatch' && (inputs.mode == 'all' || inputs.mode == 'forum-update-only')
      )
    steps:
      - uses: actions/checkout@v4
      - run: git pull origin master || true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Post Forum Summary
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          APIFREELLM_KEY: ${{ secrets.APIFREELLM_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run && 'true' || 'false' }}
        run: node .github/scripts/forum-updater.js
