name: Tuya Automation Hub

on:
  schedule:
    - cron: '0 1,7,13,19 * * *'  # Offset from daily-everything (02,08,14,20)
    - cron: '0 4 * * 1,4'  # Mon/Thu deep scan
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which scanners to run'
        type: choice
        default: 'all'
        options:
          - all
          - forum-only
          - github-only
          - enrichment-only
          - forum-update-only
          - nightly-process
      dry_run:
        description: 'Dry run (no posts)'
        type: boolean
        default: true
      topics:
        description: 'Forum topic IDs'
        type: string
        default: '140352,26439,146735,89271,54018'

permissions:
  contents: write
  issues: write

concurrency:
  group: tuya-automation
  cancel-in-progress: true

jobs:
  forum-responder:
    name: Forum Responder
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 1,7,13,19 * * *' ||
      github.event_name == 'workflow_dispatch' && (inputs.mode == 'all' || inputs.mode == 'forum-only')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Run Forum Responder
        continue-on-error: true
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run && 'true' || 'false' }}
          FORUM_TOPICS: ${{ inputs.topics || '140352,26439,146735,89271,54018' }}
          REPLY_TOPICS: '140352'
        run: node .github/scripts/forum-responder.js
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/
          FILES=$(git diff --cached --name-only | wc -l)
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          TOPICS=$(node -p "try{Object.keys(JSON.parse(require('fs').readFileSync('.github/state/forum-state.json')).topics).length}catch(e){0}")
          git diff --cached --quiet || git commit -m "Forum responder v${VER}: scanned ${TOPICS} topics, ${FILES} file(s) updated [skip ci]"
          git pull --rebase origin master || true
          git push || true

  github-scanner:
    name: GitHub Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1,4' ||
      github.event_name == 'workflow_dispatch' && (inputs.mode == 'all' || inputs.mode == 'github-only')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Run GitHub Scanner
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'true' }}
        run: node .github/scripts/github-scanner.js
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/
          FILES=$(git diff --cached --name-only | wc -l)
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          git diff --cached --quiet || git commit -m "GitHub scanner v${VER}: triaged issues/PRs from dlnraja+JohanBendz, ${FILES} file(s) [skip ci]"
          git pull --rebase origin master || true
          git push || true

  enrichment-scanner:
    name: Enrichment Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1,4' ||
      github.event_name == 'workflow_dispatch' && (inputs.mode == 'all' || inputs.mode == 'enrichment-only')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Run Enrichment Scanner
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node .github/scripts/enrichment-scanner.js
      - name: Scan Public APIs (davemachado/public-api)
        continue-on-error: true
        run: node .github/scripts/scan-public-apis.js
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/
          FILES=$(git diff --cached --name-only | wc -l)
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          F=$(grep -rohE '"_T[A-Za-z0-9_]+"' drivers/*/driver.compose.json 2>/dev/null | sort -uf | wc -l)
          git diff --cached --quiet || git commit -m "Enrichment v${VER}: ${F} FPs cross-referenced Z2M/ZHA/forum, ${FILES} file(s) [skip ci]"
          git pull --rebase origin master || true
          git push || true

  forum-update:
    name: Forum Status Update
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [github-scanner, enrichment-scanner]
    if: |
      always() && (
        github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1,4' ||
        github.event_name == 'workflow_dispatch' && (inputs.mode == 'all' || inputs.mode == 'forum-update-only')
      )
    steps:
      - uses: actions/checkout@v4
      - run: git pull origin master || true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Post Forum Summary
        continue-on-error: true
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run && 'true' || 'false' }}
        run: node .github/scripts/forum-updater.js

      - name: Auto-Publish Draft to Test
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
        run: |
          if [ -z "$HOMEY_PAT" ]; then exit 0; fi
          node .github/scripts/auto-publish-draft.js || true
