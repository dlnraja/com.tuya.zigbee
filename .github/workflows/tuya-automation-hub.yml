name: Tuya Automation Hub

on:
  schedule:
    - cron: '0 4 * * 1,4'  # Mon/Thu deep scan
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which scanners to run'
        type: choice
        default: 'all'
        options:
          - all
          - github-only
          - enrichment-only
          - nightly-process
      dry_run:
        description: 'Dry run (no posts)'
        type: boolean
        default: true

permissions:
  contents: write
  issues: write

concurrency:
  group: tuya-automation
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:

  github-scanner:
    name: GitHub Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1,4' ||
      github.event_name == 'workflow_dispatch' && (inputs.mode == 'all' || inputs.mode == 'github-only')
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Run GitHub Scanner
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'true' }}
          GEMINI_MAX_TIER: "1"
        run: node .github/scripts/github-scanner.js
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/
          FILES=$(git diff --cached --name-only | wc -l)
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          git diff --cached --quiet || git commit -m "v${VER}: processed issues/PRs, ${FILES} file(s) [skip ci]"
          git pull --rebase origin master || true
          git push || true

  enrichment-scanner:
    name: Enrichment Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1,4' ||
      github.event_name == 'workflow_dispatch' && (inputs.mode == 'all' || inputs.mode == 'enrichment-only')
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Run Enrichment Scanner
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_MAX_TIER: "1"
        run: node .github/scripts/enrichment-scanner.js
      - name: Scan Public APIs (davemachado/public-api)
        continue-on-error: true
        run: node .github/scripts/scan-public-apis.js
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/
          FILES=$(git diff --cached --name-only | wc -l)
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          F=$(grep -rohE '"_T[A-Za-z0-9_]+"' drivers/*/driver.compose.json 2>/dev/null | sort -uf | wc -l || true)
          git diff --cached --quiet || git commit -m "Enrichment v${VER}: ${F} FPs cross-referenced Z2M/ZHA, ${FILES} file(s) [skip ci]"
          git pull --rebase origin master || true
          git push || true

