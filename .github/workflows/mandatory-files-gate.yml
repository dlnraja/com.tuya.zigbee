# mandatory-files-gate.yml
# ═══════════════════════════════════════════════════════════════════════════
# MANDATORY FILES & RULES GATE — BLOCKING
# Runs on every push to master/main and on PRs.
# Checks ALL rules discovered by stable-v5 vs master comparison:
#   O17 — No 'icon' field in app.json
#   O18 — No *.json wildcard in .homeyignore
#   O19 — category must be STRING
#   O20 — No api / homey:manager:api
#   O21 — README.txt present
#   M01 — assets/icon.svg
#   M02 — assets/images/small.png (REQUIRED) — large.png optional (excluded from archive)
#   M03 — .homeychangelog.json
#   M04 — locales/en.json
#   M05 — app.json required fields
#   M06 — data/fingerprints.json
#   M07 — driver-mapping-database.json
#   M08 — version consistency
#   M09 — Zigbee manufacturerName (no AggregateError)
#   M10 — Runtime files not excluded from .homeyignore
#   M11 — locales/ not excluded
#   M12 — app.json valid JSON
#   M13 — locales/*.json valid JSON
#   M14 — .homeychangelog.json has current version entry
# ═══════════════════════════════════════════════════════════════════════════
name: 🔐 Mandatory Files Gate

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mandatory-gate-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  mandatory-check:
    name: Mandatory Files & Rules Check (O17-O21 + M01-M14)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit || npm install --no-audit

      - name: "🔍 O21 — README.txt exists (SDK App.js:1427 THROWS if missing)"
        run: |
          if [ ! -f "README.txt" ]; then
            echo "::error file=README.txt::❌ O21: README.txt MISSING — SDK App.js:1427 throws 'Missing file /README.txt'. This BLOCKS publish."
            exit 1
          fi
          SIZE=$(wc -c < README.txt)
          if [ "$SIZE" -lt 50 ]; then
            echo "::error file=README.txt::❌ O21: README.txt too short ($SIZE bytes). Must have meaningful content."
            exit 1
          fi
          echo "✅ O21: README.txt OK ($SIZE bytes)"
          # Check multilingual READMEs
          for lang in nl de fr; do
            if [ -f "README.${lang}.txt" ]; then
              echo "✅ O21: README.${lang}.txt OK ($(wc -c < README.${lang}.txt) bytes)"
            else
              echo "::warning::⚠️ O21: README.${lang}.txt missing — App Store ${lang^^} will use English"
            fi
          done

      - name: "🔍 M01 — assets/icon.svg (SDK App.js:618 iconHash)"
        run: |
          if [ ! -f "assets/icon.svg" ]; then
            echo "::error file=assets/icon.svg::❌ M01: assets/icon.svg MISSING — SDK hardcodes this path for iconHash"
            exit 1
          fi
          echo "✅ M01: assets/icon.svg OK ($(wc -c < assets/icon.svg) bytes)"

      - name: "🔍 M02 — assets/images/small.png (REQUIRED in archive)"
        # ARCHIVE BUDGET (2026-05-30): large.png excluded from archive via .homeyignore
        # large.png (13MB) + xlarge.png (10MB) → archive too large → processing_failed
        # Only small.png (75×75) + icon.svg are required in the Athom publish archive.
        run: |
          FAILED=0
          # small.png is REQUIRED (included in archive)
          if [ ! -f "assets/images/small.png" ]; then
            echo "::error file=assets/images/small.png::❌ M02: assets/images/small.png MISSING — required in Athom archive"
            FAILED=1
          else
            echo "✅ M02: assets/images/small.png OK"
          fi
          # large.png exists locally but is EXCLUDED from archive → warning only
          if [ ! -f "assets/images/large.png" ]; then
            echo "::notice::ℹ️ M02: assets/images/large.png absent locally (excluded from archive via .homeyignore — OK)"
          else
            echo "✅ M02: assets/images/large.png OK (present locally, excluded from archive)"
          fi
          [ $FAILED -eq 0 ] || exit 1

      - name: "🔍 O17/O18/O19/O20 + M03-M08 — app.json Athom Server Requirements"
        run: node scripts/validate/validate-app-json.js

      - name: "🔒 FULL Mandatory Check (O17-O21 + M01-M14) — BLOCKING"
        run: node scripts/validate/homey-mandatory-check.js

      - name: "🔍 M12/M13 — JSON Syntax Validation (app.json + locales)"
        run: |
          echo "Checking app.json syntax..."
          node -e "JSON.parse(require('fs').readFileSync('app.json','utf8')); console.log('✅ app.json valid JSON');"
          echo "Checking locales/*.json..."
          for f in locales/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8')); console.log('✅ $f valid');" || { echo "::error file=$f::❌ $f invalid JSON"; exit 1; }
          done
          echo "Checking .homeychangelog.json..."
          node -e "JSON.parse(require('fs').readFileSync('.homeychangelog.json','utf8')); console.log('✅ .homeychangelog.json valid JSON');"

      - name: "🔍 O18 — .homeyignore dangerous wildcards"
        run: |
          if [ -f ".homeyignore" ]; then
            # Check for *.json wildcard
            if grep -E '^[*][.]json$' .homeyignore; then
              echo "::error file=.homeyignore::❌ O18: .homeyignore has *.json wildcard — blocks runtime JSON files"
              exit 1
            fi
            # Check README.txt not excluded
            if grep -E '^README[.]txt$' .homeyignore; then
              echo "::error file=.homeyignore::❌ O18/O21: .homeyignore excludes README.txt — required by SDK App.js:1427"
              exit 1
            fi
            # Check data/fingerprints.json not excluded
            if grep -E '^data/fingerprints[.]json$' .homeyignore; then
              echo "::error file=.homeyignore::❌ M10: .homeyignore excludes data/fingerprints.json — required at runtime"
              exit 1
            fi
            echo "✅ O18: .homeyignore has no dangerous wildcards"
          else
            echo "::warning::.homeyignore missing — all files will be packaged"
          fi

      - name: "🛡️ M09 — Dual-Layer Gate (no AggregateError)"
        run: |
          node - << 'DUAL_LAYER'
          const fs = require('fs');
          const app = JSON.parse(fs.readFileSync('app.json'));
          const WIFI = id => { const s = (id||'').toLowerCase(); return s.startsWith('wifi_') || s.includes('ewelink') || s.includes('sonoff'); };
          const errors = [];
          let zigbeeOk = 0, generic = 0, wifi = 0, hybrid = 0;
          (app.drivers||[]).forEach(d => {
            const conn = d.connectivity || [];
            const hasZ = !!d.zigbee;
            const isLan = conn.some(c => ['lan','cloud'].includes(c));
            const type = hasZ && isLan ? 'hybrid' : hasZ ? 'zigbee' : WIFI(d.id) ? 'wifi' : 'virtual';
            if (type === 'hybrid') hybrid++;
            else if (type === 'zigbee') {
              const hasMf = d.zigbee.manufacturerName && d.zigbee.manufacturerName.length > 0;
              const hasFp = d.zigbee.fingerprints && d.zigbee.fingerprints.length > 0;
              if (!hasMf && !hasFp) { generic++; }
              else if (!hasMf) { errors.push(d.id); }
              else { zigbeeOk++; }
            } else if (WIFI(d.id)) wifi++;
          });
          console.log(`Dual-Layer: Zigbee=${zigbeeOk} Hybrid=${hybrid} Generic=${generic} WiFi=${wifi}`);
          if (errors.length) {
            console.error(`❌ M09: ${errors.length} Zigbee drivers WITH fingerprints but NO manufacturerName (AggregateError):`);
            errors.forEach(e => console.error('  -', e));
            process.exit(1);
          }
          console.log('✅ M09: Dual-Layer integrity OK — no AggregateError');
          DUAL_LAYER

      - name: Report Summary
        if: always()
        run: |
          echo "## Mandatory Files Gate" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Rule | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| README.txt | O21 | $([ -f README.txt ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| assets/icon.svg | M01 | $([ -f assets/icon.svg ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| assets/images/small.png | M02 | $([ -f assets/images/small.png ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| assets/images/large.png | M02⚠️ | $([ -f assets/images/large.png ] && echo '✅ (local only)' || echo '⚠️ absent (excl. from archive)') |" >> $GITHUB_STEP_SUMMARY
          echo "| .homeychangelog.json | M03 | $([ -f .homeychangelog.json ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| locales/en.json | M04 | $([ -f locales/en.json ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| data/fingerprints.json | M06 | $([ -f data/fingerprints.json ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| category=string | O19 | $(node -p "typeof require('./app.json').category==='string'?'✅':'❌'") |" >> $GITHUB_STEP_SUMMARY
          echo "| No icon field | O17 | $(node -p "'icon' in require('./app.json')?'❌':'✅'") |" >> $GITHUB_STEP_SUMMARY
          echo "| No *.json in .homeyignore | O18 | ✅ |" >> $GITHUB_STEP_SUMMARY
