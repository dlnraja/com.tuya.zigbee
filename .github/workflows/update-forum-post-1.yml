name: Update Forum Post #1
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/templates/forum-post-1.md'
      - '.github/scripts/update-post-1.js'

permissions:
  contents: read

concurrency:
  group: update-forum-post-1
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  update-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Update Forum Post 1
        continue-on-error: true
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
        run: |
          if [ -z "$DISCOURSE_API_KEY" ]; then
            echo "No DISCOURSE_API_KEY, skipping"
            exit 0
          fi
          node .github/scripts/update-post-1.js
