name: "🌌 UNIFIED ENGINE — Update Forum Post #1"
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/templates/forum-post-1.md'
      - '.github/scripts/update-post-1.js'
      - 'app.json'

permissions:
  contents: read

concurrency:
  group: update-forum-post-1
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  SHADOW_MODE: "true"

defaults:
  run:
    shell: bash

jobs:
  update-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Update Forum Post 1
        continue-on-error: true
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
        run: |
          if [ -z "$HOMEY_EMAIL" ]; then
            echo "No HOMEY_EMAIL, skipping"
            exit 0
          fi
          node .github/scripts/update-forum-first-post.js

