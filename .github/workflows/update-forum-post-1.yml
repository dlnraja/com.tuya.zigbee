name: Update Forum Post #1
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/templates/forum-post-1.md'
      - '.github/scripts/update-post-1.js'

permissions:
  contents: read

concurrency:
  group: update-forum-post-1
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  update-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Update Forum Post 1
        continue-on-error: true
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
        run: |
          if [ -z "$DISCOURSE_API_KEY" ]; then
            echo "No DISCOURSE_API_KEY, skipping"
            exit 0
          fi
          node .github/scripts/update-post-1.js
