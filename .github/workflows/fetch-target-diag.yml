name: Fetch Target Diagnostic Log
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit || npm install
        
      - name: Run fetch script
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: node .github/scripts/fetch-via-oauth.js
        
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Add retrieved diagnostic log 5f100d21-0df6-42f8-a57c-fe6a09285819 [skip ci]"
          git pull --rebase origin master || true
          git push || true
