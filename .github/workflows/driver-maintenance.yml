# Driver Maintenance — v1.0.0
# Auto-scaffold missing drivers, detect conflicts, create PRs.
# Runs weekly (Fri 04:00 UTC) + manual trigger.

name: "Driver Maintenance"

# <!-- badges:start -->
# [![Driver Maintenance](https://github.com/dlnraja/com.tuya.zigbee/actions/workflows/driver-maintenance.yml/badge.svg)](https://github.com/dlnraja/com.tuya.zigbee/actions/workflows/driver-maintenance.yml)
# <!-- badges:end -->


on:
  schedule:
    - cron: '0 4 * * 5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no PR created)"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: driver-maintenance
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: "22"

jobs:
  maintain:
    name: "Driver Scaffold + Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # === AI providers — circular chain (ai-helper.js) ===
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || '' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || '' }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || '' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY || '' }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY || '' }}


    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v8.1.1
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v8.1.1
        with:
          cache: npm
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install

      - name: 📖 Load Investigation Framework (GLOBAL_INVESTIGATION_PLAN.md)
        run: |
          echo "## Investigation Framework Active" >> $GITHUB_STEP_SUMMARY
          echo "Using [GLOBAL_INVESTIGATION_PLAN.md](../../docs/GLOBAL_INVESTIGATION_PLAN.md)" >> $GITHUB_STEP_SUMMARY
          echo "22-section methodology applied to driver maintenance:" >> $GITHUB_STEP_SUMMARY
          echo "- Section 4: Complete Source Matrix (15 sources: Z2M, ZHA, Blakadder, Domoticz, Forums...)" >> $GITHUB_STEP_SUMMARY
          echo "- Section 6: Cross-Reference Patterns (mfr × pid × power × protocol)" >> $GITHUB_STEP_SUMMARY
          echo "- Section 10: Z2M/ZHA Cross-Reference Protocol" >> $GITHUB_STEP_SUMMARY
          echo "- Section 13: Quality Gate System (9-Layer)" >> $GITHUB_STEP_SUMMARY
          echo "Plan injected into all AI engine calls via project-rules.js → ai-helper.js" >> $GITHUB_STEP_SUMMARY

      - name: 🌐 Cross-Reference External Intelligence (Z2M, Domoticz, Forums)
        continue-on-error: true
        run: |
          # Follows GLOBAL_INVESTIGATION_PLAN.md Section 4 (Source Matrix) + Section 10 (Z2M/ZHA Protocol)
          node .github/scripts/cross-ref-intelligence.js || true
          node .github/scripts/sync-external-sources.js || true
          node .github/scripts/scan-tuya-ecosystem.js || true

      - name: 🕵️ Deep Issue & Variant Researcher
        continue-on-error: true
        run: |
          # Follows GLOBAL_INVESTIGATION_PLAN.md Section 6 (Variant Generation TZE200↔TZE204↔TZE284)
          node .github/scripts/issue-deep-researcher.js || true

      - name: Auto-scaffold missing drivers
        id: scaffold
        run: node .github/scripts/auto-driver-scaffold.js

      - name: Driver conflict audit
        id: audit
        run: node .github/scripts/driver-conflict-audit.js

      - name: Validate JSON
        run: |
          echo "Validating all driver.compose.json..."
          FAIL=0
          for f in drivers/*/driver.compose.json; do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>/dev/null; then
              echo "FAIL: $f"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then echo "JSON validation failed!"; exit 1; fi
          echo "All JSON valid."

      - name: Validate device.js syntax
        continue-on-error: true
        run: |
          FAIL=0
          for f in drivers/*/device.js; do
            if ! node --check "$f" 2>/dev/null; then
              echo "SYNTAX ERROR: $f"
              FAIL=1
            fi
          done
          echo "Device.js syntax check done (failures=$FAIL)"

      - name: SDK Compliance Check
        run: |
          echo "### SDK Compliance" >> $GITHUB_STEP_SUMMARY
          for d in drivers/*/driver.compose.json; do
            DIR=$(dirname "$d")
            DRIVER=$(basename "$DIR")
            node -e "const j=JSON.parse(require('fs').readFileSync('$d','utf8'));if(!j.connectivity)console.log('⚠️ '+process.argv[1]+': missing connectivity')" "$DRIVER" >> $GITHUB_STEP_SUMMARY || true
            # `|| true` is REQUIRED: with `set -e`, a `[ ! -f ... ]` that evaluates
            # false (file exists) returns exit 1, which would abort the whole step.
            if [ ! -f "$DIR/assets/icon.svg" ]; then
              echo "⚠️ $DRIVER: missing icon.svg" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Validate Homey App (publish)
        run: npx homey app validate --level publish

      - name: Create Pull Request
        if: steps.scaffold.outputs.has_changes == 'true' && inputs.dry_run != true
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          commit-message: "auto: scaffold ${{ steps.scaffold.outputs.scaffolded }} drivers, add ${{ steps.scaffold.outputs.fps_added }} FPs [skip ci]"
          title: "Driver Maintenance — ${{ steps.scaffold.outputs.scaffolded }} scaffolded, ${{ steps.audit.outputs.high_conflicts }} conflicts"
          body: |
            ## Automated Driver Maintenance

            ### Auto-Scaffold Results
            - **Scaffolded**: ${{ steps.scaffold.outputs.scaffolded || '0' }} new drivers created from Johan SDK3
            - **FPs added**: ${{ steps.scaffold.outputs.fps_added || '0' }} uncovered FPs added to existing drivers
            - **Cross-class conflicts**: ${{ steps.scaffold.outputs.conflicts || '0' }}

            ### Conflict Audit
            - **High severity PID conflicts**: ${{ steps.audit.outputs.high_conflicts || '0' }}
            - **MFR+PID duplicates (real risk)**: ${{ steps.audit.outputs.mfr_conflicts || '0' }}
            - **Orphan drivers**: ${{ steps.audit.outputs.orphans || '0' }}
            - **Split suggestions**: ${{ steps.audit.outputs.split_suggestions || '0' }}

            ### Reports
            - `driver-scaffold-report.json` — full scaffold details
            - `driver-conflict-audit.json` — full conflict analysis

            ### Review checklist
            - [ ] Review scaffolded drivers — add DP mappings to device.js
            - [ ] Review high-severity conflicts — consider splitting drivers
            - [ ] 🤖 **Dynamic Heuristic Check**: Do not hardcode `onoff.2` or standard alarm capabilities in `app.json` if `UniversalVariantManager` handles them dynamically.
            - [ ] Validate with `npx homey app validate`
          branch: auto/driver-maintenance
          labels: drivers,automated,maintenance
          delete-branch: true

      - name: Summary
        if: always()
        run: |
          echo "## Driver Maintenance Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scaffolded | ${{ steps.scaffold.outputs.scaffolded || '0' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| FPs added | ${{ steps.scaffold.outputs.fps_added || '0' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cross-class conflicts | ${{ steps.scaffold.outputs.conflicts || '0' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| High severity | ${{ steps.audit.outputs.high_conflicts || '0' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| MFR conflicts | ${{ steps.audit.outputs.mfr_conflicts || '0' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Orphans | ${{ steps.audit.outputs.orphans || '0' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Split suggestions | ${{ steps.audit.outputs.split_suggestions || '0' }} |" >> "$GITHUB_STEP_SUMMARY"
          if [ -f .github/state/driver-scaffold-report.json ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Scaffold Report" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            node -e "d=JSON.parse(require('fs').readFileSync('.github/state/driver-scaffold-report.json','utf8'));console.log(JSON.stringify(d.summary,null,2))" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: driver-maintenance-${{ github.run_number }}
          path: |
            .github/state/driver-scaffold-report.json
            .github/state/driver-conflict-audit.json
          retention-days: 30