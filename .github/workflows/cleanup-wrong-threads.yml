name: "Cleanup Wrong-Thread Bot Posts"
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (scan only, no edits)"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: cleanup-wrong-threads
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  cleanup:
    name: "Find & clean bot posts on wrong threads"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Run cleanup
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
        run: node .github/scripts/cleanup-wrong-thread-posts.js
