name: "Cleanup Wrong-Thread Bot Posts"
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (scan only, no edits)"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: cleanup-wrong-threads
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  cleanup:
    name: "Find & clean bot posts on wrong threads"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Run cleanup
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
        run: node .github/scripts/delete-bot-posts.js

