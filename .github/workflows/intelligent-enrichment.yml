name: "Intelligent Enrichment & Credits Sync (DISABLED: merged into weekly-auto-process.yml)"

# DISABLED: Deep cross-ref and credit sync now run in weekly-auto-process.yml
# which handles the full enrichment pipeline (collect → enrich → repair → validate)
on:
  workflow_dispatch: # Allow manual trigger only

defaults:
  run:
    shell: bash

jobs:
  enrich-and-credit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Run Deep Cross-Reference Scraper
        run: node scripts/automation/deep-crossref-scraper.js
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        continue-on-error: true # Don't fail the whole workflow if scraper has issues

      - name: Update Credits & Acknowledgements
        run: node scripts/automation/update-credits.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json app.json docs/CREDITS.md .github/state/
          git commit -m "chore: auto-update intelligence and credits [skip ci]" || echo "No changes to commit"
          git push
