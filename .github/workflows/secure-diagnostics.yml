name: 🛡️ Secure Fleet Diagnostics (Gmail)

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  issues: write

defaults:
  run:
    shell: bash

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository_owner == 'dlnraja'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          persist-credentials: true

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: |
          npm install imapflow mailparser

      - name: 🔍 Run Secure Extraction
        env:
          GMAIL_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD || secrets.HOMEY_PASSWORD }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          DRY_RUN: false
        run: |
          # Use a wrapper to mask output
          node .github/scripts/fetch-gmail-diagnostics.js | sed "s/$GMAIL_EMAIL/[REDACTED_EMAIL]/g"

      - name: 📝 Commit State & Reports
        env:
          GMAIL_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD || secrets.HOMEY_PASSWORD }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || '' }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Fleet Diagnostics Bot"
          git pull --rebase origin master || true
          git add .github/state/*.json .github/state/*.yml
          git commit -m "chore(diag): update fleet diagnostics [skip ci]" || echo "No changes to commit"
          git push || echo "Push failed (ignoring)"
