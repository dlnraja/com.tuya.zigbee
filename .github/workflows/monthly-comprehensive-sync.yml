name: Monthly Comprehensive Sync

on:
  schedule:
    - cron: '0 1 1 * *'  # 1AM UTC, before nightly (2AM)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no posts)'
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: monthly-sync
  cancel-in-progress: false

jobs:
  comprehensive-scan:
    name: Monthly Deep Scan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Monthly Comprehensive Scanner
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          APIFREELLM_KEY: ${{ secrets.APIFREELLM_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run && 'true' || 'false' }}
        run: node .github/scripts/monthly-comprehensive.js

      - name: Scan Public APIs (davemachado/public-api)
        continue-on-error: true
        run: node .github/scripts/scan-public-apis.js

      - name: Commit state and reports
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/
          git diff --cached --quiet || git commit -m "chore: monthly scan state [skip ci]"
          git push || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monthly-report
          path: .github/state/monthly-report.json
          retention-days: 90
