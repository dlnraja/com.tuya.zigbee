name: Monthly Comprehensive Sync

on:
  schedule:
    - cron: '0 1 1 * *'  # 1AM UTC, before nightly (2AM)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no posts)'
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: monthly-sync
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  comprehensive-scan:
    name: Monthly Deep Scan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # AI providers — circular chain (ai-helper.js handles rate limiting)
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || '' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY || '' }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY || '' }}
      GH_PAT: ${{ secrets.GH_PAT }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5 # v5
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v5 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install

      - name: Run Monthly Comprehensive Scanner
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run && 'true' || 'false' }}
        run: node .github/scripts/monthly-comprehensive.js

      # ===== DRAFT → TEST (Puppeteer + API fallback) =====
      - name: Install Puppeteer
        continue-on-error: true
        run: npm install puppeteer --no-save
      - name: "Tier 1: Promote via Browser (Puppeteer)"
        id: promote_puppeteer
        continue-on-error: true
        timeout-minutes: 5
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run && 'true' || 'false' }}
        run: node .github/scripts/auto-promote-puppeteer.js
      - name: "Tier 2: Promote via API (fallback)"
        if: steps.promote_puppeteer.outcome != 'success'
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: node .github/scripts/auto-publish-draft.js

      - name: Homey Device Diagnostics
        continue-on-error: true
        env:
          HOMEY_PAT_API: ${{ secrets.HOMEY_PAT_API }}
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: node .github/scripts/homey-device-diagnostics.js

      - name: "Smart Device Scanner (11 sources, fp|pid composite key)"
        continue-on-error: true
        timeout-minutes: 15
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node .github/scripts/external-sources-scanner.js

      - name: "Smart Enrichment (DP-aware, fp|pid profiles)"
        continue-on-error: true
        timeout-minutes: 10
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node .github/scripts/enrichment-scanner.js

      - name: Recursive Fork Scanner
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          FORK_DEPTH: "3"
        run: |
          node .github/scripts/deep-fork-integrator.js
          node .github/scripts/scan-forks-recursive.js || true

      - name: Scan Public APIs
        continue-on-error: true
        run: node .github/scripts/scan-public-apis.js

      - name: Comprehensive GitHub Scan
        continue-on-error: true
        timeout-minutes: 15
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node .github/scripts/comprehensive-github-scan.js

      - name: PR/Issue Fingerprint Scan
        continue-on-error: true
        timeout-minutes: 10
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node .github/scripts/scan-prs-issues.js

      - name: JohanBendz Full Scanner
        continue-on-error: true
        timeout-minutes: 15
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node .github/scripts/scan-johan-full.js

      - name: GitHub Issue Manager (deep)
        continue-on-error: true
        timeout-minutes: 20
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          STALE_DAYS: "14"
          MAX_ITEMS: "200"
          INCLUDE_CLOSED: "true"
          REPOS: "dlnraja/com.tuya.zigbee,JohanBendz/com.tuya.zigbee"
        run: node .github/scripts/github-issue-manager.js

      - name: Community Spam Scan
        continue-on-error: true
        timeout-minutes: 5
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}

      - name: Auto-Learn Fingerprints
        continue-on-error: true
        timeout-minutes: 3
        run: node .github/scripts/auto-learn-fingerprints.js


      - name: Community Sync
        continue-on-error: true
        timeout-minutes: 10
        run: |
          node scripts/community-sync/sync-all.js || true
          node scripts/community-sync/generate-report.js >> $GITHUB_STEP_SUMMARY || true

      - name: Cross-Driver Gap Analysis
        continue-on-error: true
        run: node .github/scripts/cross-driver-gap.js

      - name: AI Changelog
        continue-on-error: true
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node .github/scripts/generate-ai-changelog.js

      - name: Pattern Detector
        continue-on-error: true
        timeout-minutes: 5
        run: node .github/scripts/pattern-detector.js

      - name: "Resolution Summary"
        continue-on-error: true
        run: node .github/scripts/resolution-summary.js

      - name: Commit state and reports
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          D=$(ls -d drivers/*/ 2>/dev/null | wc -l)
          F=$(grep -rohE '"(_T[A-Za-z0-9_]+|SONOFF|eWeLink|SNZB-[0-9A-Z]+|ZBMINI[A-Z0-9-]*|S[346]1ZB[A-Z]*|BASICZBR[0-9]*|TRVZB|SWV-[A-Z]+)"' drivers/*/driver.compose.json 2>/dev/null | sort -uf | wc -l || true)
          git diff --cached --quiet || git commit -m "Monthly sync v${VER} $(date +%Y-%m): ${D} drivers, ${F} FPs [skip ci]"
          git pull --rebase origin master || true
          git push || true

      - name: Upload report
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v4
        if: always()
        with:
          name: monthly-report
          path: .github/state/monthly-report.json
          retention-days: 90

