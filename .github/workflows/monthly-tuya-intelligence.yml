name: "Monthly Tuya Intelligence Sync"

on:
  schedule:
    - cron: "0 3 1 * *"  # 1st of each month at 03:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even if no changes"
        required: false
        default: "false"

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  intelligence-sync:
    name: "Monthly Intelligence Sync"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: "Setup Node.js"
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: "Install Dependencies"
        run: npm install axios cheerio

      - name: "Step 1 - Challenge All URLs"
        run: node .github/scripts/challenge-all-urls.js
        continue-on-error: true

      - name: "Step 2 - Run Intelligent Enrichment Engine"
        run: node .github/scripts/ai-enrichment-engine.js
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: "Step 3 - Run Tuya Intelligence Fingerprinting"
        run: if [ -f ".github/scripts/tuya-intelligence.js" ]; then node .github/scripts/tuya-intelligence.js; fi
        continue-on-error: true

      - name: "Commit and Push Results"
        run: |
          git config user.email "ci@tuya-zigbee.bot"
          git config user.name "Tuya Intelligence Bot"
          git add -A || true
          git diff --staged --quiet || git commit -m "chore: Monthly intelligence sync [skip ci]"
          git push origin master || true
        continue-on-error: true
