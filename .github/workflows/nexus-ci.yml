name: 🛡️ Nexus CI/CD Orchestrator

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      force_audit:
        description: "Run deep architectural audit"
        type: boolean
        default: false

jobs:
  validate:
    name: 🔍 Universal Validation (SDK 3 Strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: 🏠 Homey Validate
        run: npx homey app validate --level publish
      
      - name: 🛡️ SDK 3 Strict Linter
        run: node scripts/maintenance/rule-21-linter.js
      
      - name: 📊 Architectural Audit
        run: node scripts/benchmark/app-audit-plus.js
      
      - name: 🧹 Metadata Consistency Check
        run: node scripts/maintenance/validate-driver-manifests.js

  build:
    name: 🏗️ Production Build & Optimize
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: 👷 Homey Build
        run: npx homey app build
      
      - name: 🖼️ Fix Large Images
        run: node scripts/maintenance/fix-large-images.js
      
      - name: 📦 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: homey-app-bundle
          path: .homeybuild/

  security:
    name: 🛡️ Nexus Security Shield
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: 🕵️ Secret Masking Probe
        run: |
          echo "Scanning for accidental secret leaks in public code..."
          # Scan for potential PATs or API keys accidentally committed
          grep -rE "([a-zA-Z0-9_\-]{20,})" . --exclude-dir=.git --exclude-dir=node_modules || echo "✅ No obvious secrets found"
