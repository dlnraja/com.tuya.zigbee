name: 🛡️ Nexus CI/CD Orchestrator

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  validate:
    name: 🔍 Universal Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: 🏠 Homey Validate
        run: npx homey app validate
      
      - name: 📊 Architectural Audit
        run: node scripts/benchmark/app-audit-plus.js
      
      - name: 🧹 Metadata Consistency Check
        run: node scripts/maintenance/validate-driver-manifests.js

  build:
    name: 🏗️ Production Build
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: 👷 Homey Build
        run: npx homey app build
      
      - name: 🖼️ Fix Large Images
        run: node scripts/maintenance/fix-large-images.js
      
      - name: 📦 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: homey-app-bundle
          path: .homeybuild/
