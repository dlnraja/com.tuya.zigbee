name: Tuya Auto-Repair CI

on:
  push:
    branches:
      - master
      - stable-v5
  pull_request:
    branches:
      - master
      - stable-v5
  schedule:
    - cron: '0 0 * * 0' # Weekly scan

jobs:
  self-heal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run Master Self-Heal Engine
        run: node scripts/maintenance/master-self-heal.js --ci

      - name: Sanitize Generated Manifest Before Validation
        run: npm run fix:generated-flow-args

      - name: Validate App.json
        run: npm run validate || npx homey app validate

      - name: Sanitize Generated Manifest After Validation
        run: npm run fix:generated-flow-args

      - name: Validate Sanitized Homey Guidelines
        run: npm run check:homey-guidelines

      - name: Drop Volatile Self-Heal Report
        if: github.event_name != 'pull_request'
        run: git restore -- .github/state/self-heal-report.json 2>/dev/null || true

      - name: Commit Auto-Repairs
        if: github.event_name != 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore(auto-heal): Apply Tuya self-heal repairs [skip ci]"
          branch: ${{ github.head_ref || github.ref_name }}
          commit_user_name: "TuyaBot"
          commit_user_email: "bot@tuya-zigbee.local"
          file_pattern: "drivers/*/driver.compose.json app.json"
