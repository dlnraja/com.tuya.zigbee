name: "Weekly External Sources Sync"

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday 3am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no file changes)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: external-sync
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: write

env:
  NODE_VERSION: '22'

jobs:
  sync-external-sources:
    name: "Sync Z2M/ZHA/deCONZ → Enrich Homey App"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # === AI providers — circular chain (ai-helper.js) ===
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || '' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY || '' }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY || '' }}

    steps:
      - uses: actions/checkout@v5 # v5
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v5 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm ci --prefer-offline --no-audit || npm install

      - name: "Download & parse external sources"
        continue-on-error: true
        timeout-minutes: 20
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
        run: node .github/scripts/sync-external-sources.js

      - name: "Commit enrichments"
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add drivers/*/driver.compose.json .github/state/enrichment-report.json .github/state/adapter-state.json .github/cache/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "sync: enrich from Z2M/ZHA/deCONZ external sources [skip ci]"
          git pull --rebase origin master || true
          git push || true

      - name: "Upload sync report"
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v4
        with:
          name: external-sync-report
          path: |
            .github/state/enrichment-report.json
            .github/state/adapter-state.json
          retention-days: 30
