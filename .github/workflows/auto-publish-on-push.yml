name: Auto-Publish on Push
on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  NODE_OPTIONS: "--dns-result-order=ipv4first"

defaults:
  run:
    shell: bash

jobs:
  publish:
    name: Validate & Auto-Publish to Homey App Store
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ─────────────────────────────────────────────────────────────
      # 1. CHECKOUT + SETUP
      # ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit || npm install

      # ─────────────────────────────────────────────────────────────
      # 2. CHECK SECRETS
      # ─────────────────────────────────────────────────────────────
      - name: Check HOMEY_PAT availability
        id: check_pat
        run: |
          if [ -n "${{ secrets.HOMEY_PAT }}" ]; then
            echo "has_pat=true" >> $GITHUB_OUTPUT
            echo "✅ HOMEY_PAT is set — publish will run"
          else
            echo "has_pat=false" >> $GITHUB_OUTPUT
            echo "⚠️  HOMEY_PAT not set — publish will be skipped"
          fi

      - name: Read current version
        id: pre_info
        run: |
          V=$(node -p "require('./app.json').version")
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Current version: v$V"

      # ─────────────────────────────────────────────────────────────
      # 2.5 SYNC — Ensure app.json and package.json versions match
      # ─────────────────────────────────────────────────────────────
      - name: "🔄 SYNC app.json ↔ package.json versions"
        run: |
          node - << 'SYNC'
          const fs = require('fs');
          const appPath = 'app.json';
          const pkgPath = 'package.json';

          const app = JSON.parse(fs.readFileSync(appPath, 'utf8'));
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));

          if (app.version !== pkg.version) {
            console.log(`⚠️  Version mismatch: app.json=${app.version} vs package.json=${pkg.version}`);
            // Sync to app.json version (authoritative)
            pkg.version = app.version;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
            console.log(`✅ Synced package.json to v${app.version}`);
          } else {
            console.log(`✅ Versions synced: v${app.version}`);
          }
          SYNC

      # ─────────────────────────────────────────────────────────────
      # 2.5 INTEGRITY CHECK — .homeyplugins.json, fingerprint collisions
      # ─────────────────────────────────────────────────────────────
      - name: "🛡️ INTEGRITY: Check .homeyplugins.json + fingerprint collisions (mfr+pid)"
        run: |
          node - << 'INTEGRITY'
          const fs = require('fs'), path = require('path');

          // 1. Check .homeyplugins.json is not empty
          const pluginsPath = '.homeyplugins.json';
          if (fs.existsSync(pluginsPath)) {
            const content = fs.readFileSync(pluginsPath, 'utf8').trim();
            if (content.length < 10) {
              console.error('❌ .homeyplugins.json is empty! Restoring...');
              fs.writeFileSync(pluginsPath, '[{"id":"zigbee"}]\n');
              console.log('✅ Restored .homeyplugins.json');
            } else {
              console.log('✅ .homeyplugins.json OK (' + content.length + ' bytes)');
            }
          }

          // 2. Check for fingerprint collisions (manufacturerName + productId)
          const driversDir = 'drivers';
          const fpMap = {}; // key: mfr|pid -> driver
          let collisions = 0;
          let totalFps = 0;
          try {
            fs.readdirSync(driversDir)
              .filter(d => fs.statSync(path.join(driversDir, d)).isDirectory())
              .forEach(d => {
                const p = path.join(driversDir, d, 'driver.compose.json');
                if (!fs.existsSync(p)) return;
                try {
                  const c = JSON.parse(fs.readFileSync(p, 'utf8'));
                  const mfrs = (c.zigbee?.manufacturerName || []).map(m => m.toLowerCase());
                  const pids = c.zigbee?.productId || [];
                  for (const m of mfrs) {
                    for (const pid of pids) {
                      const key = m + '|' + pid;
                      totalFps++;
                      if (fpMap[key] && fpMap[key] !== d) {
                        console.log('⚠️  COLLISION [' + m + ' + ' + pid + ']: ' + fpMap[key] + ' vs ' + d);
                        collisions++;
                      }
                      fpMap[key] = d;
                    }
                  }
                } catch {}
              });
          } catch (e) { console.error('driver scan error:', e.message); }
          console.log('✅ Fingerprint check: ' + totalFps + ' combos, ' + Object.keys(fpMap).length + ' unique, ' + collisions + ' collisions');
          if (collisions > 0) {
            echo "::warning::$collisions fingerprint+PID collisions detected — review drivers"
          }
          INTEGRITY

      # ─────────────────────────────────────────────────────────────
      # 3. PRE-CLEAN — Fix source files BEFORE any validation
      # ─────────────────────────────────────────────────────────────
      - name: "🔧 PRE-CLEAN: Fix empty manufacturerName in driver.compose.json + app.json"
        run: |
          node - << 'PRECLEAN'
          const fs = require('fs'), path = require('path');

          // Step A: Fix driver.compose.json source files
          const driversDir = path.join(process.cwd(), 'drivers');
          let srcFixed = 0;
          try {
            fs.readdirSync(driversDir)
              .filter(d => fs.statSync(path.join(driversDir, d)).isDirectory())
              .forEach(d => {
                const p = path.join(driversDir, d, 'driver.compose.json');
                if (!fs.existsSync(p)) return;
                try {
                  const comp = JSON.parse(fs.readFileSync(p, 'utf8'));
                  if (comp.zigbee && !comp.zigbee.manufacturerName) {
                    comp.zigbee.manufacturerName = [];
                    fs.writeFileSync(p, JSON.stringify(comp, null, 2) + '\n', 'utf8');
                    srcFixed++;
                  }
                } catch (e) { /* skip corrupt */ }
              });
          } catch (e) { console.error('driver scan error:', e.message); }

          // Step B: Fix app.json
          const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          let appFixed = 0;
          app.drivers.forEach(d => {
            if (!d.zigbee) return;
            if (!d.zigbee.manufacturerName) {
              d.zigbee.manufacturerName = [];
              appFixed++;
            }
          });
          if (appFixed > 0) fs.writeFileSync('app.json', JSON.stringify(app), 'utf8');

          console.log(`PRE-CLEAN done: ${srcFixed} driver.compose.json fixed, ${appFixed} entries ensured in app.json`);
          PRECLEAN

      # ─────────────────────────────────────────────────────────────
      # 3.5 FINGERPRINT INJECTION — Auto-inject new fingerprints
      # ─────────────────────────────────────────────────────────────
      - name: "🧬 INJECT: Auto-inject fingerprints from community sync"
        continue-on-error: true
        run: node scripts/inject-remaining-fingerprints.js || echo "Fingerprint injection skipped (no new FPs)"

      # ─── Pipeline Step 6c Safety Gate (WORKFLOW_GUIDELINES.md) ───
      - name: "🔧 Pipeline 6c: Fix Flow Cards"
        continue-on-error: true
        run: |
          node scripts/automation/cleanup-flow-cards.js || true
          node scripts/maintenance/fix-unsafe-flow-cards.js || true

      - name: "🔋 Pipeline 6c: Revert Battery Conflicts"
        continue-on-error: true
        run: node scripts/maintenance/revert-alarm-battery-conflict.js || true

      - name: "📋 Pipeline 6c: Fix Empty Capabilities"
        continue-on-error: true
        run: node scripts/automation/audit-capabilities.js || true

      - name: "📏 Archive Size Gate (< 20MB)"
        run: node .github/scripts/check-archive-size.js

      # ─────────────────────────────────────────────────────────────
      # 4. CHANGELOG + VERSION BUMP
      # ─────────────────────────────────────────────────────────────
      - name: Generate AI Changelog
        continue-on-error: true
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/generate-ai-changelog.js || echo "AI changelog skipped"

      - name: Extract Changelog
        id: cl
        run: |
          VER=$(node -p "require('./app.json').version")
          CL=$(node -e "
            try {
              const r=JSON.parse(require('child_process').execSync('node .github/scripts/extract-changelog.js '+process.argv[1],{encoding:'utf8'}).trim());
              process.stdout.write(r.homeyText);
            } catch(e) { process.stdout.write('Bug fixes and improvements'); }
          " "$VER" 2>/dev/null || echo "v${VER}: Bug fixes and improvements")
          echo "text=$CL" >> $GITHUB_OUTPUT

      - name: Determine bump level
        id: bump_level
        run: |
          MSG=$(git log -1 --pretty=%B)
          if [[ "$MSG" == *"[major]"* ]]; then echo "level=major" >> $GITHUB_OUTPUT
          elif [[ "$MSG" == *"[minor]"* ]]; then echo "level=minor" >> $GITHUB_OUTPUT
          else echo "level=patch" >> $GITHUB_OUTPUT; fi

      - name: Bump version
        id: bump
        uses: athombv/github-action-homey-app-version@986685b4903efabc9531248b2fdc9734223ff9f3
        with:
          version: ${{ steps.bump_level.outputs.level }}
          changelog: ${{ steps.cl.outputs.text }}

      - name: Sync package.json version
        run: |
          node -e "
            const f=require('fs'), a=require('./app.json'), p=JSON.parse(f.readFileSync('package.json','utf8'));
            p.version=a.version;
            f.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');
            console.log('Synced package.json to v'+a.version);
          "

      - name: Read bumped version
        id: info
        run: |
          V=$(node -p "require('./app.json').version")
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Bumped to v$V"

      # ─────────────────────────────────────────────────────────────
      # 4.5 COMPACT app.json — CRITICAL (prevents Athom 5MB upload limit error)
      # ─────────────────────────────────────────────────────────────
      # WHY: The compose plugin (.homeyplugins.json "compose") rebuilds app.json
      # from .homeycompose/ with 2-space indentation = 6.03MB for 412 drivers.
      # Athom's servers reject files > ~5MB with "Processing failed".
      # v8.1.6 (232 drivers = 3.67MB) worked; v8.1.7+ (412 drivers) breaks.
      # FIX: compact JSON immediately before validate+publish (3.39MB → safe).
      - name: "🗜️ COMPACT app.json (anti-Athom-5MB-limit)"
        run: |
          node - << 'COMPACT'
          const fs = require('fs');
          const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          const compact = JSON.stringify(app);
          const prev = fs.statSync('app.json').size;
          fs.writeFileSync('app.json', compact, 'utf8');
          const curr = compact.length;
          console.log('app.json compacted:', (prev/1024/1024).toFixed(2) + 'MB → ' + (curr/1024/1024).toFixed(2) + 'MB');
          if (curr / 1024 / 1024 > 5) {
            console.error('❌ FATAL: app.json still > 5MB after compaction! (' + (curr/1024/1024).toFixed(2) + 'MB)');
            process.exit(1);
          }
          console.log('✅ app.json safe for Athom upload (' + (curr/1024/1024).toFixed(2) + 'MB < 5MB limit)');
          COMPACT
          # Also remove .homeycompose to prevent the Homey CLI from
          # re-expanding app.json with indentation during validate/publish
          rm -rf .homeycompose

      # ─────────────────────────────────────────────────────────────
      # 4.6 SLIM fingerprints.json — CRITICAL (prevents archive > 30MB)
      # ─────────────────────────────────────────────────────────────
      # WHY: data/fingerprints.json has 126,189 entries (11.3MB) but only
      # 1,430 match our 411 active drivers. The other 124,759 are dead weight.
      # FIX: Filter to only keep entries matching active driver manufacturerNames.
      # RESULT: 11.3MB → 0.16MB, archive 38MB → 25MB (< Athom 30MB limit)
      - name: "🪶 SLIM fingerprints.json (anti-Athom-30MB-archive-limit)"
        run: |
          node - << 'SLIM'
          const fs = require('fs');
          const path = require('path');

          const FP_PATH  = 'data/fingerprints.json';
          const APP_PATH = 'app.json';
          const DRV_DIR  = 'drivers';

          // Collect all manufacturerNames from active drivers
          const knownMfrs = new Set();
          const app = JSON.parse(fs.readFileSync(APP_PATH, 'utf8'));
          app.drivers.forEach(d => {
            if (d.zigbee && Array.isArray(d.zigbee.manufacturerName)) {
              d.zigbee.manufacturerName.forEach(m => m && knownMfrs.add(m.toLowerCase()));
            }
          });

          // Also scan driver.compose.json files
          try {
            fs.readdirSync(DRV_DIR, {withFileTypes:true})
              .filter(e=>e.isDirectory())
              .forEach(e => {
                const p = path.join(DRV_DIR, e.name, 'driver.compose.json');
                if (!fs.existsSync(p)) return;
                try {
                  const c = JSON.parse(fs.readFileSync(p,'utf8'));
                  if (c.zigbee && Array.isArray(c.zigbee.manufacturerName)) {
                    c.zigbee.manufacturerName.forEach(m => m && knownMfrs.add(m.toLowerCase()));
                  }
                } catch {}
              });
          } catch {}

          const before = fs.statSync(FP_PATH).size;
          const allFP = JSON.parse(fs.readFileSync(FP_PATH, 'utf8'));
          const total = Object.keys(allFP).length;

          // Filter — keep only entries matching known drivers
          const slimFP = {};
          for (const [key, val] of Object.entries(allFP)) {
            if (knownMfrs.has(key.toLowerCase())) slimFP[key] = val;
          }
          const kept = Object.keys(slimFP).length;

          fs.writeFileSync(FP_PATH, JSON.stringify(slimFP), 'utf8');
          const after = fs.statSync(FP_PATH).size;

          console.log('fingerprints.json: ' + total.toLocaleString() + ' entries => ' + kept + ' kept');
          console.log('Size: ' + (before/1024/1024).toFixed(2) + 'MB => ' + (after/1024/1024).toFixed(2) + 'MB');
          console.log('Saved: ' + ((before-after)/1024/1024).toFixed(2) + 'MB');
          if (kept === 0) {
            console.error('FATAL: 0 fingerprints kept -- manufacturerName extraction failed!');
            process.exit(1);
          }
          console.log('OK fingerprints.json slimmed (' + kept + ' active driver entries retained)');
          SLIM

      - name: Official Homey validator
        run: npx homey app validate --level publish

      # ─────────────────────────────────────────────────────────────
      # 5.5 DISABLE COMPOSE + COMPACT .homeybuild/app.json
      # ─────────────────────────────────────────────────────────────
      - name: "🗜️ DISABLE COMPOSE + COMPACT + REMOVE node_modules + ENSURE FIELDS"
        run: |
          echo '[]' > .homeyplugins.json
          rm -rf .homeybuild/node_modules
          find .homeybuild/drivers -name "large.png" -delete 2>/dev/null
          node - << 'POSTCOMPACT'
          const fs = require('fs');
          const p = '.homeybuild/app.json';
          if (!fs.existsSync(p)) { console.error('FATAL'); process.exit(1); }
          const before = fs.statSync(p).size;
          const app = JSON.parse(fs.readFileSync(p, 'utf8'));
          if (!app.api) { app.api = { getDevices: { method: 'get', path: '/devices', public: false, role: 'owner' } }; console.log('Added api field'); }
          if (!app.discovery) { app.discovery = { ewelink_mdns: { type: 'mdns-sd', 'mdns-sd': { name: 'ewelink', protocol: 'tcp' }, id: '{{txt.id}}' } }; console.log('Added discovery field'); }
          fs.writeFileSync(p, JSON.stringify(app), 'utf8');
          const after = fs.statSync(p).size;
          console.log('.homeybuild/app.json:', (before/1024/1024).toFixed(2) + 'MB -> ' + (after/1024/1024).toFixed(2) + 'MB');
          console.log('api:', app.api ? 'YES' : 'MISSING');
          console.log('capabilities:', app.capabilities ? 'YES(' + Object.keys(app.capabilities).length + ')' : 'MISSING');
          console.log('discovery:', app.discovery ? 'YES' : 'MISSING');
          if (after > 5242880) { console.error('FATAL: > 5MB'); process.exit(1); }
          POSTCOMPACT

      # ─────────────────────────────────────────────────────────────
      # 6. PUBLISH — homey CLI (archive already optimized in step 5.5)
      # ─────────────────────────────────────────────────────────────
      # node_modules/ removed in step 5.5 → archive will be ~6MB
      # IMPORTANT: Also remove .homeycompose to prevent compose plugin
      # from re-expanding app.json during publish
      - name: Publish to Homey App Store
        id: pub
        if: steps.check_pat.outputs.has_pat == 'true'
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          HOMEY_HEADLESS: "1"
        run: |
          # Final safety: ensure .homeycompose is removed
          rm -rf .homeycompose
          HOMEY_PAT="${HOMEY_PAT}" HOMEY_HEADLESS=1 npx homey app publish

      # ─────────────────────────────────────────────────────────────
      # 7. POST-PUBLISH (all continue-on-error)
      # ─────────────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: steps.check_pat.outputs.has_pat == 'true'
        continue-on-error: true
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: v${{ steps.info.outputs.version }}
          body: ${{ steps.cl.outputs.text }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Wait for Athom draft processing
        if: steps.pub.outputs.published == 'true'
        run: sleep 120

      - name: Install Puppeteer (draft → test promotion)
        if: steps.check_pat.outputs.has_pat == 'true'
        continue-on-error: true
        run: npm install puppeteer athom-api --no-save

      - name: "Tier 1: Promote via Browser"
        if: steps.check_pat.outputs.has_pat == 'true'
        id: promote_puppeteer
        continue-on-error: true
        timeout-minutes: 5
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: 'false'
        run: node .github/scripts/auto-promote-puppeteer.js

      - name: "Tier 2: Promote via OAuth"
        if: steps.check_pat.outputs.has_pat == 'true' && steps.promote_puppeteer.outcome != 'success'
        continue-on-error: true
        timeout-minutes: 3
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          ATHOM_CLIENT_ID: ${{ secrets.ATHOM_CLIENT_ID }}
          ATHOM_CLIENT_SECRET: ${{ secrets.ATHOM_CLIENT_SECRET }}
        run: node .github/scripts/auto-promote-oauth.js

      - name: "Tier 3: Promote via PAT API"
        if: steps.check_pat.outputs.has_pat == 'true' && steps.promote_puppeteer.outcome != 'success'
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: node .github/scripts/auto-publish-draft.js

      - name: Regenerate README & Docs
        if: always()
        continue-on-error: true
        run: |
          node .github/scripts/auto-update-docs.js || true
          node .github/scripts/generate-readme.js || true

      # ─────────────────────────────────────────────────────────────
      # 7.5 VERIFY BUILD ON HOMEY SERVERS + DASHBOARD CARTOGRAPHY
      # ─────────────────────────────────────────────────────────────
      - name: "🏗️ Verify Build State + Dashboard Cartography"
        if: steps.check_pat.outputs.has_pat == 'true'
        run: |
          echo "Checking build on Homey servers..."
          # Check build state
          node .github/scripts/athom-build-state-monitor.js --ci 2>&1 || true

          # Cartography of dev dashboard
          node .github/scripts/athom-dev-cartographer.js 2>&1 || true

          # Verify NOT in draft
          node -e "
            try {
              const s = JSON.parse(require('fs').readFileSync('.github/state/athom-build-state.json','utf8'));
              const b = s.builds?.[0] || {};
              if (b.channel === 'draft') {
                console.log('⚠️ Build still in DRAFT — auto-promoting...');
                process.exit(2);
              }
              console.log('✅ Build in ' + (b.channel||'unknown') + ' channel (v' + (b.version||'?') + ')');
            } catch(e) { console.log('Build state check skipped:', e.message); }
          "
          # Auto-promote if draft
          if [ $? -eq 2 ]; then
            node .github/scripts/auto-promote-puppeteer.js 2>&1 || \
            node .github/scripts/auto-promote-oauth.js 2>&1 || \
            node .github/scripts/auto-publish-draft.js 2>&1 || \
            echo "❌ Auto-promotion failed"
          fi
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
        continue-on-error: true

      # ─────────────────────────────────────────────────────────────
      # 8. BOT COMMIT — Always runs, commits clean state
      # ─────────────────────────────────────────────────────────────
      - name: Bot commit & push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          D=$(ls -d drivers/*/ 2>/dev/null | wc -l)
          F=$(grep -rohE '"_T[A-Za-z0-9_]+"' drivers/*/driver.compose.json 2>/dev/null | sort -uf | wc -l || echo 0)
          git diff --cached --quiet || git commit -m "v${{ steps.info.outputs.version }}: ${D} drivers, ${F} FPs [skip ci]"
          git pull --rebase origin master || true
          git push || true

      # ─────────────────────────────────────────────────────────────
      # 9. SUMMARY
      # ─────────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          APP_ID=$(node -p "require('./app.json').id" 2>/dev/null || echo "com.dlnraja.tuya.zigbee")
          echo "## v${{ steps.info.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Changelog:** ${{ steps.cl.outputs.text }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_pat.outputs.has_pat }}" == "true" ]; then
            echo "✅ Published to Homey App Store (Test channel)" >> $GITHUB_STEP_SUMMARY
            echo "[Install test version](https://homey.app/a/$APP_ID/test/)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Validated only — HOMEY_PAT not set" >> $GITHUB_STEP_SUMMARY
          fi
