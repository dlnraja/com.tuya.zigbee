name: Auto-Publish on Push

on:
  push:
    branches: [master, main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Nightly Auto-Process", "Sunday Master Automation", "Daily Everything Pipeline"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: true

jobs:
  publish:
    name: Validate & Auto-Publish to Test
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci --prefer-offline --no-audit || npm install

      - name: App info
        id: info
        run: |
          V=$(node -p "require('./app.json').version")
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "App v$V"

      - name: Generate AI Changelog
        continue-on-error: true
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node .github/scripts/generate-ai-changelog.js || echo "AI changelog skipped"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md README.md .homeychangelog.json
          git diff --cached --quiet || git commit -m "docs: AI changelog update [skip ci]"
          git push || true

      - name: Extract Changelog
        id: cl
        shell: bash
        run: |
          VER=$(node -p "require('./app.json').version")
          CL=$(node -e "const r=JSON.parse(require('child_process').execSync('node .github/scripts/extract-changelog.js '+process.argv[1],{encoding:'utf8'}).trim());process.stdout.write(r.homeyText)" "$VER" 2>/dev/null || echo "v${VER}: Bug fixes and improvements")
          echo "text=$CL" >> $GITHUB_OUTPUT

      - name: Validate
        uses: athombv/github-action-homey-app-validate@v1
        with:
          level: publish

      - name: Check HOMEY_PAT
        id: check_pat
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: |
          if [ -n "$HOMEY_PAT" ]; then
            echo "has_pat=true" >> $GITHUB_OUTPUT
          else
            echo "has_pat=false" >> $GITHUB_OUTPUT
            echo "::warning::HOMEY_PAT not configured - skipping publish"
          fi

      - name: Publish
        if: steps.check_pat.outputs.has_pat == 'true'
        uses: athombv/github-action-homey-app-publish@v1
        id: pub
        continue-on-error: true
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}

      - name: Create GitHub Release
        if: steps.check_pat.outputs.has_pat == 'true'
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: v${{ steps.info.outputs.version }}
          body: ${{ steps.cl.outputs.text }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Promote Draft to Test (Node)
        if: steps.check_pat.outputs.has_pat == 'true'
        id: promote_node
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: 'false'
        run: node .github/scripts/auto-publish-draft.js

      - name: Promote Draft to Test (curl fallback)
        if: steps.check_pat.outputs.has_pat == 'true' && steps.promote_node.outcome != 'success'
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: |
          APP=com.dlnraja.tuya.zigbee
          VER=${{ steps.info.outputs.version }}
          AUTH="Authorization: Bearer $HOMEY_PAT"
          CT="Content-Type: application/json"
          for BASE in https://apps-sdk-v3.athom.com https://api.athom.com; do
            for EP in "/api/app/$APP/version/$VER/test" "/app/$APP/version/$VER/test"; do
              CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X PUT -H "$AUTH" -H "$CT" "$BASE$EP")
              echo "PUT $BASE$EP => $CODE"
              [ "$CODE" = "200" ] || [ "$CODE" = "201" ] || [ "$CODE" = "204" ] && echo "SUCCESS" && exit 0
            done
            for EP in "/api/app/$APP/version/$VER/publish" "/app/$APP/version/$VER/publish"; do
              for M in PUT POST; do
                CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X $M -H "$AUTH" -H "$CT" -d '{"channel":"test"}' "$BASE$EP")
                echo "$M $BASE$EP => $CODE"
                [ "$CODE" = "200" ] || [ "$CODE" = "201" ] || [ "$CODE" = "204" ] && echo "SUCCESS" && exit 0
              done
            done
          done
          echo "::warning::Manual promote needed: https://tools.developer.homey.app/apps/app/$APP/versions"

      - name: Verify Test Channel
        if: steps.check_pat.outputs.has_pat == 'true'
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
        run: |
          sleep 20
          node .github/scripts/auto-publish-draft.js

      - name: Post to Forum
        if: steps.check_pat.outputs.has_pat == 'true'
        continue-on-error: true
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          APP_VERSION: ${{ steps.info.outputs.version }}
          CHANGELOG: ${{ steps.cl.outputs.text }}
        run: node .github/scripts/post-forum-update.js

      - name: Summary
        if: always()
        env:
          APP_VER: ${{ steps.info.outputs.version }}
          CL_TEXT: ${{ steps.cl.outputs.text }}
          HAS_PAT: ${{ steps.check_pat.outputs.has_pat }}
        run: |
          echo "## v${APP_VER}" >> $GITHUB_STEP_SUMMARY
          printf '**Changelog:** %s\n' "$CL_TEXT" >> $GITHUB_STEP_SUMMARY
          if [ "$HAS_PAT" == "true" ]; then
            echo "Published to Homey App Store (Test channel)" >> $GITHUB_STEP_SUMMARY
            echo "[Install test version](https://homey.app/a/com.dlnraja.tuya.zigbee/test/)" >> $GITHUB_STEP_SUMMARY
          else
            echo "Validated only (HOMEY_PAT not set)" >> $GITHUB_STEP_SUMMARY
          fi
