name: Auto-Publish on Push

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  publish:
    name: Validate & Auto-Publish to Test
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # === AI providers — circular chain (ai-helper.js) ===
      GOOGLE_API_KEY: "${{ secrets.GOOGLE_API_KEY }}"
      OPENAI_API_KEY: "${{ secrets.OPENAI_API_KEY }}"
      DEEPSEEK_API_KEY: "${{ secrets.DEEPSEEK_API_KEY }}"
      GROQ_API_KEY: "${{ secrets.GROQ_API_KEY }}"
      HF_TOKEN: "${{ secrets.HF_TOKEN }}"
      MISTRAL_API_KEY: "${{ secrets.MISTRAL_API_KEY }}"
      OPENROUTER_API_KEY: "${{ secrets.OPENROUTER_API_KEY }}"
      CEREBRAS_API_KEY: "${{ secrets.CEREBRAS_API_KEY }}"
      TOGETHER_API_KEY: "${{ secrets.TOGETHER_API_KEY }}"
      KIMI_API_KEY: "${{ secrets.KIMI_API_KEY }}"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: "${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install

      - name: App info
        id: pre_info
        run: |
          V=$(node -p "require('./app.json').version")
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Current v$V"

      - name: Generate AI Changelog
        continue-on-error: true
        env:
          GOOGLE_API_KEY: "${{ secrets.GOOGLE_API_KEY }}"
          GH_PAT: "${{ secrets.GH_PAT }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          node .github/scripts/generate-ai-changelog.js || echo "AI changelog skipped"
          echo "Changelog files updated (committed at end of workflow)"

      - name: Extract Changelog
        id: cl
        shell: bash
        run: |
          VER=$(node -p "require('./app.json').version")
          CL=$(node -e "const r=JSON.parse(require('child_process').execSync('node .github/scripts/extract-changelog.js '+process.argv[1],{encoding:'utf8'}).trim());process.stdout.write(r.homeyText)" "$VER" 2>/dev/null || echo "v${VER}: Bug fixes and improvements")
          {
            echo "text<<EOF"
            echo "$CL"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Auto bump version
        id: bump
        uses: athombv/github-action-homey-app-version@986685b4903efabc9531248b2fdc9734223ff9f3 # v1
        with:
          version: ${{ contains(github.event.head_commit.message, '[major]') && 'major' || contains(github.event.head_commit.message, '[minor]') && 'minor' || contains(github.event.head_commit.message, '[patch]') && 'patch' || 'patch' }}
          changelog: ${{ steps.cl.outputs.text }}


      - name: Sync package.json version
        run: node -e "const f=require('fs'),a=require('./app.json'),p=JSON.parse(f.readFileSync('package.json','utf8'));p.version=a.version;f.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');console.log('Synced package.json to v'+a.version);"

      - name: Bumped version
        id: info
        run: |
          V=$(node -p "require('./app.json').version")
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Bumped to v$V (was ${{ steps.pre_info.outputs.version }})"

      - name: Validate driver images
        run: node scripts/regen-images.js --check 2>&1 || echo "::warning::Image check skipped"
        continue-on-error: true

      - name: Validate (npx)
        run: npx homey app validate --level publish

      - name: Validate (Athom Docker)
        continue-on-error: true
        uses: athombv/github-action-homey-app-validate@v1
        with:
          level: publish

      - name: Check HOMEY_PAT
        id: check_pat
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: |
          if [ -n "$HOMEY_PAT" ]; then
            echo "has_pat=true" >> $GITHUB_OUTPUT
          else
            echo "has_pat=false" >> $GITHUB_OUTPUT
            echo "::warning::HOMEY_PAT not configured - skipping publish"
          fi

      - name: Publish
        if: steps.check_pat.outputs.has_pat == 'true'
        uses: athombv/github-action-homey-app-publish@v1
        id: pub
        continue-on-error: true
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}

      - name: Create GitHub Release
        if: steps.check_pat.outputs.has_pat == 'true'
        continue-on-error: true
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: v${{ steps.info.outputs.version }}
          body: ${{ steps.cl.outputs.text }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: "${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}"

      # ===== DRAFT → TEST (Puppeteer + API fallback) =====
      - name: Wait for Athom draft processing
        if: steps.pub.outcome == 'success'
        run: |
          echo "Waiting 120s for Athom to process draft build..."
          sleep 120

      - name: Install Puppeteer
        if: steps.check_pat.outputs.has_pat == 'true'
        continue-on-error: true
        run: npm install puppeteer athom-api --no-save

      - name: "Tier 1: Promote via Browser (Puppeteer)"
        if: steps.check_pat.outputs.has_pat == 'true'
        id: promote_puppeteer
        continue-on-error: true
        timeout-minutes: 5
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: 'false'
        run: node .github/scripts/auto-promote-puppeteer.js

      - name: "Tier 2: Promote via OAuth (headless)"
        if: steps.check_pat.outputs.has_pat == 'true' && steps.promote_puppeteer.outcome != 'success'
        id: promote_oauth
        continue-on-error: true
        timeout-minutes: 3
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          ATHOM_CLIENT_ID: ${{ secrets.ATHOM_CLIENT_ID }}
          ATHOM_CLIENT_SECRET: ${{ secrets.ATHOM_CLIENT_SECRET }}
        run: node .github/scripts/auto-promote-oauth.js

      - name: "Tier 3: Promote via API (PAT fallback)"
        if: steps.check_pat.outputs.has_pat == 'true' && steps.promote_puppeteer.outcome != 'success' && steps.promote_oauth.outcome != 'success'
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: node .github/scripts/auto-publish-draft.js

      - name: Upload promote screenshots
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v4
        with:
          name: push-promote-screenshots
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Post to Forum
        if: steps.check_pat.outputs.has_pat == 'true'
        continue-on-error: true
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          APP_VERSION: ${{ steps.info.outputs.version }}
          CHANGELOG: ${{ steps.cl.outputs.text }}
        run: node .github/scripts/post-forum-update.js

      - name: Regenerate README & Docs with fresh stats
        if: always()
        continue-on-error: true
        run: |
          node .github/scripts/auto-update-docs.js || true
          node .github/scripts/generate-readme.js || true

      - name: Commit & Push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          D=$(ls -d drivers/*/ 2>/dev/null | wc -l)
          F=$(grep -rohE '"_T[A-Za-z0-9_]+"' drivers/*/driver.compose.json 2>/dev/null | sort -uf | wc -l || true)
          git diff --cached --quiet || git commit -m "v${{ steps.info.outputs.version }}: ${D} drivers, ${F} FPs [skip ci]"
          git pull --rebase origin master -X theirs || true
          git push -u origin master || true

      - name: Summary
        if: always()
        run: |
          {
            echo "## v${{ steps.info.outputs.version }}"
            echo "**Changelog:**"
            echo "${{ steps.cl.outputs.text }}"
            if [ "${{ steps.check_pat.outputs.has_pat }}" == "true" ]; then
              echo ""
              echo "Published to Homey App Store (Test channel)"
              echo "[Install test version](https://homey.app/a/com.dlnraja.tuya.zigbee/test/)"
            else
              echo ""
              echo "Validated only (HOMEY_PAT not set)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

