defaults:
  run:
    shell: bash

# Continuous Flow — Consolidated daily workflow
#
# Replaces 10+ scheduled workflows:
#   - daily-maintenance.yml
#   - enrich-drivers.yml
#   - weekly-external-sync.yml (weekly)
#   - weekly-fingerprint-sync.yml (weekly)
#   - johan-sdk3-sync.yml (weekly)
#   - bilat-fp-sync.yml
#   - fetch-diags.yml
#   - upstream-auto-triage.yml (weekly)
#   - test-api-keys.yml
#   - shadow-policy-check.yml (only on push)
#
# Resource guard:
#   - Daily 03:00 UTC (off-peak, low GH load)
#   - Concurrency: cancel-in-progress on new run
#   - Timeout: 30 min
#   - Path filter: only on code changes (not docs/ images)
#   - Manual dispatch for apply mode
#   - DRY_RUN by default
#
# Outputs:
#   - .github/state/*.json reports (committed back via git)
#   - Single PR comment (not issue spam)
#   - Workflow run summary

name: continuous-flow

on:
  schedule:
    # Daily at 03:00 UTC (off-peak, low GH load)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode (dry-run, apply, metrics)'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - apply
          - metrics
      max_mfrs:
        description: 'Maximum new mfrs to apply (safety)'
        required: false
        default: '3'
        type: string
  push:
    branches: [master]
    paths:
      - 'drivers/**'
      - 'lib/**'
      - 'tools/**'
      - '.github/state/**'
      - 'data/mfs_db.json'
      - 'lib/tuya/fingerprints.json'
      - 'package.json'

# Cancel previous runs to save resources
concurrency:
  group: continuous-flow
  cancel-in-progress: true

# 30 min hard timeout
jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      DRY_RUN: ${{ github.event.inputs.mode != 'apply' && 'true' || 'false' }}
      MAX_MFRS: ${{ github.event.inputs.max_mfrs || '3' }}
      NODE_VERSION: '20'

    steps:
      - name: Upstream guard (no writes to Johan)
        id: guard
        uses: ./.github/workflows/upstream-guard.yml
        with:
          target_repo: dlnraja/com.tuya.zigbee

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 50
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install deps (cached)
        run: npm ci --prefer-offline --no-audit
        if: hashFiles('package-lock.json') != ''

      - name: Install deps (no lock)
        run: npm install --prefer-offline --no-audit --no-save
        if: hashFiles('package-lock.json') == ''

      - name: Audit Johan references
        id: audit-johan
        run: node tools/ci/audit-johan-references.js
        continue-on-error: true

      - name: Run shadow-mode v2
        id: shadow
        run: node tools/shadow-mode/shadow-mode-v2.js --all
        continue-on-error: true

      - name: Run bidirectional enricher
        id: enricher
        run: node tools/ci/bidirectional-enricher.js
        continue-on-error: true

      - name: Run mfs-db enricher
        id: mfs
        run: node tools/ci/mfs-db-enricher.js

      - name: P24.9 — Sacred Couple auto-enrichment
        id: sacred-couples
        run: node tools/ci/enrich-sacred-couples.js
        continue-on-error: true

      - name: Run intelligent variant finder
        id: variants
        run: node tools/ci/intelligent-variant-finder.js
        continue-on-error: true

      - name: Detect multi-device mfrs
        id: multi
        run: node tools/ci/detect-multi-device-mfrs.js
        continue-on-error: true

      - name: Validate app (AggregateError + process errors check)
        id: validate
        run: |
          set +e
          OUTPUT=$(npx homey app validate --level publish 2>&1)
          EXIT=$?
          set -e
          echo "$OUTPUT" | tail -50
          if [ $EXIT -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "AggregateError"; then
              echo "::error::AggregateError detected — run tools/ci/fix-empty-mfr-aggregateerror.js"
            fi
            if echo "$OUTPUT" | grep -qE "TypeError:|RangeError:|SyntaxError:"; then
              echo "::error::Process error detected in master"
            fi
            exit $EXIT
          fi
        continue-on-error: true

      - name: Build summary
        id: summary
        if: always()
        run: |
          {
            echo "## 🌒 Continuous Flow — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo "| Step | Status |"
            echo "| --- | --- |"
            echo "| shadow-mode | ${{ steps.shadow.outcome == 'success' && '✅' || '⚠️' }} |"
            echo "| enricher | ${{ steps.enricher.outcome == 'success' && '✅' || '⚠️' }} |"
            echo "| mfs | ${{ steps.mfs.outcome == 'success' && '✅' || '⚠️' }} |"
            echo "| variants | ${{ steps.variants.outcome == 'success' && '✅' || '⚠️' }} |"
            echo "| multi | ${{ steps.multi.outcome == 'success' && '✅' || '⚠️' }} |"
            echo "| validate | ${{ steps.validate.outcome == 'success' && '✅' || '❌' }} |"
            echo ""
            echo "**Mode**: ${{ github.event.inputs.mode || 'schedule' }}"
            echo "**DRY_RUN**: ${{ env.DRY_RUN }}"
            echo "**MAX_MFRS**: ${{ env.MAX_MFRS }}"
            echo "**Run ID**: ${{ github.run_id }}"
            echo "**Trigger**: ${{ github.event_name }}"
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: continuous-flow-reports-${{ github.run_id }}
          path: |
            .github/state/forum-integration-report.json
            .github/state/johan-integration-report.json
            .github/state/bidirectional-enrichment-report.json
            .github/state/mfs-enrichment-report.json
            .github/state/intelligent-variants.json
            .github/state/multi-device-detection.json
            tools/shadow-mode/state.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit state (apply only)
        if: github.event.inputs.mode == 'apply' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "continuous-flow: apply enrichments (run ${{ github.run_id }})"
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Continuous flow failed. Check the workflow run for details."
          echo "Run ID: ${{ github.run_id }}"
          echo "Trigger: ${{ github.event_name }}"

  post-comment:
    runs-on: ubuntu-latest
    needs: enrich
    if: github.event_name == 'push' && steps.enrich.outcome == 'success'
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find PR
        id: find-pr
        run: |
          PR=$(gh pr list --head "${{ github.ref_name }}" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          echo "pr=$PR" >> $GITHUB_OUTPUT

      - name: Post summary comment
        if: steps.find-pr.outputs.pr != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: continuous-flow
          message: |
            🌒 Continuous flow ran successfully.
            - Mode: ${{ github.event.inputs.mode || 'schedule' }}
            - DRY_RUN: ${{ env.DRY_RUN }}
            - Run: ${{ github.run_id }}\n