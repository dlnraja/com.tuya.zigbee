name: 🚀 FORCE FORUM RELEASE v7.2.5
on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  release:
    name: 📣 Force Forum Announcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit || npm install
      
      - name: 📣 Post v7.2.5 Update
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          CHANGELOG: "v7.2.5: Unified Awakening. Software-defined Premium Features: Circadian Lighting, Adaptive TPI Heating, Soft Transitions, and Unified Hardening. [FORCE RELEASE]"
          APP_VERSION: "7.2.5"
          FORCE_POST: "true"
        run: node .github/scripts/post-forum-update.js
        
      - name: 📝 Update First Post
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
        run: node .github/scripts/update-forum-first-post.js
