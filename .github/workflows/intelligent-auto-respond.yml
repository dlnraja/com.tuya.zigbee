name: "Intelligent Auto-Respond to Issues"

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

defaults:
  run:
    shell: bash

jobs:
  intelligent-respond:
    name: "Detect Bug Patterns & Auto-Respond"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    env:
      # === AI providers — circular chain (ai-helper.js) ===
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || '' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY || '' }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY || '' }}

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
      
      - name: "Analyze Issue with Intelligent Detection"
        id: analyze
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci --prefer-offline --no-audit || npm install
          node .github/scripts/auto-respond-intelligent.js
      
      - name: "Summary"
        if: always()
        run: |
          echo "✅ Intelligent auto-response workflow completed"
