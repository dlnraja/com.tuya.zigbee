name: "🤖 Autonomous Enrichment Pipeline — Investigate, Enrich, Secure, Fix"

# Per PROJECT_INDEX.md §30: Trellis Orchestration Compliance
# Per .windsurfrules: Shadow Mode — NO forum posting
# Per GLOBAL_INVESTIGATION_PLAN.md §8: Deep investigation even without diagnostics
# Per .agents/rules/security.md: Supply chain security, PII anonymization
# Per .clinerules: Case-insensitive matching, Smart Divisors, Pipeline 6c

on:
  schedule:
    - cron: '30 0 */2 * *' # Every 2 days at 00:30 UTC (staggered from daily-fingerprint at 00:00)
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: trellis-orchestration
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  trellis-brain:
    name: "🧠 Trellis Cognitive Loop — Collect → Investigate → Enrich → Secure → Fix"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # ═══════════════════════════════════════════════════════════
      # PHASE 1: COLLECT — All data sources (GitHub + Forum + Diagnostics)
      # ═══════════════════════════════════════════════════════════

      - name: "📡 [1/10] Ingest Multi-Source Data"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORUM_USERNAME: ${{ secrets.FORUM_USERNAME }}
          FORUM_PASSWORD: ${{ secrets.FORUM_PASSWORD }}
        run: |
          node .github/scripts/fetch-community-intel.js || true
          node .github/scripts/scan-prs-issues.js || true
          node scripts/automation/issue-content-analyzer.js || true
          node .github/scripts/forum-activity-scraper.js || true
          node .github/scripts/scan-forum.js || true
        continue-on-error: true

      - name: "✉️ [2/10] Fetch ALL Diagnostic Emails & Crash Logs"
        run: |
          node .github/scripts/collect-diagnostics.js || true
          node .github/scripts/gmail-imap-reader.js || true
          node scripts/automation/fetch-remote-logs.js || true
        continue-on-error: true

      # ═══════════════════════════════════════════════════════════
      # PHASE 2: INVESTIGATE — Deep cross-ref Z2M/ZHA/Domoticz
      # (works even without diagnostic codes)
      # ═══════════════════════════════════════════════════════════

      - name: "🔬 [3/10] Deep Investigation (Z2M/ZHA/Domoticz cross-ref)"
        run: |
          node scripts/automation/deep-investigate-and-resolve.js || true
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: "🤖 [4/10] AI-Powered Community Resolver"
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          node .github/scripts/autonomous-community-resolver.js || true
          node .github/scripts/diagnostic-auto-resolver.js || true
          node .github/scripts/diagnostic-auto-heal-radar.js || true
        continue-on-error: true

      # ═══════════════════════════════════════════════════════════
      # PHASE 3: ENRICH — FPs, collisions, DP mappings
      # ═══════════════════════════════════════════════════════════

      - name: "🧬 [5/10] Enrich FPs & Auto-Fix Collisions"
        run: |
          node scripts/automation/fix-fingerprint-conflicts.js --fix || true
          node scripts/validation/cross-category-collision-gate.js --fix || true
          node scripts/validation/dp-mapping-validator.js || true
          node scripts/automation/fix-crashers.js || true
        continue-on-error: true

      - name: "🔧 [6/10] Intelligent Lazyloading DB Optimization"
        run: |
          node scripts/automation/optimize-mf-databases.js --heuristic-update || true
          node scripts/automation/mega-fixer.js || true
        continue-on-error: true

      # ═══════════════════════════════════════════════════════════
      # PHASE 4: SECURE — Supply chain + PII + validation
      # Per .agents/rules/security.md
      # ═══════════════════════════════════════════════════════════

      - name: "🛡️ [7/10] Supply Chain Security Gate"
        run: |
          # Full supply chain security audit
          node scripts/security/supply-chain-guard.js || true
          # Secret scan
          node scripts/security/secret-scan.js full || true
          # Verify no secrets in git remote
          if git remote -v 2>/dev/null | grep -qiE 'gh[opsu]_[A-Za-z0-9]{30,}'; then
            echo "::error::GIT REMOTE CONTAINS A TOKEN!"
            exit 1
          fi
          # Verify npm audit
          npm audit --audit-level=high 2>/dev/null || echo "::warning::npm audit found vulnerabilities"
        continue-on-error: true

      - name: "🔏 [8/10] PII Anonymization (security.md §2)"
        run: |
          for f in .github/state/diagnostics-report.json .github/state/resolver-report.json; do
            [ -f "$f" ] && node scripts/security/pii-anonymizer.js "$f" --output "$f" 2>/dev/null || true
          done
          # Forum posting guard — verify NO auto-posting
          node scripts/security/forum-posting-guard.js || true
        continue-on-error: true

      # ═══════════════════════════════════════════════════════════
      # PHASE 5: VALIDATE & COMMIT
      # ═══════════════════════════════════════════════════════════

      - name: "✅ [9/10] Pre-Commit Quality Gate"
        run: |
          npm run master:fix || true
          node scripts/PRE_COMMIT_CHECKS.js || true
        continue-on-error: true

      - name: "📐 [10/10] Validation (archive + fingerprint health)"
        run: |
          node .github/scripts/check-archive-size.js || true
          node scripts/validation/check-fingerprint-health.js || true
        continue-on-error: true

      - name: "🔄 Auto-Commit & Push Fixes"
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Trellis: autonomous investigation + enrichment + security [skip ci]"
          branch: master
          file_pattern: 'drivers/*/driver.compose.json drivers/*/device.js app.json data/ lib/**/*.js .github/state/*.json'
