name: "Delete Flagged Forum Posts"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no deletes)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: forum-cleanup
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Delete flagged + hidden posts
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          DISCOURSE_API_USERNAME: dlnraja
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          echo "=== Phase 1: Delete flagged/hidden posts ==="
          node .github/scripts/forum-cleanup-now.js || true
          echo "=== Phase 2: Delete posts on wrong threads ==="
          node .github/scripts/cleanup-wrong-thread-posts.js || true
          echo "=== Phase 3: Delete specific bot duplicate posts ==="
          node .github/scripts/delete-bot-posts.js || true
