# Universal Tuya Zigbee - Monthly Community Sync
# v5.8.12 - Updated 2026-02-04
# Automatically sources fingerprints from community projects
# ENRICHMENT ONLY - Never overwrites base code, only adds complementary data
# Sources: JohanBendz fork, Zigbee2MQTT, ZHA, GitHub Issues/PRs, Homey Community Forums
# Forum threads: 140352 (dlnraja test), 26439 (JohanBendz main), 146735 (Tuya Smart Life), 89271 (Device Request Archive)

name: 🌐 Monthly Community Sync

on:
  schedule:
    - cron: '0 4 1 * *'  # 1st of month at 4 AM UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commits)'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: read

concurrency:
  group: monthly-community-sync
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: '22'

jobs:
  community-sync:
    name: 🔄 Sync Community Sources
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline || npm install

      - name: 🌐 Run Community Sync
        run: node scripts/community-sync/sync-all.js

      - name: 📊 Generate Summary Report
        run: node scripts/community-sync/generate-report.js >> $GITHUB_STEP_SUMMARY

      - name: 🌐 External Sources (Z2M+ZHA+Blakadder)
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node .github/scripts/external-sources-scanner.js

      - name: 🔍 Enrichment Scanner
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node .github/scripts/enrichment-scanner.js

      - name: 📋 Create Issue for New Fingerprints
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'data/community-sync/new-fingerprints.json';
            if (!fs.existsSync(reportPath)) return;
            const fps = JSON.parse(fs.readFileSync(reportPath));
            if (fps.length === 0) return;

            // v5.7.46: Enhanced issue body with productId and device type
            const body = `## 🌐 Monthly Community Sync Found ${fps.length} New Fingerprints\n\n` +
              `| Manufacturer ID | Product ID | Device Type | Source | Vendor |\n|---|---|---|---|---|\n` +
              fps.slice(0,50).map(f =>
                `| \`${f.mfr}\` | ${f.productId || '-'} | ${f.driver || '-'} | ${f.source} | ${f.vendor || '-'} |`
              ).join('\n') +
              (fps.length > 50 ? `\n\n*...and ${fps.length - 50} more*` : '') +
              `\n\n### Sources\n- Zigbee2MQTT tuya.ts\n- JohanBendz/com.tuya.zigbee\n- GitHub Issues/PRs\n- Homey Forum: dlnraja test (140352), JohanBendz (26439), Tuya Smart Life (146735), Device Archive (89271)\n\n` +
              `*Auto-generated by monthly community sync v5.7.46*`;

            // Dedup: check for existing open issue with same month
            const dupTitle=`[Auto] ${fps.length} new fingerprints from community (${new Date().toISOString().slice(0,7)})`;
            const {data:existing}=await github.rest.issues.listForRepo({
              owner:context.repo.owner,repo:context.repo.repo,
              state:'open',labels:'community-sync',per_page:5
            });
            if(existing.some(i=>i.title===dupTitle)){console.log('Issue exists:',dupTitle);return;}
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: dupTitle,
              body, labels: ['enhancement', 'community-sync']
            });

      - name: 📝 Commit Reports
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/community-sync/*.json || true
          NEW=$(node -p "try{JSON.parse(require('fs').readFileSync('data/community-sync/new-fingerprints.json')).length}catch(e){0}")
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          git diff --staged --quiet || git commit -m "Community sync v${VER} $(date +%Y-%m): ${NEW} new FPs from Z2M/ZHA/forum/JohanBendz [skip ci]"
          git pull --rebase origin master || true
          git push || true
