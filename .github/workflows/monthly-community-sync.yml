# Universal Tuya Zigbee - Monthly Community Sync
# v5.8.12 - Updated 2026-02-04
# Automatically sources fingerprints from community projects
# ENRICHMENT ONLY - Never overwrites base code, only adds complementary data
# Sources: JohanBendz fork, Zigbee2MQTT, ZHA, GitHub Issues/PRs, Homey Community Forums
# Forum threads: 140352 (dlnraja test), 26439 (JohanBendz main), 146735 (Tuya Smart Life), 89271 (Device Request Archive)

name: 🌐 Monthly Community Sync

on:
  schedule:
    - cron: '0 4 31 2 *'  # Feb 31 = never runs (consolidated into daily-everything)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commits)'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: read

concurrency:
  group: monthly-community-sync
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: '22'

jobs:
  community-sync:
    name: 🔄 Sync Community Sources
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # AI providers — circular chain (ai-helper.js handles rate limiting)
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || '' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY || '' }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY || '' }}
      GH_PAT: ${{ secrets.GH_PAT }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5 # v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v5 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline || npm install

      - name: 🌐 Run Community Sync
        run: node scripts/community-sync/sync-all.js

      - name: 📊 Generate Summary Report
        run: node scripts/community-sync/generate-report.js >> $GITHUB_STEP_SUMMARY

      - name: 🌐 External Sources (Z2M+ZHA+Blakadder)
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node .github/scripts/external-sources-scanner.js

      - name: 🔍 Enrichment Scanner
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node .github/scripts/enrichment-scanner.js

      - name: 📋 Create Issue for New Fingerprints
        continue-on-error: true
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'data/community-sync/new-fingerprints.json';
            if (!fs.existsSync(reportPath)) { console.log('No report file'); return; }
            const fps = JSON.parse(fs.readFileSync(reportPath));
            if (fps.length === 0) { console.log('No new fingerprints'); return; }

            // v5.12.1: Enriched report with ALL device fields
            const body = `## 🌐 Monthly Community Sync Found ${fps.length} New Fingerprints\n\n` +
              `| Manufacturer ID | Product ID | Device Type | Source | Vendor | Capabilities |\n|---|---|---|---|---|---|\n` +
              fps.slice(0,80).map(f =>
                `| \`${f.mfr}\` | ${f.productId || '-'} | ${f.driver || f.deviceType || '-'} | ${f.source} | ${f.vendor || '-'} | ${(f.capabilities||[]).slice(0,3).join(', ') || '-'} |`
              ).join('\n') +
              (fps.length > 80 ? `\n\n*...and ${fps.length - 80} more*` : '') +
              `\n\n### Sources\n- Zigbee2MQTT tuya.ts (mfr+pid+vendor+description)\n- JohanBendz/com.tuya.zigbee (mfr+pid+class+caps+battery)\n- GitHub Issues/PRs\n- Community Sources\n\n` +
              `### Statistics\n- Total new: ${fps.length}\n- With productId: ${fps.filter(f=>f.productId).length}\n- With vendor: ${fps.filter(f=>f.vendor).length}\n- Battery devices: ${fps.filter(f=>f.hasBattery).length}\n\n` +
              `*Auto-generated by monthly community sync v5.12.1*`;

            const dupTitle=`[Auto] ${fps.length} new fingerprints from community (${new Date().toISOString().slice(0,7)})`;
            
            // Rate limit aware: retry once after 60s if rate limited
            const tryCreate = async (attempt = 1) => {
              try {
                const {data:existing}=await github.rest.issues.listForRepo({
                  owner:context.repo.owner,repo:context.repo.repo,
                  state:'open',labels:'community-sync',per_page:5
                });
                if(existing.some(i=>i.title===dupTitle)){console.log('Issue exists:',dupTitle);return;}
                await github.rest.issues.create({
                  owner: context.repo.owner, repo: context.repo.repo,
                  title: dupTitle,
                  body, labels: ['enhancement', 'community-sync']
                });
                console.log('✅ Issue created:', dupTitle);
              } catch(e) {
                if (e.status === 403 && attempt < 2) {
                  console.log('⏳ Rate limited, waiting 60s...');
                  await new Promise(r => setTimeout(r, 60000));
                  return tryCreate(attempt + 1);
                }
                console.log('⚠️ Could not create issue (will retry next month):', e.message);
              }
            };
            await tryCreate();

      - name: 📝 Commit Reports
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/community-sync/*.json || true
          NEW=$(node -p "try{JSON.parse(require('fs').readFileSync('data/community-sync/new-fingerprints.json')).length}catch(e){0}")
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          git diff --staged --quiet || git commit -m "Community sync v${VER} $(date +%Y-%m): ${NEW} new FPs from Z2M/ZHA/community/JohanBendz [skip ci]"
          git pull --rebase origin master || true
          git push || true


