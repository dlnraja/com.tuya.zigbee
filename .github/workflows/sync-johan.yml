name: Synchronisation Johan Repo (Enhanced)

on:
  schedule:
    - cron: '30 2 * * *' # Every day at 02:30 AM
  workflow_dispatch:
    inputs:
      force_sync:
        description: "Force sync even if no changes detected"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

defaults:
  run:
    shell: bash

concurrency:
  group: sync-johan-upstream
  cancel-in-progress: true

jobs:
  sync-upstream:
    name: "Sync & Enrich from Johan SDK3"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # === AI providers — circular chain (ai-helper.js) ===
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Scrap & Sync Johan Benz commits (SDK3 & FPs)
        id: sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci || npm install
          # Uses the advanced AI sync script to detect new Device IDs and variants
          node .github/scripts/sync-johan-sdk3.js

      - name: Validate Multi-Gang Endpoints & Driver Conflicts
        run: |
          # Ensures Johan's multi-gang components don't conflict with our architecture
          node .github/scripts/driver-conflict-audit.js

      - name: Strict Homey Validation
        run: npx homey app validate --level publish

      - name: Create Auto-PR with Changes
        if: steps.sync.outputs.has_changes == 'true' || github.event.inputs.force_sync == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: sync from Johan Benz upstream (Enhanced AI) [skip ci]"
          title: "🔄 Synchronisation Automatique Johan Benz"
          body: |
            ## 🔄 Auto-Sync report
            This PR automatically cherry-picks changes and new device variants from Johan Benz's repository.
            
            **Stats:**
            - Added FPs: ${{ steps.sync.outputs.added }}
            - DP Gaps detected: ${{ steps.sync.outputs.gaps }}
            - New Johan drivers: ${{ steps.sync.outputs.new_drivers }}
            
            **Checks performed:**
            - [x] New device IDs detected using heuristics script
            - [x] Endpoint routing validated for multi-gang devices
            - [x] Tuya raw frame handlers adapted
            - [x] `homey app validate` passed
            
            **Protocol followed:** [SYNC_PROTOCOL.md](.github/skills/SYNC_PROTOCOL.md)
            
            *Please review carefully before merging. This PR is AI-ready for auto-merge if risk is low.*
          branch: auto-sync-johan-enhanced
          labels: "upstream, automerge, reviewed-by-ai, fingerprints"
          delete-branch: true
