name: Synchronisation Johan Repo (Enhanced)
on:
  schedule:
    - cron: '0 4 * * 1' # 4:00 AM UTC every Monday
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    env:
      # === AI providers — circular chain (ai-helper.js) ===
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || '' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY || '' }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY || '' }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Scrap & Sync Johan Benz commits (SDK3 & FPs)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci || npm install
          # Uses the advanced AI sync script to detect new Device IDs and variants
          node .github/scripts/sync-johan-sdk3.js

      - name: Validate Multi-Gang Endpoints & Driver Conflicts
        run: |
          # Ensures Johan's multi-gang components don't conflict with our architecture
          node .github/scripts/driver-conflict-audit.js

      - name: Create Auto-PR with Changes
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "improved: added support for new device variants [skip ci]"
          title: "🔄 Universal Maintenance: Device Variants Synchronisation"
          body: |
            ## 🔄 Maintenance Report
            This PR automatically synchronizes new device variants and improves compatibility.
            
            **Checks performed:**
            - [x] New device IDs detected using heuristics script
            - [x] Endpoint routing validated for multi-gang devices
            - [x] Tuya raw frame handlers adapted
            
            *Please review carefully before merging.*
          branch: auto-sync-johan-enhanced
          labels: "upstream, automerge"
