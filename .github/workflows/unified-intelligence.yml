# Re-enable by removing 'if: false' below
name: рџ§  Unified Intelligence Orchestrator

on:
  issues:
    types: [ opened, edited, labeled ]
  pull_request:
    types: [ opened, synchronize, labeled ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash

jobs:
  triage:
    name: рџ›ЎпёЏ Auto-Triage Agent
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    steps:
      - uses: actions/checkout@v5
      - name: рџ”Ќ Issue analysis
        run: node scripts/maintenance/github-issue-manager.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  ingest:
    name: рџ“Ґ Diagnostic Ingestion
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      - name: вљ™пёЏ Sync Crash Reports
        run: node scripts/maintenance/diagnostic-ingestion.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  benchmark:
    name: рџ“‰ Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
      - name: рџЏЃ Comparison Run
        run: node scripts/benchmark/app-audit-plus.js
