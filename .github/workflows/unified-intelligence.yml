name: 🧠 Unified Intelligence Orchestrator

on:
  issues:
    types: [ opened, edited, labeled ]
  pull_request:
    types: [ opened, synchronize, labeled ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  triage:
    name: 🛡️ Auto-Triage Agent
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    steps:
      - uses: actions/checkout@v5
      - name: 🔍 Issue analysis
        run: node scripts/maintenance/github-issue-manager.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  ingest:
    name: 📥 Diagnostic Ingestion
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      - name: ⚙️ Sync Crash Reports
        run: node scripts/maintenance/diagnostic-ingestion.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  benchmark:
    name: 📉 Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
      - name: 🏁 Comparison Run
        run: node scripts/benchmark/app-audit-plus.js
