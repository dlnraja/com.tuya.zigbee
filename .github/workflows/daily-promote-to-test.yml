name: Daily Draft to Test
on:
  schedule:
    - cron: '45 3 * * *'
    - cron: '45 9 * * *'
    - cron: '30 15 * * *'
    - cron: '30 21 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: [Auto Publish, Auto-Publish on Push, Daily Everything Pipeline]
    types: [completed]
permissions:
  contents: read
concurrency:
  group: promote-to-test
  cancel-in-progress: true
defaults:
  run:
    shell: bash

jobs:
  promote:
    name: Promote draft to test
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --prefer-offline --no-audit || npm install

      # Tier 1: Browser automation (Puppeteer) — the ONLY reliable method
      # Athom has no public API for draft→test, only the web UI works.
      - name: "Install Puppeteer"
        run: npm install puppeteer --no-save
      - name: "Tier 1: Promote via Browser (Puppeteer)"
        id: puppeteer
        continue-on-error: true
        timeout-minutes: 5
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
        run: node .github/scripts/auto-promote-puppeteer.js

      # Tier 2: API attempt (usually fails — Athom has no public promote endpoint)
      - name: "Tier 2: Promote via API (fallback)"
        id: api
        if: steps.puppeteer.outcome != 'success'
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: node .github/scripts/auto-publish-draft.js

      # Tier 3: Retry Puppeteer after 30s
      - name: "Tier 3: Verify retry (Puppeteer)"
        if: steps.puppeteer.outcome != 'success' && steps.api.outcome != 'success'
        continue-on-error: true
        timeout-minutes: 5
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
        run: |
          sleep 30
          node .github/scripts/auto-promote-puppeteer.js

      # Upload screenshots for debugging
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promote-screenshots
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          echo "## Draft to Test" >> $GITHUB_STEP_SUMMARY
          echo "v$VER | Puppeteer=${{ steps.puppeteer.outcome }} | API=${{ steps.api.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[Test link](https://homey.app/a/com.dlnraja.tuya.zigbee/test/) | [Manage](https://tools.developer.homey.app/apps/app/com.dlnraja.tuya.zigbee/versions)" >> $GITHUB_STEP_SUMMARY
