name: "🤖 Auto-Enrich & Resolve — Forum + Issues + Diagnostics"

on:
  schedule:
    - cron: '0 6 * * 0'  # Sunday 06:00 UTC (after weekly-auto-process)
  workflow_dispatch:
    inputs:
      deep_investigate:
        description: "Run deep investigation on all open issues"
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: auto-enrich-resolve
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  enrich-and-resolve:
    name: "🔍 Deep Investigate & Auto-Resolve"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci || npm install

      # ─── PHASE 1: COLLECT ALL DATA ───────────────────────────
      - name: "📡 [1/6] Scan GitHub Issues & PRs"
        run: |
          node .github/scripts/scan-prs-issues.js || true
          node scripts/automation/issue-content-analyzer.js || true
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "✉️ [2/6] Fetch Diagnostic Emails & Crash Logs"
        run: node .github/scripts/collect-diagnostics.js || true
        continue-on-error: true

      - name: "💬 [3/6] Scan Forum Messages (T140352)"
        run: |
          node .github/scripts/scan-forum.js || true
          node .github/scripts/forum-activity-scraper.js || true
        continue-on-error: true

      # ─── PHASE 2: DEEP INVESTIGATION ─────────────────────────
      - name: "🔬 [4/6] Deep Investigation (Z2M/ZHA/Domoticz cross-ref)"
        run: |
          echo "Running deep investigation on all open issues..."
          node scripts/automation/deep-investigate-and-resolve.js || true
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: "🤖 [5/6] Auto-Resolve Diagnostics & Triage"
        run: |
          node .github/scripts/diagnostic-auto-resolver.js || true
          node .github/scripts/diagnostic-auto-heal-radar.js || true
          node scripts/automation/fix-crashers.js || true
        continue-on-error: true

      # ─── PHASE 3: ENRICH & FIX ──────────────────────────────
      - name: "🧬 [6/6] Enrich FPs & Auto-Fix Collisions"
        run: |
          node scripts/automation/fix-fingerprint-conflicts.js --fix || true
          node scripts/validation/cross-category-collision-gate.js --fix || true
          node scripts/validation/dp-mapping-validator.js || true
          node scripts/automation/fix-crashers.js || true
        continue-on-error: true

      # ─── COMMIT ──────────────────────────────────────────────
      - name: "🔄 Commit Changes"
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore(auto): deep investigation + enrichment + auto-fix [skip ci]"
          git pull --rebase origin master || true
          git push || true
