name: Sync Changelog to README

on:
  schedule:
    - cron: '30 12 * * 1'  # Weekly Monday 12:30 UTC - sync changelog to README
  push:
    branches: [master]
    paths:
      - ".homeychangelog.json"
      - "app.json"

concurrency:
  group: sync-changelog
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  sync-changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install

      - name: Update README with changelog
        run: node scripts/automation/sync-changelog-readme.js

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          git commit -m "Changelog sync v${VER}: updated README with latest release notes [skip ci]"
          git pull --rebase origin master || true
          git push || true

