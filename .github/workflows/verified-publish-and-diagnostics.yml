# рџ‡євЂЊрџ‡івЂЊрџ‡®вЂЊрџ‡«вЂЊрџ‡®вЂЊрџ‡ЄвЂЊрџ‡©вЂЊ вЂЊрџ‡ЁвЂЊрџ‡ґвЂЊрџ‡івЂЊрџ‡ёвЂЊрџ‡ґвЂЊрџ‡±вЂЊрџ‡®вЂЊрџ‡©вЂЊрџ‡¦вЂЊрџ‡№вЂЊрџ‡®вЂЊрџ‡ґвЂЊрџ‡івЂЊ вЂЊрџ‡»вЂЊ8вЂЊ.вЂЊ5вЂЊ.вЂЊ1вЂЊ7вЂЊ вЂ” ENABLED
name: рџ”Ќ Verify, Diagnostics & Publish Test
# <!-- badges:start -->
# [![рџ”Ќ Verify, Diagnostics & Publish Test](https://github.com/dlnraja/com.tuya.zigbee/actions/workflows/verified-publish-and-diagnostics.yml/badge.svg)](https://github.com/dlnraja/com.tuya.zigbee/actions/workflows/verified-publish-and-diagnostics.yml)
# <!-- badges:end -->


on:
  workflow_dispatch:
    inputs:
      target_version:
        description: 'Version Г  publier (ex: 8.5.17)'
        required: true
        default: '8.5.17'
      run_diagnostics:
        description: "Lancer l'analyse des logs de crash"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  NODE_OPTIONS: "--dns-result-order=ipv4first"

defaults:
  run:
    shell: bash

jobs:
  # 1. Verification de l'accessibilitГ© et de la syntaxe
  verify-and-lint:
    name: рџ•µпёЏ VГ©rification & Syntaxe
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          cache: npm
          node-version: '22' # Requis pour Homey SDK v3 / Node 22 env

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: рџ›ЎпёЏ GitHub Actions & YAML Policy Gate
        run: npm run check:yaml

      - name: вЏ±пёЏ Homey Timer Context Guard
        run: npm run check:timer-context

      - name: рџ—ЈпёЏ Google Assistant / Alexa Voice-Safety Gate
        run: npm run check:voice

      - name: рџљ« Syntax Guard (Prevent Recursive Crashes)
        run: |
          echo "рџ”Ќ VГ©rification stricte de la syntaxe sur tous les fichiers critiques..."
          
          # 1. VГ©rification globale
          find lib drivers -name "*.js" -exec node -c {} +
          echo "вњ… Syntaxe globale OK."

          # 2. VГ©rifications spГ©cifiques post-crash (v7.4.6 & v7.4.8 patterns)
          # Pattern v7.4.8: Erreur ternaire/if hybride dans tuyaUtils.js
          if grep -rn "if.*return.*:.*null" lib/utils/tuyaUtils.js; then
             echo "вќЊ ERREUR BLOQUANTE: Pattern 'if ... return ... : null' dГ©tectГ© dans tuyaUtils.js. Voir PR #274."
             exit 1
          fi
          
          # Pattern v7.4.6: ParenthГЁse en trop dans AdvancedAnalytics.js
          if grep -rn "Math.round.*safeDivide.*10))" lib/analytics/AdvancedAnalytics.js; then
             echo "вќЊ ERREUR BLOQUANTE: ParenthГЁse excГ©dentaire dГ©tectГ©e dans AdvancedAnalytics.js."
             exit 1
          fi

          echo "вњ… Patterns de crash critiques vГ©rifiГ©s et absents."

      - name: Validate App Manifest
        run: npx homey app validate --level=publish

      - name: Sanitize generated manifest after validation
        run: node scripts/maintenance/sanitize-manifest.cjs app.json .homeybuild/app.json

  # 2. Analyse des Diagnostics (Simulation du dump email)
  analyze-diagnostics:
    name: рџ“§ Analyse des Crashs & Dump Emails
    runs-on: ubuntu-latest
    needs: verify-and-lint
    if: ${{ github.event.inputs.run_diagnostics == 'true' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: рџ“Ґ Traitement du Dump de Crashs (v7.4.8 & v7.4.6)
        run: |
          echo "рџ“‚ CrГ©ation du rapport d'analyse anonymisГ©..."
          mkdir -p reports/diagnostics
          
          # Rapport basГ© sur les erreurs fournies par l'utilisateur
          cat > reports/diagnostics/crash-analysis.md << 'EOF'
          # рџ“Љ Rapport d'Analyse des Crashs (AnonymisГ©)
          ## рџљЁ Patterns Critiques IdentifiГ©s
          
          | Version | Fichier | Ligne | Erreur | Cause Racine |
          |---------|---------|-------|--------|--------------|
          | **v7.4.8** | `lib/utils/tuyaUtils.js` | 118 | `SyntaxError: Unexpected token ':'` | MГ©lange invalide `if` / opГ©rateur ternaire. |
          | **v7.4.6** | `lib/analytics/AdvancedAnalytics.js` | 215 | `SyntaxError: Unexpected token ')'` | ParenthГЁse fermante orpheline dans `Math.round`. |
          
          ## рџ“ќ Analyse des Emails Utilisateurs
          - **Impact**: 100% des devices sur v7.4.8 crashent au dГ©marrage (`Unable to initialize app`).
          - **Firmware**: Affecte Homey Pro 2019 (v12/v13) et 2023 (v13).
          - **Action**: Le fix syntaxique est **OBLIGATOIRE** avant toute publication.
          EOF
          
          echo "вњ… Rapport gГ©nГ©rГ© dans reports/diagnostics/"

      - name: Upload Diagnostic Report
        uses: actions/upload-artifact@v4
        with:
          name: crash-analysis-report
          path: reports/diagnostics/

  # 3. Build et Publication
  build-and-publish:
    name: рџљЂ Build & Publish Test Channel
    runs-on: ubuntu-latest
    needs: verify-and-lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install Homey CLI
        run: npm install -g @athombv/homey-cli

      - name: Build App
        run: |
          echo "рџ“¦ Building version ${{ github.event.inputs.target_version }}..."
          # Note: Normalement gГ©rГ© par homey app publish, mais simulГ© ici pour le log
          # homey app build
          # ls -lh com.dlnraja.tuya.zigbee-*.tar.gz
          echo "вњ… Build simulГ© pour l'artifact."

      - name: рџљЂ Publish to Test Channel
        uses: athombv/github-action-homey-app-publish@48be66b7f2f870c22b6117d7bb84dfa06c4fc309 # v1
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}

      - name: рџ”Ќ VГ©rification Post-Publication
        run: |
          echo "рџЊђ URL de VГ©rification :"
          echo "https://homey.app/en-us/app/com.dlnraja.tuya.zigbee/Universal-Tuya/test/"
          echo "вЏі Attendre 2-5 minutes pour la mise Г  jour du store..."
