name: "Merge Last Forum Posts"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no edits)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: forum-merge
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5 # v5
      - uses: actions/setup-node@v5 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Merge last 3 posts into 1 humanized post
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || '' }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY || '' }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY || '' }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
          HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node .github/scripts/merge-last-posts.js
