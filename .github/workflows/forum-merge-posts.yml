name: "Merge Last Forum Posts"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no edits)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: forum-merge
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Merge last 3 posts into 1 humanized post
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node .github/scripts/merge-last-posts.js
