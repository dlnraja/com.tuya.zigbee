# Universal Tuya Zigbee - Auto PR/Issue Responder
# Triggers on issues/PRs: opened, reopened, edited on dlnraja repo
# Checks fingerprints, responds, labels, and auto-closes if all FPs supported

name: "Auto Issue/PR Responder"

on:
  issues:
    types: [opened, reopened, edited]
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: auto-respond-${{ github.event.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: "22"

jobs:
  respond:
    name: "Auto-Respond"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      
      - name: 📦 Setup Nexus
        uses: ./.github/actions/setup-nexus
      
      - name: "0a. Intelligence Mode Selector (Cloudless-First)"
        id: intelligence_selector
        run: |
          if [ -n "${{ secrets.GOOGLE_API_KEY }}" ] || [ -n "${{ secrets.OPENAI_API_KEY }}" ] || [ -n "${{ secrets.OPENROUTER_API_KEY }}" ]; then
            echo "PIPELINE_MODE=AI_ORCHESTRATED" >> $GITHUB_ENV
          else
            echo "PIPELINE_MODE=RULE_BASED" >> $GITHUB_ENV
          fi

      - name: Check fingerprints, respond, and auto-close
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/issue-auto-responder.js');
            await script({ github, context });
