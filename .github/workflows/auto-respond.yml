# Universal Tuya Zigbee - Auto PR/Issue Responder
# Triggers on new issues/PRs opened on dlnraja repo
# Checks fingerprints and posts enhanced response with procedures

name: "Auto Issue/PR Responder"

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: auto-respond-${{ github.event.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  respond:
    name: "Auto-Respond"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check fingerprints and respond
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const APP = 'https://homey.app/a/com.dlnraja.tuya.zigbee/test/';
            const FORUM = 'https://community.homey.app/t/app-pro-universal-tuya-zigbee-device-app-test/140352';
            const DEV = 'https://tools.developer.homey.app';

            // Load all fingerprints
            const fps = new Set();
            const driverMap = new Map();
            const driversDir = path.join(process.env.GITHUB_WORKSPACE, 'drivers');
            for (const d of fs.readdirSync(driversDir)) {
              const cf = path.join(driversDir, d, 'driver.compose.json');
              if (!fs.existsSync(cf)) continue;
              const matches = fs.readFileSync(cf,'utf8').match(/"_T[A-Za-z0-9_]+"/g) || [];
              for (const m of matches) {
                const fp = m.replace(/"/g,'');
                fps.add(fp);
                if (!driverMap.has(fp)) driverMap.set(fp, []);
                driverMap.get(fp).push(d);
              }
            }

            // Extract fingerprints from issue/PR body
            const body = context.payload.issue?.body || context.payload.pull_request?.body || '';
            const title = context.payload.issue?.title || context.payload.pull_request?.title || '';
            const text = title + ' ' + body;
            const re = /_T[A-Z][A-Za-z0-9]{3,5}_[a-z0-9]{4,16}/g;
            const mfrs = [...new Set(text.match(re) || [])];
            // Also match non-Tuya IDs like A89G12C, Arteco etc
            const nonTuya = [...new Set((text.match(/\b[A-Z][A-Z0-9]{5,15}\b/g) || []).filter(m => !m.startsWith('TS0') && fps.has(m)))];
            const allMfrs = [...new Set([...mfrs, ...nonTuya])];

            if (!allMfrs.length) {
              console.log('No fingerprints found in text');
              return;
            }

            const found = allMfrs.filter(m => fps.has(m));
            const missing = allMfrs.filter(m => !fps.has(m));
            const version = require(path.join(process.env.GITHUB_WORKSPACE,'app.json')).version;
            const num = context.issue?.number || context.payload.pull_request?.number;
            const isPR = !!context.payload.pull_request;

            let msg = '<!-- tuya-triage-bot -->\n';

            if (found.length) {
              const lines = found.map(m => {
                const drivers = driverMap.get(m) || ['unknown'];
                return `| \`${m}\` | **${drivers.join('**, **')}** |`;
              }).join('\n');
              msg += `**Already supported** in v${version}:\n\n| Fingerprint | Driver(s) |\n|---|---|\n${lines}\n\n`;
            }

            if (missing.length) {
              msg += `**Not yet supported:** \`${missing.join('`, `')}\`\n`;
              msg += `Logged for next release.\n\n`;
              msg += `### To speed up support, please provide:\n`;
              msg += `1. **Device Interview**: [Developer Tools](${DEV}) > select device > Interview\n`;
              msg += `2. **Zigbee2MQTT** device page (if available)\n`;
              msg += `3. **Product link** (AliExpress, Amazon, manufacturer)\n\n`;
            }

            if (isPR) {
              msg += `Thanks for this PR! The fingerprints have been tracked.\n\n`;
            }

            msg += `### Links\n`;
            msg += `- **[Install test version](${APP})**\n`;
            msg += `- **[Forum](${FORUM})**\n`;
            msg += `- **[Developer Tools](${DEV})** (interviews & diagnostics)\n\n`;
            msg += `> After installing, **remove and re-pair** your device. `;
            msg += `If issues persist, share a diagnostic report ID on the [Forum](${FORUM}).`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
              body: msg
            });
            // Auto-label
            const labels = [];
            if (missing.length) labels.push('new-device');
            if (found.length && !missing.length) labels.push('already-supported');
            if (labels.length) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: num, labels
              });
            }
            console.log(`Responded to #${num}: ${found.length} found, ${missing.length} missing`);
