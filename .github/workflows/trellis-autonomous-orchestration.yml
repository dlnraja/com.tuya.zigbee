name: Trellis Autonomous Multi-Agent Orchestration

on:
  schedule:
    - cron: '0 0 */2 * *' # Run once every 2 days
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: trellis-orchestration
  cancel-in-progress: false

jobs:
  trellis-brain:
    name: Trellis Cognitive Loop & Subtasking
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Ingest Multi-Source Data (GitHub & Forum)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORUM_USERNAME: ${{ secrets.FORUM_USERNAME }}
          FORUM_PASSWORD: ${{ secrets.FORUM_PASSWORD }}
        run: |
          echo "Aggregating GitHub Issues, PRs, and Forum Messages..."
          node .github/scripts/fetch-community-intel.js || true
          node .github/scripts/forum-activity-scraper.js || true

      - name: Trellis Intelligent Subtask Delegation
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "Processing intelligence and modifying drivers..."
          node .github/scripts/autonomous-community-resolver.js

      - name: Intelligent Lazyloading DB Optimization
        run: |
          echo "Optimizing and intelligently updating static JSON MF databases..."
          node scripts/automation/optimize-mf-databases.js --heuristic-update || true

      - name: Pre-Commit Quality Gate
        run: |
          echo "Running master:fix to re-compile app.json and validate..."
          npm run master:fix

      - name: Auto-Commit & Push Fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Trellis: Autonomous orchestration fixes & community FPs [skip ci]"
          branch: master
          file_pattern: 'drivers/*/driver.compose.json app.json data/'
