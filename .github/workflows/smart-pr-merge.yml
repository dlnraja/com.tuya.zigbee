name: Smart PR Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to merge (0 = all open)"
        type: number
        default: 0

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: smart-merge-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  smart-merge:
    name: "AI-Assisted Smart Merge"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Run on any PR (bot or human), or manual dispatch
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')
    env:
      # === AI providers — circular chain (ai-helper.js) ===
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || '' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY || '' }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY || '' }}

    steps:
      - uses: actions/checkout@v5 # v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install

      - name: Determine PR to process
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUM="${{ inputs.pr_number }}"
            if [ "$PR_NUM" = "0" ]; then
              # Process all open PRs
              echo "mode=all" >> $GITHUB_OUTPUT
              echo "Processing all open PRs"
            else
              echo "mode=single" >> $GITHUB_OUTPUT
              echo "number=$PR_NUM" >> $GITHUB_OUTPUT
            fi
          else
            echo "mode=single" >> $GITHUB_OUTPUT
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: "Validate & Smart Merge"
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node .github/scripts/smart-pr-merge.js "${{ steps.pr.outputs.mode }}" "${{ steps.pr.outputs.number }}"

      - name: "Commit merge results"
        if: steps.merge.outputs.merged == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Merge PR improvements [skip ci]"
          git push origin HEAD || true

      - name: Summary
        if: always()
        run: |
          echo "## Smart PR Merge" >> $GITHUB_STEP_SUMMARY
          echo "Mode: ${{ steps.pr.outputs.mode }}" >> $GITHUB_STEP_SUMMARY
          echo "Result: ${{ steps.merge.outcome }}" >> $GITHUB_STEP_SUMMARY
