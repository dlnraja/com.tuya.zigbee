name: Collect Diagnostics
on:
  schedule:
    - cron: '15 10 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: read

concurrency:
  group: collect-diagnostics
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install

      - name: Collect diagnostics from all sources
        env:
          HOMEY_PAT_API: ${{ secrets.HOMEY_PAT_API }}
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/collect-diagnostics.js

      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Diagnostics update $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase origin master || true
          git push || true

      - name: "Pattern Detector (analyze collected diagnostics)"
        if: always()
        continue-on-error: true
        timeout-minutes: 5
        run: node .github/scripts/pattern-detector.js

      - name: "Resolution Summary"
        if: always()
        continue-on-error: true
        run: node .github/scripts/resolution-summary.js

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v4
        with:
          name: diagnostics-summary
          path: diagnostics/summary.json
          retention-days: 30

