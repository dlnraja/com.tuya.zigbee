name: Collect Diagnostics
on:
  schedule:
    - cron: '15 10 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: read

concurrency:
  group: collect-diagnostics
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - run: npm ci --prefer-offline --no-audit || npm install

      - name: Collect diagnostics from all sources
        env:
          HOMEY_PAT_API: ${{ secrets.HOMEY_PAT_API }}
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/collect-diagnostics.js

      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Diagnostics update $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase origin master || true
          git push || true

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: diagnostics-summary
          path: diagnostics/summary.json
          retention-days: 30
