name: JS Syntax Purity Gate

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Comprehensive Recursive Syntax Scan
        run: |
          echo "=== STARTING GLOBAL SYNTAX PURITY SCAN ==="
          # Check all JS files in root, lib, and drivers
          find . -maxdepth 1 -name "*.js" -exec node -c {} \;
          find lib -name "*.js" -exec node -c {} \;
          find drivers -name "*.js" -exec node -c {} \;
          echo "=== SYNTAX VALIDATION PASSED ==="

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run lint
