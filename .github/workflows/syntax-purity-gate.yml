name: JS Syntax Purity Gate

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: 🛡️ Strict Syntax Purity Guard
        run: |
          echo "=== STARTING GLOBAL SYNTAX PURITY SCAN ==="
          node scripts/maintenance/STRICT_SYNTAX_GUARD.js
          echo "=== SYNTAX VALIDATION PASSED ==="

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run lint
