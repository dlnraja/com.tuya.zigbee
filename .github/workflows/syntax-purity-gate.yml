name: JS Syntax Purity Gate

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash

jobs:
  validate-syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          
      - name: 🛡️ Strict Syntax Purity Guard
        run: |
          echo "=== STARTING GLOBAL SYNTAX PURITY SCAN ==="
          node scripts/maintenance/STRICT_SYNTAX_GUARD.js
          echo "=== STARTING ARITHMETIC INTEGRITY SCAN ==="
          node scripts/maintenance/ARITHMETIC_INTEGRITY_CHECK.js
          echo "=== STARTING FLEETWOOD INTEGRITY GATEWAY ==="
          node scripts/PRE_COMMIT_CHECKS.js
          echo "=== VALIDATION PASSED ==="

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run lint
