name: "🚀 Publish Stable to Test"

# <!-- badges:start -->
# [![🚀 Publish Stable to Test](https://github.com/dlnraja/com.tuya.zigbee/actions/workflows/publish-stable.yml/badge.svg)](https://github.com/dlnraja/com.tuya.zigbee/actions/workflows/publish-stable.yml)
# <!-- badges:end -->


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - stable-v5
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: "22"

jobs:
  pre-validation:
    name: "Pre-Validation"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit || npm install
      - name: Crash regression guard - Homey timer context
        run: npm run check:timer-context
      - name: SDK3 Validation
        run: |
          SDK=$(node -p "require('./app.json').sdkVersion")
          if [ "$SDK" != "3" ]; then
            echo "::error::Invalid SDK: $SDK (expected 3)"
            exit 1
          fi
          echo "SDK3 validated"
      - name: Validate App
        run: npx homey app validate --level publish
      - name: Sanitize generated manifest after validation
        run: node scripts/maintenance/sanitize-manifest.cjs app.json .homeybuild/app.json

  publish:
    name: "Publish to Draft"
    needs: pre-validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit || npm install
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Build App
        run: npx homey app build
      - name: Sanitize Built Manifest
        run: |
          node scripts/maintenance/fix-large-images.js
          node scripts/maintenance/optimize-build-images.cjs
          node scripts/maintenance/sanitize-manifest.cjs .homeybuild/app.json
      - name: Prepare Publish Directory
        run: npm run prepare-publish
      - name: Publish to Draft
        id: publish
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: |
          PUBLISH_DIR="$(node -p "require('path').join(require('os').tmpdir(), 'homey-publish-temp')")"
          if [ ! -d "$PUBLISH_DIR" ]; then
            echo "::error::Prepared publish directory is missing: $PUBLISH_DIR"
            exit 1
          fi
          cd "$PUBLISH_DIR"
          npm ci --omit=dev --ignore-scripts --no-audit --no-fund || npm install --omit=dev --ignore-scripts --no-audit --no-fund
          set +e
          if [ -x "$GITHUB_WORKSPACE/node_modules/.bin/homey" ]; then
            publish_output=$(HOMEY_HEADLESS=1 HOMEY_PAT="$HOMEY_PAT" "$GITHUB_WORKSPACE/node_modules/.bin/homey" app publish --path "$PUBLISH_DIR" 2>&1)
          else
            publish_output=$(HOMEY_HEADLESS=1 HOMEY_PAT="$HOMEY_PAT" npx homey app publish --path "$PUBLISH_DIR" 2>&1)
          fi
          publish_status=$?
          set -e
          printf '%s\n' "$publish_output"
          if [ "$publish_status" -ne 0 ]; then
            if printf '%s\n' "$publish_output" | grep -Eiq 'already been published|currently in review'; then
              echo "::warning::Homey reports this version is already published or in review; continuing so test promotion can proceed."
            else
              exit "$publish_status"
            fi
          fi
          echo "Draft publish completed"

  promote:
    name: "Promote to Test"
    needs: [pre-validation, publish]
    if: always() && needs.pre-validation.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Wait for Athom draft processing
        run: sleep 120
      - name: Install Puppeteer
        continue-on-error: true
        run: npm install puppeteer --no-save
      - name: Promote via Browser (Puppeteer)
        continue-on-error: true
        timeout-minutes: 5
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
        run: node .github/scripts/auto-promote-puppeteer.js
      - name: Promote via API (PAT)
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: node .github/scripts/auto-publish-draft.js
      - name: Summary
        if: always()
        run: |
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          APP_ID=$(node -p "require('./app.json').id" 2>/dev/null || echo "?")
          echo "## Stable Publish" >> $GITHUB_STEP_SUMMARY
          echo "v$VER | APP_ID: $APP_ID" >> $GITHUB_STEP_SUMMARY
      - name: Full diagnostics sweep - sanitized
        if: always()
        continue-on-error: true
        timeout-minutes: 10
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_DIAG_AI_MAX: "0"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          HOMEY_PAT_API: ${{ secrets.HOMEY_PAT_API }}
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: "true"
        run: |
          run_diag() {
            local seconds="$1"
            shift
            local label="$*"
            echo "::group::${label}"
            if timeout --kill-after=30s "${seconds}s" "$@"; then
              echo "[diag] completed: ${label}"
            else
              local code=$?
              echo "::warning title=Diagnostics command timed out or failed::${label} exited with code ${code}"
            fi
            echo "::endgroup::"
          }

          run_diag 180 node .github/scripts/fetch-gmail-diagnostics.js
          run_diag 90 node scripts/automation/dashboard-monitor.js --latest --json
          run_diag 120 node .github/scripts/homey-device-diagnostics.js
          run_diag 120 node .github/scripts/collect-diagnostics.js
          run_diag 60 node .github/scripts/privacy-redactor.js diagnostics .github/state/diagnostics-report.json .github/state/diagnostics-crossref.yml .github/state/homey-device-report.json .github/state/dashboard-monitor-report.json
