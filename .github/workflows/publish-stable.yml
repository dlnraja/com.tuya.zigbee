name: "🚀 Publish Stable to Test"
on:
  push:
    branches:
      - stable-v5
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "22"
  APP_ID: "com.dlnraja.tuya.zigbee.stable"

jobs:
  pre-validation:
    name: "Pre-Validation"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit || npm install
      - name: SDK3 Validation
        run: |
          SDK=$(node -p "require('./app.json').sdk")
          if [ "$SDK" != "3" ]; then
            echo "::error::Invalid SDK: $SDK (expected 3)"
            exit 1
          fi
          echo "SDK3 validated"
      - name: Validate App
        run: npx homey app validate --level publish

  publish:
    name: "Publish to Draft"
    needs: pre-validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit || npm install
      - name: Publish to Draft
        uses: athombv/github-action-homey-app-publish@v1
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}

  promote:
    name: "Promote to Test"
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Wait for Athom draft processing
        run: sleep 120
      - name: Install Puppeteer
        continue-on-error: true
        run: npm install puppeteer --no-save
      - name: Promote via Browser (Puppeteer)
        continue-on-error: true
        timeout-minutes: 5
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
        run: node .github/scripts/auto-promote-puppeteer.js
      - name: Promote via API (PAT)
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: node .github/scripts/auto-publish-draft.js
      - name: Summary
        if: always()
        run: |
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          echo "## Stable Publish" >> $GITHUB_STEP_SUMMARY
          echo "v$VER | APP_ID: ${{ env.APP_ID }}" >> $GITHUB_STEP_SUMMARY