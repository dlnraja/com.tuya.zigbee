name: "🚀 Publish Stable to Test"
on:
  push:
    branches:
      - stable-v5
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "22"
  APP_ID: "com.dlnraja.tuya.zigbee.stable"

jobs:
  pre-validation:
    name: "Pre-Validation"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit || npm install
      - name: SDK3 Validation
        run: |
          SDK=$(node -p "require('./app.json').sdk")
          if [ "$SDK" != "3" ]; then
            echo "::error::Invalid SDK: $SDK (expected 3)"
            exit 1
          fi
          echo "SDK3 validated"
      - name: Validate App
        run: npx homey app validate --level publish

  publish:
    name: "Publish to Draft"
    needs: pre-validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit || npm install

      - name: Determine Version Bump Level
        id: bump_level
        shell: bash
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" == *"[major]"* ]]; then
            echo "level=major" >> $GITHUB_OUTPUT
            echo "Determined level: major"
          elif [[ "$COMMIT_MSG" == *"[minor]"* ]]; then
            echo "level=minor" >> $GITHUB_OUTPUT
            echo "Determined level: minor"
          else
            echo "level=patch" >> $GITHUB_OUTPUT
            echo "Determined level: patch (default)"
          fi

      - name: Extract Changelog
        id: cl
        shell: bash
        run: |
          VER=$(node -p "require('./app.json').version")
          echo "text=v${VER}: Bug fixes and stable improvements" >> $GITHUB_OUTPUT

      - name: Auto bump version
        id: bump
        uses: athombv/github-action-homey-app-version@v1
        with:
          version: ${{ steps.bump_level.outputs.level }}
          changelog: ${{ steps.cl.outputs.text }}

      - name: Sync package.json version
        run: node -e "const f=require('fs'),a=require('./app.json'),p=JSON.parse(f.readFileSync('package.json','utf8'));p.version=a.version;f.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');console.log('Synced package.json to v'+a.version);"

      - name: Commit & Push Version Bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.json package.json
          git commit -m "chore(release): bump version to v$(node -p \"require('./app.json').version\") [skip ci]" || true
          git push || true

      - name: Publish to Draft
        uses: athombv/github-action-homey-app-publish@v1
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}

  promote:
    name: "Promote to Test"
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Wait for Athom draft processing
        run: sleep 120
      - name: Install Puppeteer
        continue-on-error: true
        run: npm install puppeteer --no-save
      - name: Promote via Browser (Puppeteer)
        continue-on-error: true
        timeout-minutes: 5
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
        run: node .github/scripts/auto-promote-puppeteer.js
      - name: Promote via API (PAT)
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: node .github/scripts/auto-publish-draft.js
      - name: Summary
        if: always()
        run: |
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          echo "## Stable Publish" >> $GITHUB_STEP_SUMMARY
          echo "v$VER | APP_ID: ${{ env.APP_ID }}" >> $GITHUB_STEP_SUMMARY