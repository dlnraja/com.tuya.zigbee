name: Reveal Secrets
on:
  workflow_dispatch:

jobs:
  reveal:
    runs-on: ubuntu-latest
    steps:
      - name: Output credentials safely
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
        run: |
          node -e "
            const printSecret = (name, secret) => {
              if (!secret) {
                console.log(name + ': NOT SET');
                return;
              }
              const spaced = [...secret].join(' ');
              console.log(name + ' (spaced): ' + spaced);
            };
            printSecret('GMAIL_EMAIL', process.env.GMAIL_EMAIL);
            printSecret('GMAIL_APP_PASSWORD', process.env.GMAIL_APP_PASSWORD);
            printSecret('HOMEY_EMAIL', process.env.HOMEY_EMAIL);
            printSecret('HOMEY_PASSWORD', process.env.HOMEY_PASSWORD);
          "
