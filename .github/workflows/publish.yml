# Auto Publish - Official Athom Actions (NO CLI)
# Required secret: HOMEY_PAT (from https://tools.developer.homey.app/me)
name: Auto Publish
"on":
  push:
    branches: [master, main]
    paths:
      - "app.json"
      - ".homeycompose/**"
      - "lib/**"
      - "drivers/**"
      - "assets/**"
      - "locales/**"
      - "package.json"
  workflow_dispatch:
    inputs:
      version:
        type: choice
        options: [patch, minor, major]
        default: patch
      changelog:
        type: string
        required: false
permissions:
  contents: write
concurrency:
  group: publish
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Athom Validate
        uses: athombv/github-action-homey-app-validate@master
        with:
          level: publish
  version-and-publish:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Changelog
        id: cl
        shell: bash
        run: |
          CL="${{ inputs.changelog }}"
          if [ -z "$CL" ]; then
            CL="Auto-publish via GitHub Actions"
          fi
          echo "text=$CL" >> $GITHUB_OUTPUT
      - name: Bump
        id: bump
        uses: athombv/github-action-homey-app-version@master
        with:
          version: ${{ inputs.version || 'patch' }}
          changelog: ${{ steps.cl.outputs.text }}
      - name: Push
        shell: bash
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v${{ steps.bump.outputs.version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish
        id: pub
        uses: athombv/github-action-homey-app-publish@master
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}
      - run: echo "Published v${{ steps.bump.outputs.version }} - ${{ steps.pub.outputs.url }}" >> $GITHUB_STEP_SUMMARY
