# Auto Publish - Official Athom Actions (NO CLI)
# Required secrets: HOMEY_PAT (from https://tools.developer.homey.app/me)
# Optional: HOMEY_EMAIL + HOMEY_PASSWORD (for forum posting via cookie auth)
name: Auto Publish
"on":
  push:
    branches: [master, main]
    paths:
      - "app.js"
      - "app.json"
      - ".homeycompose/**"
      - "lib/**"
      - "drivers/**"
      - "assets/**"
      - "locales/**"
      - "package.json"
  workflow_dispatch:
    inputs:
      version:
        type: choice
        options: [patch, minor, major]
        default: patch
      changelog:
        type: string
        required: false
        description: "Custom changelog (leave empty to auto-extract from .homeychangelog.json)"
permissions:
  contents: write
concurrency:
  group: publish
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Athom Validate
        uses: athombv/github-action-homey-app-validate@master
        with:
          level: publish

  version-and-publish:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --prefer-offline --no-audit || npm install

      - name: Check HOMEY_PAT
        id: pat
        run: |
          if [ -n "${{ secrets.HOMEY_PAT }}" ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
            echo "::warning::HOMEY_PAT not set - add from https://tools.developer.homey.app/me"
          fi

      - name: Extract Changelog
        id: cl
        shell: bash
        run: |
          CL="${{ inputs.changelog }}"
          if [ -z "$CL" ]; then
            # Auto-extract from .homeychangelog.json for current version
            VER=$(node -p "require('./app.json').version")
            CL=$(node -e "
              const cl=require('./.homeychangelog.json');
              const v=process.argv[1];
              if(cl[v]&&cl[v].en)process.stdout.write(cl[v].en);
              else{const keys=Object.keys(cl).sort().reverse();if(keys[0]&&cl[keys[0]].en)process.stdout.write(cl[keys[0]].en);else{const d=require('fs').readdirSync('drivers').length;const f=require('child_process').execSync('grep -rohE \"_T[A-Za-z0-9_]+\" drivers/*/driver.compose.json|sort -uf|wc -l').toString().trim();process.stdout.write('v'+v+': '+d+' drivers, '+f+' fingerprints. See .homeychangelog.json');}
            " "$VER" 2>/dev/null || echo "See .homeychangelog.json for details")
          fi
          # Escape newlines for GitHub output
          CL="${CL//'%'/'%25'}"
          CL="${CL//$'\n'/'%0A'}"
          CL="${CL//$'\r'/'%0D'}"
          echo "text=$CL" >> $GITHUB_OUTPUT

      - name: Bump
        if: steps.pat.outputs.ok == 'true'
        id: bump
        uses: athombv/github-action-homey-app-version@master
        with:
          version: ${{ inputs.version || 'patch' }}
          changelog: ${{ steps.cl.outputs.text }}

      - name: Push
        if: steps.pat.outputs.ok == 'true'
        shell: bash
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          D=$(ls -d drivers/*/ 2>/dev/null | wc -l)
          F=$(grep -rohE '"_T[A-Za-z0-9_]+"' drivers/*/driver.compose.json | sort -uf | wc -l)
          git commit -m "v${{ steps.bump.outputs.version }}: ${D} drivers, ${F} fingerprints [skip ci]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish
        if: steps.pat.outputs.ok == 'true'
        id: pub
        uses: athombv/github-action-homey-app-publish@master
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}

      - name: Auto-Publish Draft to Test
        if: steps.pat.outputs.ok == 'true'
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          DRY_RUN: 'false'
        run: node .github/scripts/auto-publish-draft.js

      - name: Post to Forum
        if: steps.pat.outputs.ok == 'true'
        continue-on-error: true
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          APP_VERSION: ${{ steps.bump.outputs.version }}
          CHANGELOG: ${{ steps.cl.outputs.text }}
          PUBLISH_URL: ${{ steps.pub.outputs.url || 'https://homey.app/a/com.dlnraja.tuya.zigbee/test/' }}
        run: node .github/scripts/post-forum-update.js

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.pat.outputs.ok }}" == "true" ]; then
            echo "## Published v${{ steps.bump.outputs.version }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Changelog:** ${{ steps.cl.outputs.text }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Manage: ${{ steps.pub.outputs.url }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "[Install test version](https://homey.app/a/com.dlnraja.tuya.zigbee/test/)" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Validated only (HOMEY_PAT not set)" >> $GITHUB_STEP_SUMMARY
            echo "Add secret from https://tools.developer.homey.app/me" >> $GITHUB_STEP_SUMMARY
          fi
