# Auto Publish - Official Athom Actions (NO CLI)
# Required secret: HOMEY_PAT (from https://tools.developer.homey.app/me)
name: Auto Publish
"on":
  push:
    branches: [master, main]
    paths:
      - "app.js"
      - "app.json"
      - ".homeycompose/**"
      - "lib/**"
      - "drivers/**"
      - "assets/**"
      - "locales/**"
      - "package.json"
  workflow_dispatch:
    inputs:
      version:
        type: choice
        options: [patch, minor, major]
        default: patch
      changelog:
        type: string
        required: false
permissions:
  contents: write
concurrency:
  group: publish
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Athom Validate
        uses: athombv/github-action-homey-app-validate@master
        with:
          level: publish
  version-and-publish:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Check HOMEY_PAT
        id: pat
        run: |
          if [ -n "${{ secrets.HOMEY_PAT }}" ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
            echo "::warning::HOMEY_PAT not set — add from https://tools.developer.homey.app/me"
          fi
      - name: Changelog
        id: cl
        shell: bash
        run: |
          CL="${{ inputs.changelog }}"
          if [ -z "$CL" ]; then
            CL="Auto-publish via GitHub Actions"
          fi
          echo "text=$CL" >> $GITHUB_OUTPUT
      - name: Bump
        if: steps.pat.outputs.ok == 'true'
        id: bump
        uses: athombv/github-action-homey-app-version@master
        with:
          version: ${{ inputs.version || 'patch' }}
          changelog: ${{ steps.cl.outputs.text }}
      - name: Push
        if: steps.pat.outputs.ok == 'true'
        shell: bash
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v${{ steps.bump.outputs.version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish
        if: steps.pat.outputs.ok == 'true'
        id: pub
        uses: athombv/github-action-homey-app-publish@master
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}
      - name: Post to Forum
        if: steps.pat.outputs.ok == 'true'
        continue-on-error: true
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          DISCOURSE_USERNAME: dlnraja
          APP_VERSION: ${{ steps.bump.outputs.version }}
          CHANGELOG: ${{ steps.cl.outputs.text }}
          PUBLISH_URL: ${{ steps.pub.outputs.url || 'https://homey.app/a/com.dlnraja.tuya.zigbee/test/' }}
        run: node .github/scripts/post-forum-update.js
      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.pat.outputs.ok }}" == "true" ]; then
            echo "## Published v${{ steps.bump.outputs.version }}" >> $GITHUB_STEP_SUMMARY
            echo "Manage: ${{ steps.pub.outputs.url }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Forum Post (copy to https://community.homey.app/t/140352)" >> $GITHUB_STEP_SUMMARY
            echo "v${{ steps.bump.outputs.version }} — ${{ steps.cl.outputs.text }}" >> $GITHUB_STEP_SUMMARY
            echo "[Install test version](https://homey.app/a/com.dlnraja.tuya.zigbee/test/)" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Validated only (HOMEY_PAT not set)" >> $GITHUB_STEP_SUMMARY
            echo "Add secret from https://tools.developer.homey.app/me" >> $GITHUB_STEP_SUMMARY
          fi
