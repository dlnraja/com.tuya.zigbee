# рџ‡євЂЊрџ‡івЂЊрџ‡®вЂЊрџ‡«вЂЊрџ‡®вЂЊрџ‡ЄвЂЊрџ‡©вЂЊ вЂЊрџ‡ЁвЂЊрџ‡ґвЂЊрџ‡івЂЊрџ‡ёвЂЊрџ‡ґвЂЊрџ‡±вЂЊрџ‡®вЂЊрџ‡©вЂЊрџ‡¦вЂЊрџ‡№вЂЊрџ‡®вЂЊрџ‡ґвЂЊрџ‡івЂЊ вЂЊрџ‡»вЂЊ8вЂЊ.вЂЊ5вЂЊ.вЂЊ0вЂЊ вЂ” DISABLED (redundant)
# Re-enable by removing 'if: false' below
name: рџ›ЎпёЏ Fleet-Wide Comprehensive Validation

if: false
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fleet-validation-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  fleet-audit:
    name: рџ›ЎпёЏ Fleet Audit & Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: рџ“Ґ Checkout Code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: рџ“¦ Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: рџ“¦ Install Dependencies
        run: npm ci --prefer-offline --no-audit || npm install

      - name: рџ›ЎпёЏ STRICT_SYNTAX_GUARD Check
        run: node scripts/ci/STRICT_SYNTAX_GUARD.js

      - name: рџ§№ ESLint Quality Gate
        run: npx eslint lib/ --ext .js

      - name: рџ§Є Run Critical Unit Tests
        run: node --test test/critical/manufacturerResolver.test.js

      - name: рџ“Ѓ Hybrid Folder Regression Check
        run: |
          HYBRIDS=$(find drivers -maxdepth 1 -type d -name "*_hybrid" 2>/dev/null | wc -l)
          if [ "$HYBRIDS" -gt 0 ]; then
            echo "вќЊ REGRESSION: Found $HYBRIDS legacy hybrid driver directories!"
            find drivers -maxdepth 1 -type d -name "*_hybrid"
            exit 1
          else
            echo "вњ… No hybrid folders found."
          fi

      - name: рџ”Ќ Resolve Fingerprint Collisions Automatically
        run: node scripts/ci/resolve-collisions.js

      - name: рџ”Ќ Homey Publish-Level Validation
        run: npx homey app validate --level publish

      - name: рџЋЇ Zero-Defect Master Validation (v5.13.6)
        run: node scripts/_validate_all.js
