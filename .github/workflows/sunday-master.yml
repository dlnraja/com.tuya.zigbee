# Universal Tuya Zigbee - Sunday Master Automation
# Orchestrates all Sunday jobs: triage, fork scan, forum scan
# Runs every Sunday at 07:00 UTC, triggers child workflows

name: "Sunday Master Automation"

on:
  schedule:
    - cron: '0 7 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no comments/issues created)"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: sunday-master
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  stats:
    name: "Collect App Stats"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.s.outputs.version }}
      drivers: ${{ steps.s.outputs.drivers }}
      fps: ${{ steps.s.outputs.fps }}
    steps:
      - uses: actions/checkout@v4
      - id: s
        run: |
          V=$(node -p "require('./app.json').version")
          D=$(ls -d drivers/*/ 2>/dev/null | wc -l)
          F=$(grep -ohE '"_T[A-Za-z0-9_]+"' drivers/*/driver.compose.json | sort -uf | wc -l)
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "drivers=$D" >> $GITHUB_OUTPUT
          echo "fps=$F" >> $GITHUB_OUTPUT
          echo "## App Stats" >> $GITHUB_STEP_SUMMARY
          echo "- Version: $V" >> $GITHUB_STEP_SUMMARY
          echo "- Drivers: $D" >> $GITHUB_STEP_SUMMARY
          echo "- Fingerprints: $F" >> $GITHUB_STEP_SUMMARY

  triage-johanbendz:
    name: "Triage JohanBendz"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Run triage
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TARGET_REPO: JohanBendz/com.tuya.zigbee
          APP_VERSION: ${{ needs.stats.outputs.version }}
          DRIVER_COUNT: ${{ needs.stats.outputs.drivers }}
          FP_COUNT: ${{ needs.stats.outputs.fps }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node .github/scripts/triage-run.js

  triage-dlnraja:
    name: "Triage dlnraja"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Run triage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TARGET_REPO: dlnraja/com.tuya.zigbee
          APP_VERSION: ${{ needs.stats.outputs.version }}
          DRIVER_COUNT: ${{ needs.stats.outputs.drivers }}
          FP_COUNT: ${{ needs.stats.outputs.fps }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node .github/scripts/triage-run.js

  scan-forks:
    name: "Scan Forks"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run fork scan
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: node .github/scripts/scan-forks-recursive.js
      - if: hashFiles('/tmp/new_fork_fps.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs=require('fs');
            const raw=JSON.parse(fs.readFileSync('/tmp/new_fork_fps.json','utf8'));
            const entries=Array.isArray(raw)?raw:Object.entries(raw);
            if(!entries.length)return;
            const rows=entries.slice(0,50).map(([fp,info])=>{
              const fork=info.fork||info[1]?.fork||'?';
              const driver=info.driver||info[1]?.driver||'?';
              return `| \`${fp}\` | ${fork} | ${driver} |`;
            }).join('\n');
            await github.rest.issues.create({
              owner:context.repo.owner,repo:context.repo.repo,
              title:`[Auto] ${entries.length} new fingerprints from forks`,
              body:`## New fingerprints\n| FP | Fork | Driver |\n|---|---|---|\n${rows}`,
              labels:['enhancement','auto-scan']
            });

  cross-driver-gaps:
    name: "Cross-Driver Gap Check"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Run gap detection
        run: node .github/scripts/cross-driver-gap.js

  scan-forum:
    name: "Scan Forum"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache@v4
        with:
          path: /tmp/last_forum_post.txt
          key: forum-${{ github.run_number }}
          restore-keys: forum-
      - name: Run forum scan
        env:
          LAST_POST_FILE: /tmp/last_forum_post.txt
        run: node .github/scripts/scan-forum.js
      - if: hashFiles('/tmp/forum_issues.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs=require('fs');
            const issues=JSON.parse(fs.readFileSync('/tmp/forum_issues.json','utf8'));
            if(!issues.length)return;
            const rows=issues.map(i=>
              `| ${i.user} | ${i.date} | #${i.postNum} | \`${i.missing.join('`,`')}\` |`).join('\n');
            await github.rest.issues.create({
              owner:context.repo.owner,repo:context.repo.repo,
              title:`[Forum] ${issues.length} device request(s) from forum`,
              body:`## Forum requests\n| User | Date | Post | Missing |\n|---|---|---|---|\n${rows}`,
              labels:['enhancement','forum-request']
            });

  forum-respond:
    name: "Forum Auto-Respond"
    needs: [scan-forum]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache@v4
        with:
          path: /tmp/last_forum_respond.txt
          key: forum-respond-${{ github.run_number }}
          restore-keys: forum-respond-
      - name: Auto-respond to device requests
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LAST_RESPOND_FILE: /tmp/last_forum_respond.txt
        run: node .github/scripts/forum-respond-requests.js

  gmail-diagnostics:
    name: "Gmail Diagnostics"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run Gmail diagnostics
        continue-on-error: true
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node .github/scripts/fetch-gmail-diagnostics.js

  device-diagnostics:
    name: "Homey Device Diagnostics"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run device diagnostics
        continue-on-error: true
        env:
          HOMEY_PAT_API: ${{ secrets.HOMEY_PAT_API }}
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: node .github/scripts/homey-device-diagnostics.js

  external-sources:
    name: "Smart Device Scanner (10 sources)"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: "10-source scan (Z2M+ZHA+Blakadder+deCONZ+Hubitat+SmartThings+HA Forum+Local)"
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node .github/scripts/external-sources-scanner.js

  github-scanner:
    name: "GitHub Activity Scanner"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Scan GitHub activity
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node .github/scripts/github-scanner.js

  github-issue-manager:
    name: "GitHub Issue Manager"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Manage issues
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          STALE_DAYS: "30"
          REPOS: "dlnraja/com.tuya.zigbee,JohanBendz/com.tuya.zigbee"
        run: node .github/scripts/github-issue-manager.js

  forum-activity:
    name: "Forum Activity Scraper"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Scrape forum activity
        continue-on-error: true
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FORUM_USERNAME: dlnraja
        run: node .github/scripts/forum-activity-scraper.js

  johanbendz-full:
    name: "JohanBendz Full Scanner"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Scan JohanBendz
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node .github/scripts/scan-johan-full.js

  enrichment:
    name: "Smart Enrichment (DP-aware)"
    needs: [scan-forum, external-sources, github-scanner]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: "DP-aware enrichment with device functionality profiles"
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node .github/scripts/enrichment-scanner.js

  generate-changelog:
    name: "AI Changelog Generation"
    needs: [scan-forum, gmail-diagnostics, device-diagnostics, enrichment]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Generate AI Changelog
        continue-on-error: true
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/generate-ai-changelog.js
      - name: Commit changelog updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md README.md .homeychangelog.json
          git diff --cached --quiet || git commit -m "docs: AI changelog update [skip ci]"
          git pull --rebase origin master || true
          git push || true

  update-forum-thread:
    name: "Update Forum First Post"
    needs: [generate-changelog]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install
      - name: Update first post of forum thread
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node .github/scripts/update-forum-first-post.js
  promote-to-test:
    name: "Promote Draft to Test"
    needs: [generate-changelog, update-forum-thread]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install

      - name: "Draft to Test (Node)"
        id: promote_node
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          if [ -z "$HOMEY_PAT" ]; then
            echo "::warning::HOMEY_PAT not set — skipping promote"
            exit 0
          fi
          node .github/scripts/auto-publish-draft.js

      - name: "Draft to Test (curl fallback)"
        if: steps.promote_node.outcome != 'success'
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: |
          if [ -z "$HOMEY_PAT" ]; then exit 0; fi
          APP=com.dlnraja.tuya.zigbee
          VER=$(node -p "require('./app.json').version")
          # Get delegation token
          DELEG=$(curl -s -X POST -H "Authorization: Bearer $HOMEY_PAT" -H "Content-Type: application/json" \
            -d '{"audience":"apps"}' https://api.athom.com/delegation/token)
          TOKEN=$(echo "$DELEG" | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).token}catch{''}" 2>/dev/null || echo "")
          [ -z "$TOKEN" ] && TOKEN="$HOMEY_PAT"
          # List builds and find latest draft
          BUILDS=$(curl -s -H "Authorization: Bearer $TOKEN" "https://apps-api.athom.com/api/v1/app/$APP/build")
          BUILD_ID=$(echo "$BUILDS" | node -p "try{const b=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));const arr=Array.isArray(b)?b:b.builds||b.data||[];const drafts=arr.filter(x=>!x.channel||x.channel==='draft');const match=drafts.find(x=>x.version==='$VER')||drafts[0];match?.id||match?._id||''}catch{''}" 2>/dev/null || echo "")
          if [ -z "$BUILD_ID" ]; then
            echo "::warning::No draft build found. Manual: https://tools.developer.homey.app/apps/app/$APP/versions"
            exit 0
          fi
          echo "Found draft build: $BUILD_ID"
          # Promote to test
          CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
            -d '{"channel":"test"}' "https://apps-api.athom.com/api/v1/app/$APP/build/$BUILD_ID/channel")
          echo "Promote $BUILD_ID => HTTP $CODE: $(cat /tmp/resp.txt | head -c 200)"
          [ "$CODE" = "200" ] || [ "$CODE" = "201" ] || [ "$CODE" = "204" ] && echo "SUCCESS: promoted to test!" && exit 0
          echo "::warning::Manual promote needed: https://tools.developer.homey.app/apps/app/$APP/versions"

      - name: "Verify Test (retry after 20s)"
        if: always()
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
        run: |
          if [ -z "$HOMEY_PAT" ]; then exit 0; fi
          sleep 20
          node .github/scripts/auto-publish-draft.js

  summary:
    name: "Weekly Summary"
    needs: [triage-johanbendz, triage-dlnraja, scan-forks, cross-driver-gaps, scan-forum, forum-respond, gmail-diagnostics, device-diagnostics, external-sources, github-scanner, github-issue-manager, forum-activity, johanbendz-full, enrichment, generate-changelog, update-forum-thread, promote-to-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "## Sunday Automation Complete" >> $GITHUB_STEP_SUMMARY
          echo "- JohanBendz triage: ${{ needs.triage-johanbendz.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- dlnraja triage: ${{ needs.triage-dlnraja.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Fork scan: ${{ needs.scan-forks.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Cross-driver gaps: ${{ needs.cross-driver-gaps.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Forum scan: ${{ needs.scan-forum.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Forum respond: ${{ needs.forum-respond.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Gmail diagnostics: ${{ needs.gmail-diagnostics.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Device diagnostics: ${{ needs.device-diagnostics.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- External sources: ${{ needs.external-sources.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Enrichment: ${{ needs.enrichment.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- AI Changelog: ${{ needs.generate-changelog.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub scanner: ${{ needs.github-scanner.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub issue manager: ${{ needs.github-issue-manager.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Forum activity: ${{ needs.forum-activity.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- JohanBendz full: ${{ needs.johanbendz-full.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Forum first post: ${{ needs.update-forum-thread.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Promote to Test: ${{ needs.promote-to-test.result }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[Test](https://homey.app/a/com.dlnraja.tuya.zigbee/test/) | [Manage](https://tools.developer.homey.app/apps/app/com.dlnraja.tuya.zigbee)" >> $GITHUB_STEP_SUMMARY
