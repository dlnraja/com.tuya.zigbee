# Universal Tuya Zigbee - Sunday Master Automation
# Orchestrates all Sunday jobs: triage, fork scan, forum scan
# Runs every Sunday at 07:00 UTC, triggers child workflows

name: "Sunday Master Automation"

on:
  schedule:
    - cron: '0 7 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no comments/issues created)"
        type: boolean
        default: false

concurrency:
  group: sunday-master
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  stats:
    name: "Collect App Stats"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.s.outputs.version }}
      drivers: ${{ steps.s.outputs.drivers }}
      fps: ${{ steps.s.outputs.fps }}
    steps:
      - uses: actions/checkout@v4
      - id: s
        run: |
          V=$(node -p "require('./app.json').version")
          D=$(ls -d drivers/*/ 2>/dev/null | wc -l)
          F=$(grep -ohE '"_T[A-Za-z0-9_]+"' drivers/*/driver.compose.json | sort -uf | wc -l)
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "drivers=$D" >> $GITHUB_OUTPUT
          echo "fps=$F" >> $GITHUB_OUTPUT
          echo "## App Stats" >> $GITHUB_STEP_SUMMARY
          echo "- Version: $V" >> $GITHUB_STEP_SUMMARY
          echo "- Drivers: $D" >> $GITHUB_STEP_SUMMARY
          echo "- Fingerprints: $F" >> $GITHUB_STEP_SUMMARY

  triage-johanbendz:
    name: "Triage JohanBendz"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run triage
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TARGET_REPO: JohanBendz/com.tuya.zigbee
          APP_VERSION: ${{ needs.stats.outputs.version }}
          DRIVER_COUNT: ${{ needs.stats.outputs.drivers }}
          FP_COUNT: ${{ needs.stats.outputs.fps }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node .github/scripts/triage-run.js

  triage-dlnraja:
    name: "Triage dlnraja"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run triage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TARGET_REPO: dlnraja/com.tuya.zigbee
          APP_VERSION: ${{ needs.stats.outputs.version }}
          DRIVER_COUNT: ${{ needs.stats.outputs.drivers }}
          FP_COUNT: ${{ needs.stats.outputs.fps }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node .github/scripts/triage-run.js

  scan-forks:
    name: "Scan Forks"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run fork scan
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: node .github/scripts/scan-forks-recursive.js
      - if: hashFiles('/tmp/new_fork_fps.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs=require('fs');
            const raw=JSON.parse(fs.readFileSync('/tmp/new_fork_fps.json','utf8'));
            const entries=Array.isArray(raw)?raw:Object.entries(raw);
            if(!entries.length)return;
            const rows=entries.slice(0,50).map(([fp,info])=>{
              const fork=info.fork||info[1]?.fork||'?';
              const driver=info.driver||info[1]?.driver||'?';
              return `| \`${fp}\` | ${fork} | ${driver} |`;
            }).join('\n');
            await github.rest.issues.create({
              owner:context.repo.owner,repo:context.repo.repo,
              title:`[Auto] ${entries.length} new fingerprints from forks`,
              body:`## New fingerprints\n| FP | Fork | Driver |\n|---|---|---|\n${rows}`,
              labels:['enhancement','auto-scan']
            });

  cross-driver-gaps:
    name: "Cross-Driver Gap Check"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run gap detection
        run: node .github/scripts/cross-driver-gap.js

  scan-forum:
    name: "Scan Forum"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache@v4
        with:
          path: /tmp/last_forum_post.txt
          key: forum-${{ github.run_number }}
          restore-keys: forum-
      - name: Run forum scan
        env:
          LAST_POST_FILE: /tmp/last_forum_post.txt
        run: node .github/scripts/scan-forum.js
      - if: hashFiles('/tmp/forum_issues.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs=require('fs');
            const issues=JSON.parse(fs.readFileSync('/tmp/forum_issues.json','utf8'));
            if(!issues.length)return;
            const rows=issues.map(i=>
              `| ${i.user} | ${i.date} | #${i.postNum} | \`${i.missing.join('`,`')}\` |`).join('\n');
            await github.rest.issues.create({
              owner:context.repo.owner,repo:context.repo.repo,
              title:`[Forum] ${issues.length} device request(s) from forum`,
              body:`## Forum requests\n| User | Date | Post | Missing |\n|---|---|---|---|\n${rows}`,
              labels:['enhancement','forum-request']
            });

  forum-respond:
    name: "Forum Auto-Respond"
    needs: [scan-forum]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache@v4
        with:
          path: /tmp/last_forum_respond.txt
          key: forum-respond-${{ github.run_number }}
          restore-keys: forum-respond-
      - name: Auto-respond to device requests
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LAST_RESPOND_FILE: /tmp/last_forum_respond.txt
        run: node .github/scripts/forum-respond-requests.js

  gmail-diagnostics:
    name: "Gmail Diagnostics"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run Gmail diagnostics
        continue-on-error: true
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node .github/scripts/fetch-gmail-diagnostics.js

  device-diagnostics:
    name: "Homey Device Diagnostics"
    needs: stats
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run device diagnostics
        continue-on-error: true
        env:
          HOMEY_PAT_API: ${{ secrets.HOMEY_PAT_API }}
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: node .github/scripts/homey-device-diagnostics.js

  generate-changelog:
    name: "AI Changelog Generation"
    needs: [scan-forum, gmail-diagnostics, device-diagnostics]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Generate AI Changelog
        continue-on-error: true
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/generate-ai-changelog.js
      - name: Commit changelog updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md README.md .homeychangelog.json
          git diff --cached --quiet || git commit -m "docs: AI changelog update [skip ci]"
          git pull --rebase origin master || true
          git push || true

  summary:
    name: "Weekly Summary"
    needs: [triage-johanbendz, triage-dlnraja, scan-forks, cross-driver-gaps, scan-forum, forum-respond, gmail-diagnostics, device-diagnostics, generate-changelog]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "## Sunday Automation Complete" >> $GITHUB_STEP_SUMMARY
          echo "- JohanBendz triage: ${{ needs.triage-johanbendz.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- dlnraja triage: ${{ needs.triage-dlnraja.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Fork scan: ${{ needs.scan-forks.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Cross-driver gaps: ${{ needs.cross-driver-gaps.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Forum scan: ${{ needs.scan-forum.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Forum respond: ${{ needs.forum-respond.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Gmail diagnostics: ${{ needs.gmail-diagnostics.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Device diagnostics: ${{ needs.device-diagnostics.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- AI Changelog: ${{ needs.generate-changelog.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Auto-Publish Draft to Test
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: |
          if [ -z "$HOMEY_PAT" ]; then exit 0; fi
          node .github/scripts/auto-publish-draft.js || true
