name: Fetch Homey Diagnostics

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-diags:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install imap-simple mailparser --no-save

      - name: Fetch Diagnostics from Gmail
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node scripts/automation/fetch-gmail-diags.js

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          node .github/scripts/privacy-redactor.js .github/state/diagnostics-report.json
          git add .github/state/diagnostics-report.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update diagnostics report from Gmail [skip ci]" && git push)
