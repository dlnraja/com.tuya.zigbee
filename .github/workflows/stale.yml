name: 'Stale (DISABLED - Shadow Mode)'
on:
  # Schedule disabled for Shadow Mode - manual execution only
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: -1 # Disabled
          days-before-close: -1 # Disabled
          exempt-issues-labels: '*' # Exempt ALL tickets
          exempt-pr-labels: '*'
          stale-issue-message: 'This issue has been marked as stale (Shadow Mode - No automatic actions)'
          stale-pr-message: 'This PR has been marked as stale (Shadow Mode - No automatic actions)'
