name: 🌍 Unified Community Orchestrator

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly Sunday AM
  workflow_dispatch:

jobs:
  translate:
    name: 🌐 Translation Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: 🔄 Sync Localization
        run: node scripts/maintenance/community-translation-sync.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  interact:
    name: 📊 Forum Interaction
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: 📢 Update Device List
        run: node scripts/maintenance/update-forum-post-1.yml
        env:
          FORUM_TOKEN: ${{ secrets.FORUM_TOKEN }}
  
  pulse:
    name: 💓 Community Pulse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: 📈 Analysis
        run: node scripts/maintenance/community-satisfaction-pulse.js
