name: Forum Auto-Responder

on:
  schedule:
    - cron: '0 5,11,17,23 * * *'  # Offset from daily-everything (02,08,14,20)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (no forum posts)'
        type: boolean
        default: true
      topics:
        description: 'Forum topic IDs (comma-separated)'
        type: string
        default: '140352,26439,146735,89271,54018'

permissions:
  contents: write

concurrency:
  group: forum-responder
  cancel-in-progress: true

jobs:
  respond:
    name: Scan & Respond
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Forum Responder
        id: responder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run && 'true' || 'false' }}
          FORUM_TOPICS: ${{ inputs.topics || '140352,26439,146735,89271,54018' }}
          REPLY_TOPICS: '140352'
        run: node .github/scripts/forum-responder.js

      - name: Commit updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/forum-state.json
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          TOPICS=$(node -p "try{Object.keys(JSON.parse(require('fs').readFileSync('.github/state/forum-state.json')).topics).length}catch(e){0}")
          git diff --cached --quiet || git commit -m "Forum responder v${VER}: scanned ${TOPICS} topics, state updated [skip ci]"
          git push || echo "Nothing to push"
