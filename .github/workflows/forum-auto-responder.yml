name: Forum Auto-Responder

on:
  # schedule: disabled to avoid annoying users
  # - cron: '0 9,21 * * *'  # 2x/day only — reduced from 4x to avoid spam
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (no forum posts)'
        type: boolean
        default: false
      topics:
        description: 'Forum topic IDs (comma-separated)'
        type: string
        default: '140352'

permissions:
  contents: write

concurrency:
  group: forum-responder
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  SHADOW_MODE: "true"

defaults:
  run:
    shell: bash

jobs:
  respond:
    name: Scan & Respond
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # === AI providers — circular chain (ai-helper.js) ===
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || '' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY || '' }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY || '' }}

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install

      - name: Run Forum Responder
        id: responder
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Optional AI fallbacks (GROQ, HF, MISTRAL, CEREBRAS, TOGETHER, OPENROUTER, DEEPSEEK, KIMI)
          # Not yet configured — see .github/SECRETS.md to enable
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run && 'true' || 'false' }}
          FORUM_TOPICS: ${{ inputs.topics || '140352' }}
          REPLY_TOPICS: '140352'
          THREAD_CONTEXT_DEPTH: '30'
        run: node .github/scripts/forum-responder.js

      - name: Commit updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/forum-state.json
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          TOPICS=$(node -p "try{Object.keys(JSON.parse(require('fs').readFileSync('.github/state/forum-state.json')).topics).length}catch(e){0}")
          git diff --cached --quiet || git commit -m "v${VER}: forum state updated [skip ci]"
          git pull --rebase origin master || true
          git push || echo "Nothing to push"

