name: Autonomous Community Resolver

on:
  schedule:
    - cron: '0 0 */2 * *' # Run once every 2 days
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: autonomous-resolver
  cancel-in-progress: false

jobs:
  resolve-issues:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Fetch GitHub Intelligence
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching mentions and issue updates..."
          node .github/scripts/fetch-community-intel.js || true

      - name: Fetch Forum Intelligence (Read-Only)
        env:
          FORUM_USERNAME: ${{ secrets.FORUM_USERNAME }}
          FORUM_PASSWORD: ${{ secrets.FORUM_PASSWORD }}
        run: |
          echo "Fetching forum activity without replying..."
          node .github/scripts/forum-activity-scraper.js || true

      - name: Autonomous AI Resolution
        env:
          # Use Google by default (fallback to others via ai-helper.js logic)
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "Processing intelligence and modifying drivers..."
          node .github/scripts/autonomous-community-resolver.js

      - name: Rebuild Application
        run: |
          echo "Running master:fix to re-compile app.json and validate..."
          npm run master:fix

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "robot: auto-resolved community issues & forum requests [skip ci]"
          branch: master
          file_pattern: 'drivers/*/driver.compose.json app.json'
