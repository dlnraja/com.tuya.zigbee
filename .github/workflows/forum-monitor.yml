name: Forum Monitor (Enhanced)

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor-homey-forum:
    runs-on: ubuntu-latest
    env:
      # === AI providers — circular chain (ai-helper.js) ===
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || '' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY || '' }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY || '' }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Parse Johan's & dlnraja's Homey Forum Threads
        id: parse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          # 140352 = dlnraja post, 26439 = Johan Benz post
          FORUM_TOPICS: '140352,26439'
          REPLY_TOPICS: '140352,26439'
        run: |
          npm ci || npm install
          echo "Scraping community.homey.app threads..."
          node .github/scripts/forum-activity-scraper.js || true
          node .github/scripts/forum-responder.js || true

      - name: Extract Device IDs and Cross-reference Implementations
        run: |
          echo "Extracting context (user, issue, images, tx/rx fallbacks)..."
          # Detect manufacturerName variants efficiently
          node .github/scripts/variant-scanner.js || true
