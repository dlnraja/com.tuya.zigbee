name: Syntax Validation Gate

on:
  push:
    branches: [master, stable-v5]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: 🛡️ Strict Pre-Commit Integrity & Gateway Scan
        run: node scripts/PRE_COMMIT_CHECKS.js
      - name: Check for forbidden patterns
        run: |
          # Forbid actual CALLS to getDeviceConditionCard (not comments / typeof guards).
          # Comments and feature-detection guards (typeof … === 'function') are allowed.
          if grep -rnE "this\.homey\.flow\.getDeviceConditionCard\(" drivers/ lib/ --include="*.js" \
             | grep -vE "^\s*//|^\s*\*|typeof\s+\S+\s*==="; then
            echo "❌ Found forbidden getDeviceConditionCard CALL (use getConditionCard with explicit id instead)"
            exit 1
          fi
          echo "✅ No forbidden patterns found"
      - name: Validate Homey app
        run: npx homey app validate --level=publish
      - name: Check app.json size
        run: |
          SIZE=$(stat -c%s app.json 2>/dev/null || wc -c < app.json)
          echo "app.json size: $SIZE bytes"
          if [ $SIZE -gt 10485760 ]; then
            echo "⚠️ app.json exceeds 10MB"
          fi