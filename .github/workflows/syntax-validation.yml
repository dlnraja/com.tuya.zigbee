name: Syntax Validation Gate

on:
  push:
    branches: [master, stable-v5]
  pull_request:
    branches: [master]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Check JS syntax (lib/)
        run: |
          find lib -name '*.js' -exec node -c {} \;
          echo "✅ All lib/ files pass syntax check"
      - name: Check JS syntax (drivers/)
        run: |
          FAIL=0
          for f in drivers/*/driver.js; do
            if ! node -c "$f" 2>/dev/null; then
              echo "❌ SYNTAX ERROR: $f"
              FAIL=$((FAIL+1))
            fi
          done
          if [ $FAIL -gt 0 ]; then
            echo "❌ $FAIL driver files have syntax errors"
            exit 1
          fi
          echo "✅ All driver files pass syntax check"
      - name: Check for forbidden patterns
        run: |
          if grep -r "getDeviceConditionCard" drivers/ lib/ --include="*.js" -l; then
            echo "❌ Found forbidden getDeviceConditionCard usage"
            exit 1
          fi
          echo "✅ No forbidden patterns found"
      - name: Validate Homey app
        run: npx homey app validate --level=publish
      - name: Check app.json size
        run: |
          SIZE=$(stat -c%s app.json 2>/dev/null || wc -c < app.json)
          echo "app.json size: $SIZE bytes"
          if [ $SIZE -gt 10485760 ]; then
            echo "⚠️ app.json exceeds 10MB"
          fi