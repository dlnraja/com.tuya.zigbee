name: Weekly Self-Healing Maintenance

on:
  schedule:
    - cron: '0 3 * * 1'  # 3:00 AM UTC every Monday
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-maintenance
  cancel-in-progress: true

jobs:
  heal:
    name: Self-Heal & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      SHADOW_MODE: "true"
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit || npm install

      - name: 🧠 Run Autonomous Maintenance Orchestrator
        run: node scripts/maintenance/autonomous-maintenance-orchestrator.js

      # Z2M/ZHA case variant compatibility
      - name: 🔄 Case Variant Sync
        run: |
          echo "Syncing case variants for Z2M/ZHA compatibility..."
          node scripts/automation/detect-missing-variants.js
          MISSING=$(node -e "const d=JSON.parse(require('fs').readFileSync('data/community-sync/missing-variants-detected.json','utf8'));console.log(d.total||0)")
          if [ "$MISSING" -gt 0 ]; then
            echo "Auto-fixing $MISSING missing variants..."
            node scripts/automation/fix-detected-variants.js
          else
            echo "✓ All variants synced"
          fi

      - name: 🕵️ ZERO DEFECT AUDIT & HARDENING
        run: |
          node scripts/automation/fix-fingerprint-conflicts.js
          node scripts/remediation/emergency-repair-hardener-corruption.js
          node scripts/maintenance/STRIP_XLARGE_IMAGES.js
          node scripts/shadow_sanitizer.js
          node scripts/maintenance/zero-defect-architect-audit.js


      - name: Commit & Push Changes (Robust)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "v${VER}: daily self-healing (collisions + hygiene + flows + linter) [skip ci]"
            
            # Intelligent Push with Retry/Rebase
            MAX_RETRIES=5
            RETRY_COUNT=0
            until [ $RETRY_COUNT -ge $MAX_RETRIES ]
            do
              git pull --rebase origin master && git push origin master && break
              RETRY_COUNT=$((RETRY_COUNT+1))
              echo "::warning::Push failed, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
              sleep $((RANDOM % 10 + 5))
            done
          fi
      
      # NEW: Check for invalid paths (spaces in require/import)
      - name: 🔍 Check Invalid Paths
        id: check-paths
        run: |
          echo "🔍 Checking for invalid paths (spaces in require/import)..."
          echo ""
          
          # Quick grep check for the specific pattern
          INVALID_COUNT=$(grep -rn "'.* / " --include="*.js" --include="*.json" . 2>/dev/null | \
            grep -v "node_modules" | \
            grep -v ".git" | \
            grep -v "// " | \
            grep -v "\"/" | \
            wc -l)
          
          if [ "$INVALID_COUNT" -gt 0 ]; then
            echo "::error::Found $INVALID_COUNT potential invalid path(s) with spaces"
            grep -rn "'.* / " --include="*.js" --include="*.json" . 2>/dev/null | \
              grep -v "node_modules" | \
              grep -v ".git" | \
              head -20
            exit 1
          else
            echo "✅ No invalid paths found"
          fi
