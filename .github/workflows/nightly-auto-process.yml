name: Nightly Auto-Process

on:
  schedule:
    - cron: '30 3 * * *'  # 3:30 UTC — after daily-everything 02:00 run
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no posts/comments)'
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: nightly-process
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  nightly:
    name: Process New Messages
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --prefer-offline --no-audit || npm install

      - name: Run Nightly Processor
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          GEMINI_MAX_TIER: "2"
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run && 'true' || 'false' }}
        run: node .github/scripts/nightly-processor.js

      - name: Homey Device Diagnostics
        if: always()
        continue-on-error: true
        env:
          HOMEY_PAT_API: ${{ secrets.HOMEY_PAT_API }}
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: node .github/scripts/homey-device-diagnostics.js

      - name: Gmail Diagnostics
        if: always()
        continue-on-error: true
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node .github/scripts/fetch-gmail-diagnostics.js

      - name: "Smart Device Scanner (10 sources, fp|pid composite key)"
        if: always()
        continue-on-error: true
        timeout-minutes: 15
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MAX_TIER: "1"
        run: node .github/scripts/external-sources-scanner.js

      - name: Forum Activity Scraper
        if: always()
        continue-on-error: true
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FORUM_USERNAME: dlnraja
        run: node .github/scripts/forum-activity-scraper.js

      - name: "Smart Enrichment (DP-aware, fp|pid profiles)"
        if: always()
        continue-on-error: true
        timeout-minutes: 10
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MAX_TIER: "1"
        run: node .github/scripts/enrichment-scanner.js

      - name: Image Pipeline Audit
        if: always()
        continue-on-error: true
        timeout-minutes: 5
        run: node .github/scripts/image-pipeline.js --report

      - name: Forum Intel Processor (scan-only, no reply)
        if: always()
        continue-on-error: true
        timeout-minutes: 5
        run: node .github/scripts/forum-intel-processor.js || true

      - name: Forum Responder (T140352 only, anti-spam)
        if: always()
        continue-on-error: true
        timeout-minutes: 10
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run && 'true' || 'false' }}
          REPLY_TOPICS: "140352"
        run: node .github/scripts/forum-responder.js

      - name: Forum Spam Scan
        if: always()
        continue-on-error: true
        timeout-minutes: 5
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
        run: node .github/scripts/forum-scan-spam.js

      - name: Comprehensive GitHub Scan
        if: always()
        continue-on-error: true
        timeout-minutes: 15
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node .github/scripts/comprehensive-github-scan.js

      - name: PR/Issue Fingerprint Scan
        if: always()
        continue-on-error: true
        timeout-minutes: 10
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node .github/scripts/scan-prs-issues.js

      - name: Sleep 30s before Issue Manager
        if: always()
        run: sleep 30

      - name: GitHub Issue Manager
        if: always()
        continue-on-error: true
        timeout-minutes: 30
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run && 'true' || 'false' }}
          STALE_DAYS: "30"
          MAX_ITEMS: "50"
          REPOS: "dlnraja/com.tuya.zigbee,JohanBendz/com.tuya.zigbee"
          GEMINI_MAX_TIER: "1"
          RATE_LIMIT_SLEEP: "5000"
        run: node .github/scripts/github-issue-manager.js

      - name: Auto-Learn Fingerprints
        if: always()
        continue-on-error: true
        timeout-minutes: 3
        run: node .github/scripts/auto-learn-fingerprints.js

      - name: Pattern Detector
        if: always()
        continue-on-error: true
        timeout-minutes: 5
        run: node .github/scripts/pattern-detector.js

      - name: Reply Self-Audit
        if: always()
        continue-on-error: true
        timeout-minutes: 10
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
        run: node .github/scripts/bot-self-audit.js

      - name: Generate AI Changelog
        if: always()
        continue-on-error: true
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_MAX_TIER: "1"
        run: node .github/scripts/generate-ai-changelog.js

      # ===== DRAFT → TEST (Puppeteer + API fallback) =====
      - name: Install Puppeteer
        if: always()
        continue-on-error: true
        run: npm install puppeteer --no-save

      - name: "Tier 1: Promote via Browser (Puppeteer)"
        id: puppeteer
        if: always()
        continue-on-error: true
        timeout-minutes: 5
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run && 'true' || 'false' }}
        run: node .github/scripts/auto-promote-puppeteer.js

      - name: "Tier 2: Promote via API (fallback)"
        id: api
        if: always() && steps.puppeteer.outcome != 'success'
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: node .github/scripts/auto-publish-draft.js

      - name: "Tier 3: Verify retry (Puppeteer)"
        if: always() && steps.puppeteer.outcome != 'success' && steps.api.outcome != 'success'
        continue-on-error: true
        timeout-minutes: 5
        env:
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
        run: |
          sleep 30
          node .github/scripts/auto-promote-puppeteer.js

      - name: Upload promote screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-promote-screenshots
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Update Architecture Reference
        if: always()
        continue-on-error: true
        run: node .github/scripts/update-architecture.js

      - name: Commit state and docs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/ docs/ CHANGELOG.md README.md .homeychangelog.json
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          FILES=$(git diff --cached --name-only | wc -l)
          D=$(ls -d drivers/*/ 2>/dev/null | wc -l)
          F=$(grep -rohE '"_T[A-Za-z0-9_]+"' drivers/*/driver.compose.json 2>/dev/null | sort -uf | wc -l || true)
          git diff --cached --quiet || git commit -m "Nightly v${VER}: ${D} drivers, ${F} FPs — processed forum+GitHub, ${FILES} file(s) [skip ci]"
          git pull --rebase origin master || true
          git push || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-report
          path: .github/state/nightly-report.json
          retention-days: 30

      - name: Upload device report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: homey-device-report
          path: .github/state/homey-device-report.json
          retention-days: 30
