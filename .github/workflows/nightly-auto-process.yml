# Weekly Auto Process — v8.0.0 ULTIMATE
# Automated maintenance, architectural enforcement, and bug hunting.
# Runs weekly (Sunday 02:30 UTC) to avoid GitHub Actions minute saturation.
# Investigation methodology: docs/GLOBAL_INVESTIGATION_PLAN.md (22 sections)

name: "🌙 Weekly Auto Process"

on:
  schedule:
    - cron: '30 2 * * 0'  # Sunday 02:30 UTC — weekly to save Actions minutes
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  maintenance:
    name: "Architectural Hardening"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: 'npm'

      - run: npm ci || npm install

      - name: 📖 Load Investigation Framework (GLOBAL_INVESTIGATION_PLAN.md)
        run: |
          echo "## Investigation Framework Active" >> $GITHUB_STEP_SUMMARY
          echo "Using [GLOBAL_INVESTIGATION_PLAN.md](../../docs/GLOBAL_INVESTIGATION_PLAN.md)" >> $GITHUB_STEP_SUMMARY
          echo "22-section methodology applied to nightly auto-process:" >> $GITHUB_STEP_SUMMARY
          echo "- Section 1: Investigation Philosophy & Deep Diagnostic Mandate" >> $GITHUB_STEP_SUMMARY
          echo "- Section 7: Investigation Flows per Bug Type (6 types)" >> $GITHUB_STEP_SUMMARY
          echo "- Section 8: Forum & GitHub Investigation Protocol" >> $GITHUB_STEP_SUMMARY
          echo "- Section 9: Diagnostics & Email Investigation Protocol" >> $GITHUB_STEP_SUMMARY
          echo "- Section 17: Prevention Scripts Creation Methodology" >> $GITHUB_STEP_SUMMARY
          echo "Plan injected into all AI engine calls via project-rules.js" >> $GITHUB_STEP_SUMMARY

      # ═══════════════════════════════════════════════════════════════
      # PHASE 1: COLLECT — Gather all data sources
      # Per GLOBAL_INVESTIGATION_PLAN.md §8 (Forum & GitHub) + §9 (Emails)
      # ═══════════════════════════════════════════════════════════════

      - name: "📡 [1/7] Scan GitHub Issues & PRs (both repos)"
        run: |
          node .github/scripts/scan-prs-issues.js || true
          node scripts/automation/issue-content-analyzer.js || true
        continue-on-error: true

      - name: "✉️ [2/7] Fetch Diagnostic Emails & Crash Logs"
        run: node .github/scripts/gmail-imap-reader.js || true
        continue-on-error: true

      - name: "🔏 [2.5/7] Anonymize PII in Diagnostic Data"
        run: |
          for f in .github/state/diagnostics-report.json .github/state/resolver-report.json; do
            [ -f "$f" ] && node scripts/security/pii-anonymizer.js "$f" --output "$f" 2>/dev/null && echo "Anonymized: $f"
          done
          find diagnostics/ -name "*.json" 2>/dev/null | while read f; do
            node scripts/security/pii-anonymizer.js "$f" --output "$f" 2>/dev/null
          done
        continue-on-error: true

      - name: "💬 [3/7] Scan Forum Messages (T140352 + upstream)"
        run: |
          node .github/scripts/forum-activity-scraper.js || true
          node .github/scripts/scan-forum.js || true
        continue-on-error: true

      - name: "🔍 [4/7] Deep Issue & Variant Researcher"
        run: node .github/scripts/issue-deep-researcher.js || true
        continue-on-error: true

      # ═══════════════════════════════════════════════════════════════
      # PHASE 2: ENRICH — Cross-reference & sync external sources
      # Per GLOBAL_INVESTIGATION_PLAN.md §4 (Source Matrix) + §10 (Z2M/ZHA)
      # ═══════════════════════════════════════════════════════════════

      - name: "🌐 [5/7] Cross-Reference Intelligence (Z2M, ZHA, Domoticz)"
        run: |
          node .github/scripts/cross-ref-intelligence.js || true
          node .github/scripts/sync-external-sources.js || true
          node .github/scripts/scan-tuya-ecosystem.js || true
          node scripts/automation/deep-crossref-scraper.js || true
        continue-on-error: true

      - name: "🧬 [6/7] Enrich Fingerprints & DP Mappings"
        run: |
          node scripts/community-sync/sync-all.js || true
          node scripts/apply_enriched_fps_v3.js || true
          node scripts/fix_titleformatted_v3.js || true
        continue-on-error: true

      - name: "🤖 [7/7] Auto-Resolve Diagnostics & Auto-Heal (skip already-processed)"
        run: |
          # ═══════════════════════════════════════════════════════════════
          # SAFETY GATE: Don't re-process crash/diag logs already handled
          # UNLESS referenced in: GitHub issues/PRs OR Homey Community Forum
          # ═══════════════════════════════════════════════════════════════

          # Step 1: Scan GitHub issues + PRs for diagnostic IDs
          GH_REFS=$(gh issue list --state open --json body -q '.[].body' 2>/dev/null | grep -oE '[a-f0-9]{8,}' | sort -u || true)
          GH_PR_REFS=$(gh pr list --state open --json body -q '.[].body' 2>/dev/null | grep -oE '[a-f0-9]{8,}' | sort -u || true)

          # Step 2: Scan Homey Community Forum (T140352) for diagnostic IDs
          FORUM_REFS=""
          if [ -f ".github/state/forum-activity-report.json" ]; then
            FORUM_REFS=$(node -e "
              try {
                const r=JSON.parse(require('fs').readFileSync('.github/state/forum-activity-report.json','utf8'));
                const posts=r.posts||r.recentPosts||[];
                const ids=new Set();
                posts.forEach(p=>{
                  const body=p.raw||p.body||p.cleaned||'';
                  const matches=body.match(/[a-f0-9]{8,}/g)||[];
                  matches.forEach(m=>ids.add(m));
                  if(/crash|diag|error|stack|trace|fatal/i.test(body)){
                    (body.match(/\\b[a-f0-9]{16,}\\b/g)||[]).forEach(d=>ids.add(d));
                  }
                });
                console.log([...ids].join(' '));
              } catch(e) { console.log(''); }
            " 2>/dev/null || true)
          fi

          # Step 3: Merge all referenced IDs
          ALL_REFS=$(echo "$GH_REFS $GH_PR_REFS $FORUM_REFS" | tr ' ' '\n' | sort -u | tr '\n' ' ')
          export REFERENCED_IDS="$ALL_REFS"
          echo "Referenced IDs (GitHub + Forum): ${ALL_REFS:-none}"

          # Step 4: Run safety gate (determines what to skip vs re-process)
          node scripts/validation/diag-safety-gate.js || true

          # Step 5: Run resolver + auto-healers
          node .github/scripts/diagnostic-auto-resolver.js || true
          node .github/scripts/diagnostic-auto-heal-radar.js || true
          node scripts/automation/fix-crashers.js || true
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛡️ Run Skill Check
        run: node scripts/ci/skill-check.js

      - name: ⚖️ Run Zero-Defect Control
        run: node scripts/ci/zero-defect-control.js

      - name: 🛰️ Run Antigravity Deep Audit
        run: node scripts/ci/antigravity-controls.js

      - name: 🌌 Execute Antigravity Mega-Audit
        run: node scripts/automation/mega-audit.js
        continue-on-error: false

      - name: 🔀 Cross-Category Collision Audit + Auto-Fix
        run: |
          echo "Detecting and auto-fixing FPs in wrong driver category..."
          node scripts/validation/cross-category-collision-gate.js --fix || true

      - name: 📐 DP Mapping Validation (Z2M Cross-Reference)
        continue-on-error: true
        run: |
          echo "Validating DP divisors against Z2M reference data..."
          node scripts/validation/dp-mapping-validator.js || true

      - name: "🏥 Fingerprint Health Check (no empty MFs, no wildcards)"
        run: node scripts/validation/check-fingerprint-health.js

      - name: "🛡️ Dual-Layer Integrity (no AggregateError)"
        run: |
          node - << 'GATE'
          const fs = require('fs');
          const app = JSON.parse(fs.readFileSync('app.json'));
          const errs = [];
          (app.drivers||[]).forEach(d => {
            if (d.zigbee && d.zigbee.fingerprints?.length > 0 && (!d.zigbee.manufacturerName || d.zigbee.manufacturerName.length === 0)) {
              errs.push(d.id);
            }
          });
          if (errs.length) { console.error('AggregateError risk:', errs.length, 'drivers'); process.exit(1); }
          console.log('Dual-Layer: PASS');
          GATE

      # ─── Pipeline Step 6c Safety Gate (WORKFLOW_GUIDELINES.md) ───
      # Order: fix-flow-cards → revert-battery-conflicts → fix-empty-caps → validate
      - name: "🔧 Pipeline 6c: Fix Flow Cards"
        run: |
          node scripts/automation/cleanup-flow-cards.js || true
          node scripts/maintenance/fix-unsafe-flow-cards.js || true

      - name: "🔋 Pipeline 6c: Revert Battery Conflicts"
        run: node scripts/maintenance/revert-alarm-battery-conflict.js || true

      - name: "📋 Pipeline 6c: Fix Empty Capabilities"
        run: node scripts/automation/audit-capabilities.js || true

      - name: "🧹 Pipeline 6c: Casing Normalization (master-self-heal)"
        run: node scripts/maintenance/master-self-heal.js || true

      - name: 🛠️ Execute Antigravity Mega-Fixer (Self-Healing)
        if: failure()
        run: |
          node scripts/automation/mega-fixer.js
          node scripts/automation/mega-audit.js

      - name: 🔍 Run Bug Hunter
        run: node scripts/ci/bug-hunter.js

      - name: 🔧 Apply Antigravity Patterns
        run: node scripts/automation/apply-antigravity.js

      - name: 🗜️ Compact app.json (anti-Athom-5MB-limit)
        uses: ./.github/actions/compact-app-json

      - name: 📦 Validate Homey App
        run: npx homey app validate --level publish

      - name: "📏 Archive Size Gate (< 20MB)"
        run: node .github/scripts/check-archive-size.js

      - name: 🎯 Zero-Defect Ultimate Validation (v8.0.0)
        run: node scripts/_validate_all.js

      - name: "🛡️ Pre-Commit Integrity Gate (Verification Loop per security.md)"
        run: node scripts/PRE_COMMIT_CHECKS.js

      - name: 🚀 Publish to Homey Store (Optional)
        if: env.HOMEY_PAT != ''
        uses: athombv/github-action-homey-app-publish@v1
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}

      - name: 🔄 Commit Changes
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore(auto): nightly self-healing + enrichment + diagnostic intake [skip ci]"
          branch: master
          file_pattern: 'drivers/**/*.js drivers/**/*.json lib/**/*.js app.json .github/state/*.json diagnostics/*.json data/community-sync/*.json .ai/rules/.cursorrules docs/**/*.md'
