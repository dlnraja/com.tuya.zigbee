name: Nightly Auto-Process

on:
  schedule:
    - cron: '30 3 * * *'  # 3:30 UTC — after daily-everything 02:00 run
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no posts/comments)'
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: nightly-process
  cancel-in-progress: false

jobs:
  nightly:
    name: Process New Messages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci --prefer-offline --no-audit || npm install

      - name: Run Nightly Processor
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run && 'true' || 'false' }}
        run: node .github/scripts/nightly-processor.js

      - name: Homey Device Diagnostics
        if: always()
        continue-on-error: true
        env:
          HOMEY_PAT_API: ${{ secrets.HOMEY_PAT_API }}
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: node .github/scripts/homey-device-diagnostics.js

      - name: Gmail Diagnostics
        if: always()
        continue-on-error: true
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node .github/scripts/fetch-gmail-diagnostics.js

      - name: "Smart Device Scanner (10 sources, fp|pid composite key)"
        if: always()
        continue-on-error: true
        timeout-minutes: 15
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node .github/scripts/external-sources-scanner.js

      - name: Forum Activity Scraper
        if: always()
        continue-on-error: true
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FORUM_USERNAME: dlnraja
        run: node .github/scripts/forum-activity-scraper.js

      - name: "Smart Enrichment (DP-aware, fp|pid profiles)"
        if: always()
        continue-on-error: true
        timeout-minutes: 10
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node .github/scripts/enrichment-scanner.js

      - name: Generate AI Changelog
        if: always()
        continue-on-error: true
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/generate-ai-changelog.js

      - name: Auto-Publish Draft to Test (Node)
        if: always()
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
          HOMEY_EMAIL: ${{ secrets.HOMEY_EMAIL }}
          HOMEY_PASSWORD: ${{ secrets.HOMEY_PASSWORD }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run && 'true' || 'false' }}
        run: node .github/scripts/auto-publish-draft.js

      - name: Draft to Test (curl fallback)
        if: always()
        continue-on-error: true
        env:
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: |
          APP=com.dlnraja.tuya.zigbee
          VER=$(node -p "require('./app.json').version")
          # Get delegation token
          DELEG=$(curl -s -X POST -H "Authorization: Bearer $HOMEY_PAT" -H "Content-Type: application/json" \
            -d '{"audience":"apps"}' https://api.athom.com/delegation/token)
          TOKEN=$(echo "$DELEG" | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).token}catch{''}" 2>/dev/null || echo "")
          [ -z "$TOKEN" ] && TOKEN="$HOMEY_PAT"
          # List builds and find draft
          BUILDS=$(curl -s -H "Authorization: Bearer $TOKEN" "https://apps-api.athom.com/api/v1/app/$APP/build")
          BUILD_ID=$(echo "$BUILDS" | node -p "try{const b=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));const d=(Array.isArray(b)?b:b.builds||b.data||[]).filter(x=>!x.channel||x.channel==='draft').find(x=>x.version==='$VER'||true);d?.id||d?._id||''}catch{''}" 2>/dev/null || echo "")
          if [ -z "$BUILD_ID" ]; then
            echo "::warning::No draft build found. Manual: https://tools.developer.homey.app/apps/app/$APP/versions"
            exit 0
          fi
          # Promote
          CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
            -d '{"channel":"test"}' "https://apps-api.athom.com/api/v1/app/$APP/build/$BUILD_ID/channel")
          echo "Promote $BUILD_ID => HTTP $CODE"
          [ "$CODE" = "200" ] || [ "$CODE" = "201" ] || [ "$CODE" = "204" ] && echo "SUCCESS" && exit 0
          echo "::warning::Manual promote needed: https://tools.developer.homey.app/apps/app/$APP/versions"

      - name: Commit state and docs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/ docs/ CHANGELOG.md README.md .homeychangelog.json
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          FILES=$(git diff --cached --name-only | wc -l)
          D=$(ls -d drivers/*/ 2>/dev/null | wc -l)
          F=$(grep -rohE '"_T[A-Za-z0-9_]+"' drivers/*/driver.compose.json 2>/dev/null | sort -uf | wc -l)
          git diff --cached --quiet || git commit -m "Nightly v${VER}: ${D} drivers, ${F} FPs — processed forum+GitHub, ${FILES} file(s) [skip ci]"
          git pull --rebase origin master || true
          git push || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-report
          path: .github/state/nightly-report.json
          retention-days: 30

      - name: Upload device report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: homey-device-report
          path: .github/state/homey-device-report.json
          retention-days: 30
