name: "Nightly Auto-Process (Weekly)"

on:
  schedule:
    - cron: '0 2 * * 0' # Sunday at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  maintenance:
    name: "Autonomous Maintenance"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run Nightly Auto-Process
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/maintenance/nightly-auto-process.js
        
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff-index --quiet HEAD || git commit -m "auto: weekly maintenance stabilization [skip ci]"
          git push origin HEAD:master
