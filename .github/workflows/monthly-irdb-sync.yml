name: "Monthly IR Database Sync"

on:
  schedule:
    - cron: '0 6 15 * *'  # 15th of month at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: irdb-sync
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  sync-irdb:
    name: "Fetch IR Codes"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # AI providers — circular chain (ai-helper.js handles rate limiting)
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || '' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY || '' }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY || '' }}
      GH_PAT: ${{ secrets.GH_PAT }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5 # v5
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v5 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install

      - name: Fetch IRDB codes
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node .github/scripts/fetch-irdb-codes.js

      - name: Commit updates
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/irdb-*.json data/irdb/ || true
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          git diff --staged --quiet || git commit -m "IR database sync v${VER} $(date +%Y-%m) [skip ci]"
          git pull --rebase origin master || true
          git push || true
