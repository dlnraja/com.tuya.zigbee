name: "Monthly IR Database Sync"

on:
  schedule:
    - cron: '0 6 15 * *'  # 15th of month at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: irdb-sync
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  sync-irdb:
    name: "Fetch IR Codes"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --prefer-offline --no-audit || npm install

      - name: Fetch IRDB codes
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node .github/scripts/fetch-irdb-codes.js

      - name: Commit updates
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/irdb-*.json data/irdb/ || true
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          git diff --staged --quiet || git commit -m "IR database sync v${VER} $(date +%Y-%m) [skip ci]"
          git pull --rebase origin master || true
          git push || true
