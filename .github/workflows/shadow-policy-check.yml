defaults:
  run:
    shell: bash

name: "GitHub Shadow Policy"

on:
  push:
    paths:
      - ".github/scripts/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - ".github/scripts/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
      - name: Enforce read-only upstream policy
        run: |
          node --check .github/scripts/github-shadow-policy.js
          node --check .github/scripts/check-github-shadow-policy.js
          node .github/scripts/check-github-shadow-policy.js\n