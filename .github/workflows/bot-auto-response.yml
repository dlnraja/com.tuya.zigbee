name: "Bot Auto-Response & PR Merger"

on:
  schedule:
    - cron: '*/30 * * * *'    # Every 30 minutes
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: bot-auto-response
  cancel-in-progress: false

jobs:
  auto-manage:
    name: "Auto-manage Owner & Bot Issues/PRs"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
      GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      GH_PAT: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: "Install dependencies"
        run: npm ci --prefer-offline --no-audit || npm install
        
      - name: "Smart PR Auto-Merge"
        run: node .github/scripts/smart-pr-merge.js all
        
      - name: "GitHub Issue Manager (Comments, Labeling, Auto-Close)"
        run: node .github/scripts/github-issue-manager.js
        
      - name: "Commit any automatic adjustments"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "chore: auto-resolve bot and owner adjustments"
            git push
          fi
