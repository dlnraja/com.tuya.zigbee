name: Monthly API Discovery
on:
  schedule:
    - cron: '0 4 15 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monthly-api-discovery
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: '22'

jobs:
  scan-apis:
    name: Scan Public APIs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # AI providers — circular chain (ai-helper.js handles rate limiting)
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
      HF_TOKEN: ${{ secrets.HF_TOKEN || '' }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || '' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || '' }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || '' }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY || '' }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY || '' }}
      GH_PAT: ${{ secrets.GH_PAT }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5 # v5

      - name: Setup Node.js
        uses: actions/setup-node@v5 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm ci --prefer-offline --no-audit || npm install

      - name: Scan public-apis
        run: node .github/scripts/scan-public-apis.js

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/public-apis-report.json || true
          VER=$(node -p "require('./app.json').version" 2>/dev/null || echo "?")
          APIS=$(node -p "try{JSON.parse(require('fs').readFileSync('.github/state/public-apis-report.json')).apis?.length||0}catch(e){0}")
          git diff --staged --quiet || git commit -m "API discovery v${VER} $(date +%Y-%m): ${APIS} IoT/Zigbee endpoints found [skip ci]"
          git pull --rebase origin master || true
          git push || true
