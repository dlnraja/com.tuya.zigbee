name: Monthly API Discovery
on:
  schedule:
    - cron: '0 4 15 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monthly-api-discovery
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  scan-apis:
    name: Scan Public APIs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Scan public-apis
        run: node .github/scripts/scan-public-apis.js

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/public-apis-report.json || true
          git diff --staged --quiet || git commit -m "chore: Monthly public-apis scan $(date +%Y-%m)"
          git push || true
