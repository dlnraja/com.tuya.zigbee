# TITAN Protocol v2 â€” Validate Homey App
# Restored and improved 2026-06-16
name: đź”Ť Validate Homey App

on:
  schedule:
    - cron: '0 12 * * *'  # Daily 12:00 UTC
  pull_request:
    branches: [master, main, stable-v5]
    paths: ['**.js', '**.json', 'drivers/**', 'lib/**']
  workflow_dispatch:
    inputs:
      level:
        description: "Validation level"
        required: false
        type: choice
        options: [debug, publish, verified]
        default: publish

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: đź”Ť Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: đź“Ą Checkout
        uses: actions/checkout@v4

      - name: đź“¦ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: đź“¦ Install dependencies
        run: npm ci --prefer-offline --no-audit || npm install

      - name: đź“¦ Get App Info
        id: info
        run: |
          VERSION=$(node -p "require('./app.json').version")
          NAME=$(node -p "require('./app.json').name.en")
          DRIVERS=$(ls -d drivers/*/ 2>/dev/null | wc -l)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "drivers=$DRIVERS" >> $GITHUB_OUTPUT
          echo "đź“¦ $NAME v$VERSION - $DRIVERS drivers"

      - name: đź”¨ Build app
        run: npx homey app build

      - name: đź”Ť JS Syntax Check
        run: |
          FAIL=0
          for f in $(find lib drivers -name "*.js" 2>/dev/null); do
            if ! node -c "$f" 2>/dev/null; then
              echo "âťŚ Syntax error: $f"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "âś… All JS files pass syntax check" || exit 1

      - name: đź”Ť Fingerprint Collision Check
        run: |
          node .github/scripts/fp-collision-check.js --baseline .github/fingerprint-collision-baseline.json

      - name: đź–Ľď¸Ź Driver Images Pre-Check
        run: |
          MISS=0
          for d in drivers/*/; do
            DR=$(basename "$d")
            for S in small large xlarge; do
              [ ! -f "$d/assets/images/$S.png" ] && { echo "::error::$DR missing $S.png"; MISS=$((MISS+1)); }
            done
          done
          [ $MISS -gt 0 ] && echo "::warning::$MISS missing driver images"
          echo "âś… $MISS missing image(s)"

      - name: đź”Ť Validate (npx)
        run: npx homey app validate --level ${{ inputs.level || 'publish' }}

      - name: âś… Summary
        if: success()
        run: |
          echo "## âś… ${{ steps.info.outputs.name }} v${{ steps.info.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validation Level | ${{ inputs.level || 'publish' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Drivers | ${{ steps.info.outputs.drivers }} |" >> $GITHUB_STEP_SUMMARY

      - name: âťŚ Failed
        if: failure()
        run: |
          echo "## âťŚ Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "Run \`npx homey app validate --level publish\` locally for details." >> $GITHUB_STEP_SUMMARY
