name: Deep Validation

on: [push, pull_request, schedule]

jobs:
  deep_validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup DeepSeek
        uses: deepseek-ai/setup-action@v1
        with:
          version: '3.1'
          token: ${{ secrets.DEEPSEEK_TOKEN }}
      
      - name: Run Comprehensive Validation
        run: |
          node tools/validate_structure.js --deep
          node tools/validate_drivers.js --all
          homey app validate --report=validation_report.json
      
      - name: Generate Validation Report
        run: |
          node tools/generate_report.js \
          --input validation_report.json \
          --output validation_summary.md

  matrix_update:
    runs-on: ubuntu-latest
    needs: deep_validation
    steps:
      - uses: actions/checkout@v3
      - name: Update Device Matrix
        run: node tools/build_matrix.js --update