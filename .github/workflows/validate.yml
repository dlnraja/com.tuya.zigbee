# Universal Tuya Zigbee - Enhanced Validation Workflow
name: 🔍 Validate Homey App

on:
  schedule:
    - cron: '0 12 * * 0' # Weekly Sunday 12:00 UTC
  pull_request:
    branches:
      - master
      - main
    paths:
      - '**.js'
      - '**.json'
      - 'drivers/**'
      - 'lib/**'
  workflow_dispatch:
    inputs:
      level:
        description: "Validation level"
        required: false
        type: choice
        options:
          - debug
          - publish
          - verified
        default: publish

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  validate:
    name: 🔍 Validate
    if: github.actor != 'github-actions[bot]' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit || npm install

      # Step 1: Case Variant Detection
      - name: 🔄 Case Variant Detection
        id: variants
        run: |
          echo "=== Detecting missing case variants ==="
          node scripts/automation/detect-missing-variants.js
          MISSING=$(node -e "const d=JSON.parse(require('fs').readFileSync('data/community-sync/missing-variants-detected.json','utf8'));console.log(d.total||0)")
          echo "missing_variants=$MISSING" >> $GITHUB_OUTPUT
          echo "Found $MISSING missing variants"

      - name: 🔧 Auto-Fix Case Variants
        if: steps.variants.outputs.missing_variants != '0'
        run: node scripts/automation/fix-detected-variants.js

      # Step 2: Collision Analysis
      - name: 🔍 Fingerprint Collision Check
        run: node scripts/automation/analyze-collisions.js

      # Step 3: Zero Defect Audit
      - name: 🛡️ Zero Defect Audit
        run: node scripts/maintenance/zero-defect-architect-audit.js

      # Step 4: Code Quality
      - name: 🧹 Code Sanitization
        run: node scripts/shadow_sanitizer.js

      - name: 🔍 JS Syntax Check
        run: |
          FAIL=0
          for f in $(find lib drivers -name "*.js" 2>/dev/null); do
            if ! node -c "$f" 2>/dev/null; then
              echo "❌ Syntax error: $f"
              FAIL=1
            fi
          done
          echo "JS syntax: $([[ $FAIL -eq 0 ]] && echo OK || echo FAILED)"

      # Step 5: JSON Validation
      - name: 📊 Validate JSON
        run: |
          FAIL=0
          for f in drivers/*/driver.compose.json; do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>/dev/null; then
              echo "FAIL: $f"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then exit 1; fi
          echo "✅ All JSON valid"

      # Step 6: Images Check
      - name: 🖼️ Driver Images Check
        run: |
          MISS=0
          for d in drivers/*/; do
            DR=$(basename "$d")
            for S in small large xlarge; do
              [ ! -f "$d/assets/images/$S.png" ] && { echo "::error::$DR missing $S.png"; MISS=$((MISS+1)); }
            done
          done
          echo "$MISS missing image(s)"

      # Step 7: Build
      - name: 🔨 Build app
        run: npx homey app build

      - name: 📦 Get App Info
        id: info
        run: |
          VERSION=$(node -p "require('./app.json').version")
          NAME=$(node -p "require('./app.json').name.en")
          DRIVERS=$(ls -d drivers/*/ 2>/dev/null | wc -l)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "drivers=$DRIVERS" >> $GITHUB_OUTPUT
          echo "📦 $NAME v$VERSION - $DRIVERS drivers"

      # Step 8: Validate
      - name: 🔍 Validate (npx)
        run: npx homey app validate --level ${{ inputs.level || 'publish' }}

      - name: 🔍 Validate (Athom Docker)
        continue-on-error: true
        uses: athombv/github-action-homey-app-validate@v1
        with:
          level: ${{ inputs.level || 'publish' }}

      # Step 9: Summary
      - name: ✅ Summary
        if: success()
        run: |
          echo "## ✅ ${{ steps.info.outputs.name }} v${{ steps.info.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Drivers | ${{ steps.info.outputs.drivers }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Case Variants Fixed | ${{ steps.variants.outputs.missing_variants || '0' }} |" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Failed
        if: failure()
        run: |
          echo "## ❌ Validation Failed" >> $GITHUB_STEP_SUMMARY