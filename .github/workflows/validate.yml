# Universal Tuya Zigbee - Validation Workflow
# v5.8.88 - Updated 2026-02-10
# Runs on pull requests to validate app before merge

name: рџ”Ќ Validate Homey App

on:
  schedule:
    - cron: '0 12 * * *'  # Daily 12:00 UTC вЂ” validation sanity check
  pull_request:
    branches:
      - master
      - main
    paths:
      - '**.js'
      - '**.json'
      - 'drivers/**'
      - 'lib/**'
  workflow_dispatch:
    inputs:
      level:
        description: "Validation level"
        required: false
        type: choice
        options:
          - debug
          - publish
          - verified
        default: publish

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: "22"
  # APP_VERSION read dynamically from app.json

jobs:
  validate:
    name: рџ”Ќ Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: рџ“Ґ Checkout
        uses: actions/checkout@v5

      - name: рџ“¦ Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: рџ“¦ Install dependencies
        run: npm ci --prefer-offline --no-audit || npm install

      - name: рџ”„ Check driver/app.json sync
        id: sync
        run: |
          node scripts/maintenance/sync-app-json.js 2>&1 || true
          if git diff --quiet app.json 2>/dev/null; then
            echo "synced=true" >> $GITHUB_OUTPUT
          else
            echo "synced=false" >> $GITHUB_OUTPUT
            echo "вљ пёЏ app.json is out of sync with drivers!"
          fi

      - name: рџ”Ё Build app
        run: npx homey app build

      - name: рџ“¦ Get App Info
        id: info
        run: |
          VERSION=$(node -p "require('./app.json').version")
          NAME=$(node -p "require('./app.json').name.en")
          DRIVERS=$(ls -d drivers/*/ 2>/dev/null | wc -l)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "drivers=$DRIVERS" >> $GITHUB_OUTPUT
          echo "рџ“¦ $NAME v$VERSION - $DRIVERS drivers"

      - name: рџ”Ќ JS Syntax Check
        run: |
          FAIL=0
          for f in $(find lib drivers -name "*.js" 2>/dev/null); do
            if ! node -c "$f" 2>/dev/null; then
              echo "вќЊ Syntax error: $f"
              FAIL=1
            fi
          done
          echo "JS syntax: $([[ $FAIL -eq 0 ]] && echo OK || echo FAILED)"

      - name: рџ”Ќ Fingerprint Collision Check
        run: |
          node -e "
            const fs=require('fs'),path=require('path');
            const dirs=fs.readdirSync('drivers').filter(d=>fs.statSync(path.join('drivers',d)).isDirectory());
            const map=new Map();
            for(const d of dirs){
              const f=path.join('drivers',d,'driver.compose.json');
              if(!fs.existsSync(f))continue;
              const j=JSON.parse(fs.readFileSync(f,'utf8'));
              const z=j.zigbee;
              if(!z||!z.manufacturerName||!z.productId)continue;
              for(const mfr of z.manufacturerName){
                for(const pid of z.productId){
                  const key=mfr.toLowerCase()+'|'+pid;
                  if(!map.has(key))map.set(key,[]);
                  map.get(key).push(d);
                }
              }
            }
            let col=0;
            for(const [k,v] of map){if(v.length>1){console.log('вљ пёЏ Collision:',k,'in',v.join(', '));col++;}}
            console.log(col?col+' collision(s) found':'No fingerprint collisions');
          "

      - name: рџ–јпёЏ Driver Images Pre-Check
        run: |
          MISS=0
          for d in drivers/*/; do
            DR=$(basename "$d")
            for S in small large xlarge; do
              [ ! -f "$d/assets/images/$S.png" ] && { echo "::error::$DR missing $S.png"; MISS=$((MISS+1)); }
            done
          done
          [ $MISS -gt 0 ] && echo "::warning::$MISS missing driver images вЂ” will fail publish validation"
          echo "$MISS missing image(s)"

      - name: рџ”Њ Multi-Gang Endpoint Routing Check
        run: |
          node -e "
            const fs=require('fs'),path=require('path');
            let issues=0;
            const dirs=fs.readdirSync('drivers').filter(d=>fs.statSync(path.join('drivers',d)).isDirectory());
            for(const d of dirs){
              const f=path.join('drivers',d,'driver.compose.json');
              if(!fs.existsSync(f))continue;
              const j=JSON.parse(fs.readFileSync(f,'utf8'));
              const caps=j.capabilities||[];
              const eps=j.zigbee?.endpoints||{};
              // Check: every onoff.gangN must have endpoint N declared
              for(const cap of caps){
                const m=cap.match(/^onoff\.gang(\d+)$/);
                if(m){
                  const epNum=m[1];
                  if(!eps[epNum]){
                    console.log('вљ пёЏ '+d+': '+cap+' has NO endpoint '+epNum+' declared');
                    issues++;
                  } else {
                    const clusters=eps[epNum].clusters||[];
                    // Cluster 6 = genOnOff вЂ” required for switch endpoints
                    if(!clusters.includes(6)&&!clusters.includes(0x0006)){
                      console.log('вљ пёЏ '+d+': EP'+epNum+' missing onOff cluster (6)');
                      issues++;
                    }
                  }
                }
              }
            }
            console.log(issues?issues+' endpoint routing issue(s)':'вњ… All multi-gang endpoints properly declared');
          "

      - name: рџ“Ў TX/RX Protocol Coverage Check
        run: |
          node -e "
            const fs=require('fs'),path=require('path');
            const dirs=fs.readdirSync('drivers').filter(d=>fs.statSync(path.join('drivers',d)).isDirectory());
            let switchDrivers=0,withFallback=0;
            for(const d of dirs){
              const devFile=path.join('drivers',d,'device.js');
              if(!fs.existsSync(devFile))continue;
              const code=fs.readFileSync(devFile,'utf8');
              // Only check switch/socket drivers
              if(!d.includes('switch')&&!d.includes('plug')&&!d.includes('socket'))continue;
              switchDrivers++;
              // Check for TX fallback pattern (either writeAttributes or sendDP fallback)
              const hasTXFallback=code.includes('TX-FALLBACK')||code.includes('writeAttributes')||code.includes('sendDP');
              if(hasTXFallback)withFallback++;
            }
            console.log('Switch/socket drivers: '+switchDrivers+', with TX fallback: '+withFallback);
          "

      - name: рџ”Ќ Validate (npx primary)
        run: npx homey app validate --level ${{ inputs.level || 'publish' }}

      - name: рџ”Ќ Validate (Athom Docker)
        continue-on-error: true
        uses: athombv/github-action-homey-app-validate@v1 # v1
        with:
          level: ${{ inputs.level || 'publish' }}

      - name: вњ… Summary
        if: success()
        run: |
          echo "## вњ… ${{ steps.info.outputs.name }} v${{ steps.info.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validation Level | ${{ inputs.level || 'publish' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Drivers | ${{ steps.info.outputs.drivers }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sync Status | ${{ steps.sync.outputs.synced == 'true' && 'вњ… Synced' || 'вљ пёЏ Out of sync' }} |" >> $GITHUB_STEP_SUMMARY

      - name: вќЊ Failed
        if: failure()
        run: |
          echo "## вќЊ Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run \`homey app validate --level publish\` locally for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### рџ› пёЏ Quick Fixes" >> $GITHUB_STEP_SUMMARY
          echo "1. \`node scripts/maintenance/sync-app-json.js\`" >> $GITHUB_STEP_SUMMARY
          echo "2. \`npx homey app build\`" >> $GITHUB_STEP_SUMMARY
          echo "3. \`npx homey app validate --level publish\`" >> $GITHUB_STEP_SUMMARY

