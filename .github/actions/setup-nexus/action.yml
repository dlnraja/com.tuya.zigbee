name: 'Setup Nexus'
description: 'Standardized Node.js and dependencies setup for Nexus'
inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '22'
  install-cmd:
    description: 'Custom install command'
    required: false
    default: 'npm ci --prefer-offline --no-audit || npm install'

runs:
  using: "composite"
  steps:
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
    
    - name: 📦 Install dependencies
      shell: bash
      run: ${{ inputs.install-cmd }}
