name: 'Homey App Publish (Fixed)'
description: 'Publish Homey app with large.png fix for CLI bug'
inputs:
  personal_access_token:
    description: 'Homey Personal Access Token'
    required: true
outputs:
  url:
    description: 'URL to manage the app release'
    value: ${{ steps.publish.outputs.url }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
      with:
        node-version: '22'

    - name: Install Homey CLI
      shell: bash
      run: npm install -g homey

    - name: Build App
      shell: bash
      run: npx homey app build

    - name: Optimize build (minify app.json + fix large.png)
      shell: bash
      run: |
        node scripts/maintenance/fix-large-images.js

    - name: Validate App
      shell: bash
      run: |
        cd .homeybuild
        npx homey app validate --level publish

    - name: Prepare Publish Directory
      shell: bash
      run: npm run prepare-publish

    - name: Publish App
      id: publish
      shell: bash
      env:
        HOMEY_PAT: ${{ inputs.personal_access_token }}
      run: |
        # Login with token via env var (avoids secret exposure in command line)
        echo "$HOMEY_PAT" | homey login --token 2>/dev/null || true
        # Run our custom interactive shell automation to handle the homey CLI dialogs
        npm run auto-publish
        echo "url=https://tools.developer.homey.app" >> $GITHUB_OUTPUT
