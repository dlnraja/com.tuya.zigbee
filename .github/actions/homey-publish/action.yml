name: 'Homey App Publish (Fixed)'
description: 'Publish Homey app with large.png fix for CLI bug'
inputs:
  personal_access_token:
    description: 'Homey Personal Access Token'
    required: true
outputs:
  url:
    description: 'URL to manage the app release'
    value: ${{ steps.publish.outputs.url }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
      with:
        node-version: '22'

    - name: Install Homey CLI
      shell: bash
      run: npm install -g homey

    - name: Build App
      shell: bash
      run: npx homey app build

    - name: Optimize build (sanitize manifest + fix large.png)
      shell: bash
      run: |
        node scripts/maintenance/sanitize-manifest.cjs app.json .homeybuild/app.json
        node scripts/maintenance/fix-large-images.js
        node scripts/maintenance/optimize-build-images.cjs

    - name: Validate App
      shell: bash
      run: |
        cd .homeybuild
        npx homey app validate --level publish
        cd "$GITHUB_WORKSPACE"
        node scripts/maintenance/sanitize-manifest.cjs app.json .homeybuild/app.json

    - name: Prepare Publish Directory
      shell: bash
      run: npm run prepare-publish

    - name: Publish App
      id: publish
      shell: bash
      env:
        HOMEY_PAT: ${{ inputs.personal_access_token }}
      run: |
        PUBLISH_DIR="$(node -p "require('path').join(require('os').tmpdir(), 'homey-publish-temp')")"
        VER="$(node -p "require('./app.json').version")"
        if [ ! -d "$PUBLISH_DIR" ]; then
          echo "::error::Prepared publish directory is missing: $PUBLISH_DIR"
          exit 1
        fi
        (
          cd "$PUBLISH_DIR"
          npm ci --omit=dev --ignore-scripts --no-audit --no-fund || npm install --omit=dev --ignore-scripts --no-audit --no-fund
        )
        node "$GITHUB_WORKSPACE/scripts/maintenance/prune-publish-payload.cjs" "$PUBLISH_DIR"
        HOMEY_CHECK_FINAL_PUBLISH_DIR=1 node "$GITHUB_WORKSPACE/scripts/ci/publish-size-gate.cjs" --strict --final
        APP_ID=$(node -p "require('./app.json').id" 2>/dev/null || echo "com.dlnraja.tuya.zigbee")
        echo "url=https://tools.developer.homey.app/apps/app/${APP_ID}" >> $GITHUB_OUTPUT
        node "$GITHUB_WORKSPACE/scripts/automation/publish-with-athom-backoff.js" \
          --path "$PUBLISH_DIR" \
          --expect-version "$VER" \
          --attempts 2 \
          --post-publish-wait-ms 120000 \
          --rate-cooldown-ms 900000
