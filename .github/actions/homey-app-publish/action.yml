name: 'Homey App Publish (Fixed)'
description: 'Publish Homey App'
inputs:
  personal_access_token:
    description: 'Homey Personal Access Token'
    required: true
outputs:
  url:
    description: 'URL to manage the app release'
    value: ${{ steps.publish.outputs.url }}
runs:
  using: 'composite'
  steps:
    - name: Build App
      shell: bash
      run: npx homey app build

    - name: Optimize Built App
      shell: bash
      run: |
        node scripts/maintenance/fix-large-images.js
        node scripts/maintenance/optimize-build-images.cjs
        node scripts/maintenance/sanitize-manifest.cjs app.json .homeybuild/app.json

    - name: Clean .homeybuild (remove .bak, dev artifacts)
      shell: bash
      run: |
        # Remove .bak / .backup / .tmp / .old / .orig files from build dir
        # (auto-fix-all bot may re-add them via version bumps)
        find .homeybuild -type f \( -name '*.bak' -o -name '*.backup' -o -name '*.tmp' -o -name '*.old' -o -name '*.orig' -o -name '*.swp' -o -name '*.swo' -o -name '*.rej' \) -delete
        # Remove dev tool dirs
        rm -rf .homeybuild/tools/ci/diagnostics .homeybuild/tools/ci/.cache .homeybuild/tools/ci/__pycache__ .homeybuild/tools/shadow-mode/tickets .homeybuild/tools/shadow-mode/.cache
        rm -rf .homeybuild/data/intel-harvest .homeybuild/data/community-sync .homeybuild/data/temp_desktop_cleanup .homeybuild/data/archive .homeybuild/data/forum-cache .homeybuild/data/diagnostics .homeybuild/data/backups
        # Remove dev lockfiles
        rm -f .homeybuild/pnpm-lock.yaml .homeybuild/pnpm-workspace.yaml .homeybuild/package-lock.json .homeybuild/yarn.lock
        # Remove dev scripts
        rm -f .homeybuild/tools/ci/delete-johan-comments.sh .homeybuild/tools/ci/delete-johan-comments.js .homeybuild/tools/ci/delete-own-upstream-comments.js .homeybuild/tools/ci/collect-johan-comments-to-delete.js
        echo "Cleaned .homeybuild of dev artifacts"

    - name: Prepare Publish Directory
      shell: bash
      run: npm run prepare-publish

    - name: Publish App
      id: publish
      shell: bash
      env:
        HOMEY_PAT: ${{ inputs.personal_access_token }}
      run: |
        PUBLISH_DIR="$(node -p "require('path').join(require('os').tmpdir(), 'homey-publish-temp')")"
        if [ ! -d "$PUBLISH_DIR" ]; then
          echo "::error::Prepared publish directory is missing: $PUBLISH_DIR"
          exit 1
        fi
        cd "$PUBLISH_DIR"
        if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
          npm ci --omit=dev --ignore-scripts --no-audit --no-fund
        else
          npm install --omit=dev --ignore-scripts --no-audit --no-fund
        fi
        node "$GITHUB_WORKSPACE/scripts/maintenance/prune-publish-payload.cjs" "$PUBLISH_DIR"
        HOMEY_CHECK_FINAL_PUBLISH_DIR=1 HOMEY_PUBLISH_FINAL_MAX_MB=26 HOMEY_PUBLISH_SOURCE_MAX_MB=26 node "$GITHUB_WORKSPACE/scripts/ci/publish-size-gate.cjs" --strict --final

        run_homey_cli_publish() {
          if [ -x "$GITHUB_WORKSPACE/node_modules/.bin/homey" ]; then
            HOMEY_HEADLESS=1 HOMEY_PAT="$HOMEY_PAT" "$GITHUB_WORKSPACE/node_modules/.bin/homey" app publish --path "$PUBLISH_DIR"
          else
            HOMEY_HEADLESS=1 HOMEY_PAT="$HOMEY_PAT" npx homey app publish --path "$PUBLISH_DIR"
          fi
        }

        set +e
        publish_output=$(run_homey_cli_publish 2>&1)
        publish_status=$?

        if [ "$publish_status" -ne 0 ] && printf '%s\n' "$publish_output" | grep -Eiq 'Timeout after [0-9]+ms|fetch failed|ETIMEDOUT|ECONNRESET|ECONNABORTED'; then
          echo "::warning::Homey CLI publish hit a transient API timeout; retrying via direct Athom Apps API with extended timeouts."
          fallback_output=$(HOMEY_PAT="$HOMEY_PAT" HOMEY_API_TIMEOUT_MS="${HOMEY_API_TIMEOUT_MS:-60000}" HOMEY_BUILD_POLL_TIMEOUT_MS="${HOMEY_BUILD_POLL_TIMEOUT_MS:-240000}" node "$GITHUB_WORKSPACE/scripts/direct-api-publish.js" --path "$PUBLISH_DIR" 2>&1)
          fallback_status=$?
          publish_output="$(printf '%s\n%s' "$publish_output" "$fallback_output")"
          publish_status=$fallback_status
        fi
        set -e
        printf '%s\n' "$publish_output"
        APP_ID=$(node -p "require('./app.json').id" 2>/dev/null || echo "com.dlnraja.tuya.zigbee")
        echo "url=https://tools.developer.homey.app/apps/app/${APP_ID}" >> $GITHUB_OUTPUT
        if [ "$publish_status" -ne 0 ]; then
          if printf '%s\n' "$publish_output" | grep -Eiq 'already been published|currently in review'; then
            echo "::warning::Homey reports this version is already published or in review; continuing so test promotion can proceed."
            exit 0
          fi
          exit "$publish_status"
        fi
        exit "$publish_status"
