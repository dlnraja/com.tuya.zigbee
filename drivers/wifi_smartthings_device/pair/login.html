<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; }
    h2 { font-size: 18px; margin-bottom: 10px; }
    p { font-size: 14px; color: #555; }
    input { width: 100%; padding: 10px; margin-top: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { background: #008CC1; color: white; border: none; padding: 10px 15px; border-radius: 4px; font-size: 14px; cursor: pointer; width: 100%; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .error { color: red; font-size: 12px; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>SmartThings Login</h2>
  <p>Please enter your SmartThings Personal Access Token (PAT). You can generate one from the SmartThings Developer Workspace.</p>
  
  <input type="text" id="patInput" placeholder="Enter your PAT here..." autocomplete="off" />
  
  <button id="loginBtn">Connect to SmartThings</button>
  <div id="errorMsg" class="error"></div>

  <script type="text/javascript">
    const patInput = document.getElementById('patInput');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    loginBtn.addEventListener('click', function() {
      const pat = patInput.value.trim();
      
      if (!pat) {
        errorMsg.innerText = 'Please enter a valid token.';
        return;
      }
      
      errorMsg.innerText = '';
      loginBtn.disabled = true;
      loginBtn.innerText = 'Connecting...';

      // Send the token back to the driver for the list_devices template
      Homey.emit('list_devices', { pat: pat })
        .then(function(devices) {
          Homey.nextView();
        })
        .catch(function(err) {
          loginBtn.disabled = false;
          loginBtn.innerText = 'Connect to SmartThings';
          errorMsg.innerText = err.message || 'Connection failed';
        });
    });
  </script>
</body>
</html>
